nThose bank jerks begged us to borrow money,\nand now they're demanding payment.\nMoreover, the debt ratio of our Sanin Group\nis 428%, which is somewhat high compared to\nthe average debt ratio of the top 10 corporations,\nwhich is 250%.","sourceUid":"merged-mq7yaclp-425","sourceNo":104,"viRanges":[{"start":478.533,"end":494.357358}],"koRanges":[{"start":483.65,"end":493.96}]},{"id":170,"readerNo":171,"displayNo":146,"n":146,"kind":"sub","type":"merged","vi":"Chúng ta biết chuyện đó khi xem tài liệu rồi\nnên vào phần chính đi.","ko":"아, 그런 거는 서류를 다 보고 받았으니까 본론부터 합시다","en":"Ah, I've already seen all that in the documents, so let's get to the main point.","text":"Chúng ta biết chuyện đó khi xem tài liệu rồi\nnên vào phần chính đi.\n아, 그런 거는 서류를 다 보고 받았으니까 본론부터 합시다\nAh, I've already seen all that in the documents, so let's get to the main point.","sourceUid":"merged-mq7yb68v-426","sourceNo":146,"viRanges":[{"start":494.357358,"end":499.360574}],"koRanges":[{"start":493.71,"end":498.34}]},{"id":171,"readerNo":172,"displayNo":106,"n":106,"kind":"sub","type":"merged","vi":"Quỹ đầu tư riêng lẻ\nđã công khai yêu cầu giảm tỷ lệ nợ.","ko":"월 펀드에서 공개적으로 부채율을 줄일 것을 요구했습니다","en":"The Private Placement Fund has publicly demanded\nthat we reduce our debt ratio.","text":"Quỹ đầu tư riêng lẻ\nđã công khai yêu cầu giảm tỷ lệ nợ.\n월 펀드에서 공개적으로 부채율을 줄일 것을 요구했습니다\nThe Private Placement Fund has publicly demanded\nthat we reduce our debt ratio.","sourceUid":"merged-mq7ybizj-427","sourceNo":106,"viRanges":[{"start":499.360574,"end":503.878302}],"koRanges":[{"start":498.09,"end":503.1}]},{"id":172,"readerNo":173,"displayNo":107,"n":107,"kind":"sub","type":"merged","vi":"Vì vậy, trên đa số các tờ báo kinh tế, đã còn nhiều bài báo nói\ncông ty đang rơi vào khủng hoảng, thậm chí có bài còn nói đến phá sản.","ko":"때문에 다수의 경제지에서 위기서를 다룬 기사까지 나오고 있고 일부에서는 구도까지 거론되고 있는 상황입니다","en":"So the financial papers are covering this crisis.\nSome even mention the possibility of bankruptcy.","text":"Vì vậy, trên đa số các tờ báo kinh tế, đã còn nhiều bài báo nói\ncông ty đang rơi vào khủng hoảng, thậm chí có bài còn nói đến phá sản.\n때문에 다수의 경제지에서 위기서를 다룬 기사까지 나오고 있고 일부에서는 구도까지 거론되고 있는 상황입니다\nSo the financial papers are covering this crisis.\nSome even mention the possibility of bankruptcy.","sourceUid":"merged-mq7yc17c-428","sourceNo":107,"viRanges":[{"start":503.878302,"end":511.371628}],"koRanges":[{"start":502.85,"end":510.62}]},{"id":173,"readerNo":174,"displayNo":108,"n":108,"kind":"sub","type":"merged","vi":"Chúng tôi bảo cậu nói trọng tâm mà.\nCậu không hiểu à? Họ đang muốn đòi tiền.\nSố nợ là bao nhiêu?\nVâng.\nMười một nghìn tỷ won ạ.","ko":"본론이 뭐냐고 물었는데 마이키를 돈 갚으라 이거 아니야 얼마냐고","en":"We asked you to get to the point. You don't get it.\nThey're demanding payment. How much is the debt?\nOkay.\nIt's 11 trillion won.","text":"Chúng tôi bảo cậu nói trọng tâm mà.\nCậu không hiểu à? Họ đang muốn đòi tiền.\nSố nợ là bao nhiêu?\nVâng.\nMười một nghìn tỷ won ạ.\n본론이 뭐냐고 물었는데 마이키를 돈 갚으라 이거 아니야 얼마냐고\nWe asked you to get to the point. You don't get it.\nThey're demanding payment. How much is the debt?\nOkay.\nIt's 11 trillion won.","sourceUid":"merged-mq7ycc8m-429","sourceNo":108,"viRanges":[{"start":511.371628,"end":521.854067}],"koRanges":[{"start":510.37,"end":515.32}]},{"id":174,"readerNo":175,"displayNo":109,"n":109,"kind":"sub","type":"merged","vi":"Hạn cuối là khi nào?","ko":"언제까지?","en":"By when?","text":"Hạn cuối là khi nào?\n언제까지?\nBy when?","sourceUid":"merged-mq7ych9a-430","sourceNo":109,"viRanges":[{"start":521.854067,"end":528.463233},{"start":525,"end":528.463233}],"koRanges":[{"start":526.35,"end":527.4}]},{"id":175,"readerNo":176,"displayNo":110,"n":110,"kind":"sub","type":"merged","vi":"Hạn cuối là cuối quý một năm sau. Nhưng thực tế thì cần xong xuôi trong năm nay.","ko":"만기는 내년 1분기까지입니다만 사실상 올해 안에 마무리해야 합니다","en":"It's due by the first quarter of next year,\nbut we should take care of it this year.","text":"Hạn cuối là cuối quý một năm sau. Nhưng thực tế thì cần xong xuôi trong năm nay.\n만기는 내년 1분기까지입니다만 사실상 올해 안에 마무리해야 합니다\nIt's due by the first quarter of next year,\nbut we should take care of it this year.","sourceUid":"merged-mq80pjuv-598","sourceNo":110,"viRanges":[{"start":528.463233,"end":533.374883}],"koRanges":[{"start":527.85,"end":532.36}]},{"id":176,"readerNo":177,"displayNo":111,"n":111,"kind":"sub","type":"merged","vi":"Cậu đùa đấy à?\nTưởng 11 nghin tỷ là lá cây hay gì?","ko":"장난하나? 10일째가 누구의 이름도 아니고","en":"Are you joking?\nEleven trillion won isn't chump change.","text":"Cậu đùa đấy à?\nTưởng 11 nghin tỷ là lá cây hay gì?\n장난하나? 10일째가 누구의 이름도 아니고\nAre you joking?\nEleven trillion won isn't chump change.","sourceUid":"merged-mq80py0r-599","sourceNo":111,"viRanges":[{"start":533.374883,"end":536.42715}],"koRanges":[{"start":532.11,"end":535.74}]},{"id":177,"readerNo":178,"displayNo":112,"n":112,"kind":"sub","type":"merged","vi":"Ngân hàng đòi là chúng ta phải làm theo ngay à?\nCó công ty nào kinh doanh bằng tiền của mình không?","ko":"아니 은행에 하란다고 뭐 다 해야 되나? 자기 돈으로 사업하는 데가 어디 있다고?","en":"No, just because the bank says to do something, do we have to do everything? Where is there a business that runs on its own money?","text":"Ngân hàng đòi là chúng ta phải làm theo ngay à?\nCó công ty nào kinh doanh bằng tiền của mình không?\n아니 은행에 하란다고 뭐 다 해야 되나? 자기 돈으로 사업하는 데가 어디 있다고?\nNo, just because the bank says to do something, do we have to do everything? Where is there a business that runs on its own money?","sourceUid":"merged-mq80qj8o-600","sourceNo":112,"viRanges":[{"start":536.42715,"end":541.147435}],"koRanges":[{"start":535.49,"end":539.98}]},{"id":178,"readerNo":179,"displayNo":113,"n":113,"kind":"sub","type":"merged","vi":"Cuối quý trước, chủ tịch đã hứa\nsẽ giảm tỷ lệ nợ\ncủa tập đoàn Sanin trên thị trường xuống còn 200%.","ko":"회장님께서는 지난 분기 말 시장에서 산인 그룹의 부채를 200%로 낮출 것을 약속하셨고","en":"We don't have to do everything the bank says.\nWhat business operates with its own money?\nAt the end of the last quarter, the Chairman promised to reduce\nSanin Group's debt ratio on the market to 200%.","text":"Cuối quý trước, chủ tịch đã hứa\nsẽ giảm tỷ lệ nợ\ncủa tập đoàn Sanin trên thị trường xuống còn 200%.\n회장님께서는 지난 분기 말 시장에서 산인 그룹의 부채를 200%로 낮출 것을 약속하셨고\nWe don't have to do everything the bank says.\nWhat business operates with its own money?\nAt the end of the last quarter, the Chairman promised to reduce\nSanin Group's debt ratio on the market to 200%.","sourceUid":"merged-mq80qv2q-601","sourceNo":113,"viRanges":[{"start":541.147435,"end":548.414891}],"koRanges":[{"start":540.95,"end":548.82}]},{"id":179,"readerNo":180,"displayNo":114,"n":114,"kind":"sub","type":"merged","vi":"Giá cổ phiếu của chúng ta vốn đã đang giảm rất nhiều\nnhưng lại tăng 11% vào hôm đó.","ko":"큰 폭으로 조정되는 주가가 당일 11% 상승했습니다","en":"Our stock price, which was declining sharply,\nrose by 11% that day.","text":"Giá cổ phiếu của chúng ta vốn đã đang giảm rất nhiều\nnhưng lại tăng 11% vào hôm đó.\n큰 폭으로 조정되는 주가가 당일 11% 상승했습니다\nOur stock price, which was declining sharply,\nrose by 11% that day.","sourceUid":"merged-mq80r5bl-602","sourceNo":114,"viRanges":[{"start":548.414891,"end":553.928608}],"koRanges":[{"start":548.57,"end":553.06}]},{"id":180,"readerNo":181,"displayNo":115,"n":115,"kind":"sub","type":"merged","vi":"Giá vẫn tiếp tục tăng đều sau đó\nvà hiện đã tăng 40% so với mức chạm đáy trước đó.","ko":"그 이후 상승세를 유지해서 현재 저점 대비 40% 상승 중입니다","en":"Since then, it has retained its upward trend\nand is currently 40% from its previous low.","text":"Giá vẫn tiếp tục tăng đều sau đó\nvà hiện đã tăng 40% so với mức chạm đáy trước đó.\n그 이후 상승세를 유지해서 현재 저점 대비 40% 상승 중입니다\nSince then, it has retained its upward trend\nand is currently 40% from its previous low.","sourceUid":"merged-mq80rggp-603","sourceNo":115,"viRanges":[{"start":553.928608,"end":559.18032}],"koRanges":[{"start":552.81,"end":558}]},{"id":181,"readerNo":182,"displayNo":116,"n":116,"kind":"sub","type":"merged","vi":"Nhưng nếu giờ không thực h \nYes.\n- At all costs. - Yes.","text":"Ôi trời. Vậy giờ phải làm sao? Phải trả 11 nghìn tỷ và vẫn giữ giá cổ phiếu? Vâng. - Nhất định phải thế? - Vâng.\n그래서 어쩌라는 거야 11조도 갚고 주가도 방어하라는 거네 왜 무조건 왜.\nGoodness.\nSo what are we supposed to do?\nYou are saying to pay off the 11 trillion\nand maintain the stock price.\nYes.\n- At all costs. - Yes.","sourceUid":"merged-mq862u90-892","sourceNo":143,"viRanges":[{"start":653.516,"end":667.308266},{"start":653.516,"end":667.793892},{"start":653.766,"end":667.308266}],"koRanges":[{"start":657.68,"end":666.45}]},{"id":216,"readerNo":217,"displayNo":"N81","n":"N81","kind":"narration","type":"narration","vi":"Đạo diễn Hà cười như vô lý nhưng rồi lại gật đầu như không thể làm gì được.","ko":"하전무, 어이없다는 듯 헛웃음 치지만, 곧이어 어쩔 수 없다는 듯이 고갤 끄덕인다.","en":"Director Ha laughs as if it is absurd, but then nods as if there is nothing he can do.","text":"Đạo diễn Hà cười như vô lý nhưng rồi lại gật đầu như không thể làm gì được.\n하전무, 어이없다는 듯 헛웃음 치지만, 곧이어 어쩔 수 없다는 듯이 고갤 끄덕인다.\nDirector Ha laughs as if it is absurd, but then nods as if there is nothing he can do.","sourceUid":"nar-mqjk4ris-cmlhwc","sourceNo":"N81","viRanges":[],"koRanges":[]},{"id":217,"readerNo":218,"displayNo":"N82","n":"N82","kind":"narration","type":"narration","vi":"Những người điều hành khác không ai chịu mở miệng mà chỉ nuốt nước bọt.","ko":"다른 임원들 아무도 선뜻 입을 열지 못하고, 침만 꿀꺽 삼킨다.","en":"None of the other executives were willing to open their mouths and only swallowed their saliva.","text":"Những người điều hành khác không ai chịu mở miệng mà chỉ nuốt nước bọt.\n다른 임원들 아무도 선뜻 입을 열지 못하고, 침만 꿀꺽 삼킨다.\nNone of the other executives were willing to open their mouths and only swallowed their saliva.","sourceUid":"nar-mqjk4som-wee8no","sourceNo":"N82","viRanges":[],"koRanges":[]},{"id":218,"readerNo":219,"displayNo":"N83","n":"N83","kind":"narration","type":"narration","vi":"Những người điều hành khác không ai chịu mở miệng mà chỉ nuốt nước bọt.","ko":"다른 임원들 아무도 선뜻 입을 열지 못하고, 침만 꿀꺽 삼킨다.","en":"None of the other executives were willing to open their mouths and only swallowed their saliva.","text":"Những người điều hành khác không ai chịu mở miệng mà chỉ nuốt nước bọt.\n다른 임원들 아무도 선뜻 입을 열지 못하고, 침만 꿀꺽 삼킨다.\nNone of the other executives were willing to open their mouths and only swallowed their saliva.","sourceUid":"nar-mqjk4t2z-r6rvhj","sourceNo":"N83","viRanges":[],"koRanges":[]},{"id":219,"readerNo":220,"displayNo":144,"n":144,"kind":"sub","type":"merged","vi":"Đã đẩy công ty đến nước này\nnhưng vẫn nói như chuyện của người khác.","ko":"시가 다 이 지경으로만 하네 남 얘기한다.","en":"Pushing us into this mess,\nbut he still talks like it's not his problem.","text":"Đã đẩy công ty đến nước này\nnhưng vẫn nói như chuyện của người khác.\n시가 다 이 지경으로만 하네 남 얘기한다.\nPushing us into this mess,\nbut he still talks like it's not his problem.","sourceUid":"merged-mq8633tv-893","sourceNo":144,"viRanges":[{"start":667.293892,"end":672.369259},{"start":667.793892,"end":672.369259},{"start":667.793892,"end":672.619259}],"koRanges":[{"start":668.17,"end":671.2}]},{"id":220,"readerNo":221,"displayNo":145,"n":145,"kind":"sub","type":"merged","vi":"Năng khiếu của anh ta mà.\nSao lại thành ra như này chứ? Thật tình.\nGiờ không phải là lúc bới móc nhau đâu.","ko":"주의 주특기 아닙니까 못 자다가 이 지경이 됐는데 지금 그것 따질 때가 아닐 거 같은데요.","en":"Isn't that his specialty?\nHow did things end up like this?\nI don't think it's time to be arguing that.","text":"Năng khiếu của anh ta mà.\nSao lại thành ra như này chứ? Thật tình.\nGiờ không phải là lúc bới móc nhau đâu.\n주의 주특기 아닙니까 못 자다가 이 지경이 됐는데 지금 그것 따질 때가 아닐 거 같은데요.\nIsn't that his specialty?\nHow did things end up like this?\nI don't think it's time to be arguing that.","sourceUid":"merged-mq863mfq-894","sourceNo":145,"viRanges":[{"start":672.619259,"end":680.806725}],"koRanges":[{"start":671.27,"end":680.36}]},{"id":221,"readerNo":222,"displayNo":"N84","n":"N84","kind":"narration","type":"narration","vi":"Giám đốc Jo, Đại diện Park, Choi Dae-pyo, Kim Woo-cheo PT 제목이 보인다.","en":"You can see the PPT title ‘肉斬骨斷’.","text":"Bạn có thể thấy tiêu đề PPT ‘肉斬骨斷’.\n‘肉斬骨斷’이라는 PPT 제목이 보인다.\nYou can see the PPT title ‘肉斬骨斷’.","sourceUid":"nar-mqjmpbby-ljgh48","sourceNo":"N169","viRanges":[],"koRanges":[]},{"id":421,"readerNo":422,"displayNo":276,"n":276,"kind":"sub","type":"merged","vi":"\"Lục tẩm cốt đoạn.\"\n\"Lục\" là thịt, \"tẩm\" là cắt,\n\"Cốt\" là xương, \"đoạn\" là chặt đứt.\nTập đoàn đang trong khủng hoảng,\nchúng ta không thể chỉ ngồi nhìn.\nChúng ta có vấn đề, vậy nên cần loại bỏ nó.","ko":"육참 골단 고기 육 벨참 뼈 골 끈을 탄 내 살을 베어주고 상대 뼈를 끊는다 그룹이 이 지경인데 그냥 넘어갈 수는 없는 거 아니겠습니까 문제가 있는 데는 도려내야죠","en":"\"Cutting flesh to sever bone\" — the group is in this state, so we can't just let it slide, can we? Where there's a problem, we have to cut it out.","text":"\"Lục tẩm cốt đoạn.\"\n\"Lục\" là thịt, \"tẩm\" là cắt,\n\"Cốt\" là xương, \"đoạn\" là chặt đứt.\nTập đoàn đang trong khủng hoảng,\nchúng ta không thể chỉ ngồi nhìn.\nChúng ta có vấn đề, vậy nên cần loại bỏ nó.\n육참 골단 고기 육 벨참 뼈 골 끈을 탄 내 살을 베어주고 상대 뼈를 끊는다 그룹이 이 지경인데 그냥 넘어갈 수는 없는 거 아니겠습니까 문제가 있는 데는 도려내야죠\n\"Cutting flesh to sever bone\" — the group is in this state, so we can't just let it slide, can we? Where there's a problem, we have to cut it out.","sourceUid":"merged-mq8xk2gs-527","sourceNo":276,"viRanges":[{"start":1195,"end":1215.316832}],"koRanges":[{"start":1193.79,"end":1210.02}]},{"id":422,"readerNo":423,"displayNo":277,"n":277,"kind":"sub","type":"merged","vi":"Hãy xem xét kỹ\nđể biết đâu là thịt, đâu là xương.\nĐây là báo cáo tài chính của các công ty con thuộc tập đoàn.","ko":"자 어디 한번 보시죠 어디가 살이고 어디가 뼈인지 산인그룹 계열사 재무재표입니다","en":"Alright, let's take a look. Here is the financial statement of Sanin Group's affiliates — where is the flesh and where is the bone?","text":"Hãy xem xét kỹ\nđể biết đâu là thịt, đâu là xương.\nĐây là báo cáo tài chính của các công ty con thuộc tập đoàn.\n자 어디 한번 보시죠 어디가 살이고 어디가 뼈인지 산인그룹 계열사 재무재표입니다\nAlright, let's take a look. Here is the financial statement of Sanin Group's affiliates — where is the flesh and where is the bone?","sourceUid":"merged-mq8xuqzb-93","sourceNo":277,"viRanges":[{"start":1215.316832,"end":1222.746907}],"koRanges":[{"start":1211.41,"end":1218.72}]},{"id":423,"readerNo":424,"displayNo":"278","n":"278","kind":"sub","type":"merged","vi":"Đầu tiên bộ phận Xây dựng. Đang tăng trưởng ổn định thì bỗng nhiên doanh thu tăng gấp đôi. Đó là khi tôi mua lại Yongah E&C","ko":"자 먼저 건설사업본부입니다. 계속해서 성장하다가 매출이 2배로 뛰었죠. 저때가 제가 용하이앤씨 인수하고 나섭니다.","en":"First, the Construction Business Division. It was growing steadily, then revenue doubled. That was right after I acquired Yongah E&C","text":"Đầu tiên bộ phận Xây dựng. Đang tăng trưởng ổn định thì bỗng nhiên doanh thu tăng gấp đôi. Đó là khi tôi mua lại Yongah E&C\n자 먼저 건설사업본부입니다. 계속해서 성장하다가 매출이 2배로 뛰었죠. 저때가 제가 용하이앤씨 인수하고 나섭니다.\nFirst, the Construction Business Division. It was growing steadily, then revenue doubled. That was right after I acquired Yongah E&C","sourceUid":"merged-0278","sourceNo":278,"viRanges":[{"start":1222.746907,"end":1232.816457}],"koRanges":[{"start":1218.47,"end":1230.48}]},{"id":424,"readerNo":425,"displayNo":279,"n":279,"kind":"sub","type":"merged","vi":"Nhờ đó bộ phận Xây dựng đang thu về lợi nhuận cao.\nVậy tại sao tập đoàn lại rơi vào tình trạng này?","ko":"자 덕분에 건설이 저렇게 잘 버는데 그룹은 왜 이 지경이 됐느냐.","en":"So, due to that, Construction is earning good revenue. So why is our group in this mess?","text":"Nhờ đó bộ phận Xây dựng đang thu về lợi nhuận cao.\nVậy tại sao tập đoàn lại rơi vào tình trạng này?\n자 덕분에 건설이 저렇게 잘 버는데 그룹은 왜 이 지경이 됐느냐.\nSo, due to that, Construction is earning good revenue. So why is our group in this mess?","sourceUid":"merged-mqdxx3wx-41","sourceNo":279,"viRanges":[{"start":1232.816,"end":1239.510328}],"koRanges":[{"start":1231.19,"end":1236.18}]},{"id":425,"readerNo":426,"displayNo":280,"n":280,"kind":"sub","type":"merged","vi":"Đây là tình hình của các công ty con khác, phần lớn đều có doanh thu âm.\nKhách sạn, giải trí,\ncông ty du lịch, thực phẩm tất cả đều đang thua lỗ.","ko":"다른 계열사들 대부분이 다 마이너스죠 호텔 엔터 여행사 식품 다 마이너스","en":"Okay, these are other subsidiaries.\nMost of them have negative revenues. They're all in the red.\ntravel agency, food products.\nHotel, entertainment,","text":"Đây là tình hình của các công ty con khác, phần lớn đều có doanh thu âm.\nKhách sạn, giải trí,\ncông ty du lịch, thực phẩm tất cả đều đang thua lỗ.\n다른 계열사들 대부분이 다 마이너스죠 호텔 엔터 여행사 식품 다 마이너스\nOkay, these are other subsidiaries.\nMost of them have negative revenues. They're all in the red.\ntravel agency, food products.\nHotel, entertainment,","sourceUid":"merged-mqdxziz7-44","sourceNo":280,"viRanges":[{"start":1239.51,"end":1253.925915}],"koRanges":[{"start":1239.72,"end":1250.47}]},{"id":426,"readerNo":427,"displayNo":281,"n":281,"kind":"sub","type":"merged","vi":"Trời ạ, thê thảm quá. Quay lại trang trước.\nCái gì đây? Wind, à…\nCông ty xe đạp thậm chí còn chưa được niêm yết.","ko":"전화면 봐봐 저 뭐야 저 윈드 그래 자전거죠 상장도 못한 거죠","en":"Gosh, it's a bloodbath.\nThe bicycle company that didn't even get listed!\nWhat is that? Wind, yes...\nGo to the previous slide.","text":"Trời ạ, thê thảm quá. Quay lại trang trước.\nCái gì đây? Wind, à…\nCông ty xe đạp thậm chí còn chưa được niêm yết.\n전화면 봐봐 저 뭐야 저 윈드 그래 자전거죠 상장도 못한 거죠\nGosh, it's a bloodbath.\nThe bicycle company that didn't even get listed!\nWhat is that? Wind, yes...\nGo to the previous slide.","sourceUid":"merged-mqdy3ik4-48","sourceNo":281,"viRanges":[{"start":1253.925915,"end":1262.958149}],"koRanges":[{"start":1253.26,"end":1258.45}]},{"id":427,"readerNo":428,"displayNo":282,"n":282,"kind":"sub","type":"merged","vi":"Vậy, điều này có nghĩa là gì?\nBộ phận Xây dựng đang gánh cả tập đoàn.","ko":"자 이게 무슨 소리냐 건설이 나머지를 다 먹여 살리는 중이다","en":"So what does this mean?\nConstruction is carrying the entire company.","text":"Vậy, điều này có nghĩa là gì?\nBộ phận Xây dựng đang gánh cả tập đoàn.\n자 이게 무슨 소리냐 건설이 나머지를 다 먹여 살리는 중이다\nSo what does this mean?\nConstruction is carrying the entire company.","sourceUid":"merged-mqdy4cwb-50","sourceNo":282,"viRanges":[{"start":1262.958149,"end":1267.314388}],"koRanges":[{"start":1258.2,"end":1264.41}]},{"id":428,"readerNo":429,"displayNo":283,"n":283,"kind":"sub","type":"merged","vi":"Nhưng giờ thì nó không thể duy trì phần còn lại của tập đoàn nữa.","ko":"근데 이제는 한계가 와서 더 이상 감당이 안 된다라는 뜻입니다","en":"But now, it has reached its limit\nand cannot sustain the rest of the group anymore.","text":"Nhưng giờ thì nó không thể duy trì phần còn lại của tập đoàn nữa.\n근데 이제는 한계가 와서 더 이상 감당이 안 된다라는 뜻입니다\nBut now, it has reached its limit\nand cannot sustain the rest of the group anymore.","sourceUid":"merged-mqdy57ct-52","sourceNo":283,"viRanges":[{"start":1267.314388,"end":1271.534}],"koRanges":[{"start":1264.16,"end":1268.63}]},{"id":429,"readerNo":430,"displayNo":"N170","n":"N170","kind":"narration","type":"narration","vi":"Kim Woo-cheol, ngồi đối diện với Giám đốc Jo, Giám đốc điều hành Park và Choi Dae-pyo,","ko":"조이사, 박대표, 최대표 맞은편에 앉은 김우철,","en":"Kim Woo-cheol, sitting across from Director Jo, CEO Park, and Choi Dae-pyo,","text":"Kim Woo-cheol, ngồi đối diện với Giám đốc Jo, Giám đốc điều hành Park và Choi Dae-pyo,\n조이사, 박대표, 최대표 맞은편에 앉은 김우철,\nKim Woo-cheol, sitting across from Director Jo, CEO Park, and Choi Dae-pyo,","sourceUid":"nar-mqke0kwe-trqmwo","sourceNo":"N170","viRanges":[],"koRanges":[]},{"id":430,"readerNo":431,"displayNo":"N171","n":"N171","kind":"narration","type":"narration","vi":"Đại diện Min và Oh có vẻ đặc biệt khó chịu.","ko":"민대표, 오대표의 심기가 유독 불편해 보인다.","en":"Representatives Min and Oh seem particularly uncomfortable.","text":"Đại diện Min và Oh có vẻ đặc biệt khó chịu.\n민대표, 오대표의 심기가 유독 불편해 보인다.\nRepresentatives Min and Oh seem particularly uncomfortable.","sourceUid":"nar-mqke0mcg-2sp7pg","sourceNo":"N171","viRanges":[],"koRanges":[]},{"id":431,"readerNo":432,"displayNo":284,"n":284,"kind":"sub","type":"merged","vi":"Vậy anh định xử lý chuyện này như thế nào?","ko":"아니 그래서 어떻게 하겠다는 건데요","en":"","text":"Vậy anh định xử lý chuyện này như thế nào?\n아니 그래서 어떻게 하겠다는 건데요","sourceUid":"merged-mq8xxoy1-99","sourceNo":284,"viRanges":[{"start":1271.534,"end":1273.892828}],"koRanges":[{"start":1268.38,"end":1270.85}]},{"id":432,"readerNo":433,"displayNo":285,"n":285,"kind":"sub","type":"merged","vi":"Giờ anh đã thấy rõ rồi đúng không?\nAnh có thể phân biệt được đâu là thịt, đâu là xương.","ko":"보니까 아시겠죠 어디가 뼈고 어디가 살인지","en":"So what will you do about it?\nYou can see what's flesh and what's bone.\nYou can see it now, right?","text":"Giờ anh đã thấy rõ rồi đúng không?\nAnh có thể phân biệt được đâu là thịt, đâu là xương.\n보니까 아시겠죠 어디가 뼈고 어디가 살인지\nSo what will you do about it?\nYou can see what's flesh and what's bone.\nYou can see it now, right?","sourceUid":"merged-mqdy6fcp-54","sourceNo":285,"viRanges":[{"start":1273.892828,"end":1278.449}],"koRanges":[{"start":1270.6,"end":1274.53}]},{"id":433,"readerNo":434,"displayNo":286,"n":286,"kind":"sub","type":"merged","vi":"Chúng ta phải cắt bỏ phần dư thừa.\nChúng ta sẽ tính toán doanh thu và lợi nhuận hoạt động\nvà bắt đầu bán đi những bộ phận hoạt động kém nhất.","ko":"그럼 도려내야죠 매출과 영업이 계산해서 꼴지부터 매각하겠습니다","en":"We have to cut off the dead weight.\nand start selling from the worst performers.\nWe will calculate the revenue and operating profits","text":"Chúng ta phải cắt bỏ phần dư thừa.\nChúng ta sẽ tính toán doanh thu và lợi nhuận hoạt động\nvà bắt đầu bán đi những bộ phận hoạt động kém nhất.\n그럼 도려내야죠 매출과 영업이 계산해서 꼴지부터 매각하겠습니다\nWe have to cut off the dead weight.\nand start selling from the worst performers.\nWe will calculate the revenue and operating profits","sourceUid":"merged-mqdy6wyr-56","sourceNo":286,"viRanges":[{"start":1278.449,"end":1287.232093}],"koRanges":[{"start":1275.36,"end":1282.82}]},{"id":434,"readerNo":435,"displayNo":287,"n":287,"kind":"sub","type":"merged","vi":"Anh đang đùa à?","ko":"아니, 상야라는 것도 아니고","en":"Are you kidding me?","text":"Anh đang đùa à?\n아니, 상야라는 것도 ing every subsidiary,\napart from the Construction, is about 7 trillion won.\nIf selling all but Construction gets us to 7 trillion,","text":"Giá thị trường để bán tất cả các công ty con\nngoại trừ bộ phận Xây dựng là khoảng 7 nghìn tỷ won.\n그래서 건설을 제외한 회사를 다 팔면 7조 정도가 시장 가격입니다\nThe market price for selling every subsidiary,\napart from the Construction, is about 7 trillion won.\nIf selling all but Construction gets us to 7 trillion,","sourceUid":"merged-mqceo4xo-154","sourceNo":802,"viRanges":[{"start":3605.936011,"end":3611.087603}],"koRanges":[{"start":3601.46,"end":3607.67}]},{"id":1182,"readerNo":1183,"displayNo":803,"n":803,"kind":"sub","type":"merged","vi":"Bán hết trừ mảng xây dựng được 7 nghìn tỷ, vậy nếu chúng ta làm tốt, có thể tạo ra tới 11 nghìn tỷ không?","ko":"건설 빼고 다 팔아서 7조면 우리가 잘하면 11조까지 만들 수 있나요?","en":"If we sell everything except construction for 7 trillion, can we make it up to 11 trillion if we do well?","text":"Bán hết trừ mảng xây dựng được 7 nghìn tỷ, vậy nếu chúng ta làm tốt, có thể tạo ra tới 11 nghìn tỷ không?\n건설 빼고 다 팔아서 7조면 우리가 잘하면 11조까지 만들 수 있나요?\nIf we sell everything except construction for 7 trillion, can we make it up to 11 trillion if we do well?","sourceUid":"merged-0803","sourceNo":803,"viRanges":[{"start":3611.087603,"end":3616.747863}],"koRanges":[{"start":3607.42,"end":3612.91}]},{"id":1183,"readerNo":1184,"displayNo":804,"n":804,"kind":"sub","type":"merged","vi":"Không dễ nhưng không phải không thể.","ko":"쉽진 않겠지만 불가능하진 않습니다.","en":"It won't be easy, but it's not impossible.","text":"Không dễ nhưng không phải không thể.\n쉽진 않겠지만 불가능하진 않습니다.\nIt won't be easy, but it's not impossible.","sourceUid":"merged-mqcepx33-155","sourceNo":804,"viRanges":[{"start":3616.747863,"end":3620.183493}],"koRanges":[{"start":3613.94,"end":3617.49}]},{"id":1184,"readerNo":1185,"displayNo":805,"n":805,"kind":"sub","type":"merged","vi":"Nếu chúng ta bán các công ty con khác thành công,\n- thì không phải là không thể sao? - Vâng.","ko":"나머지 회사들을 잘 const $=id=>document.getElementById(id);

const VOL_KEY='master_reader_volume_'+String(project.githubSlug||project.title||'reader').replace(/[^A-Za-z0-9._-]+/g,'_');

function esc2(s){return String(s||'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]})}
function fmt(t){t=Number(t||0);let h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=Math.floor(t%60),ms=Math.round((t-Math.floor(t))*1000);if(ms>=1000){s++;ms-=1000}return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+','+String(ms).padStart(3,'0')}
function rangeLabel(arr){if(!arr||!arr.length)return '';let a=arr[0],b=arr[arr.length-1];return fmt(a.start)+' → '+fmt(b.end)+(arr.length>1?' x'+arr.length:'')}
function hasRange(k,b){let arr=k==='vi'?b.viRanges:b.koRanges;return !!(arr&&arr.length)}
function folderPath(){let f=String(project.audioFolder||'audio').trim();while(f.endsWith('/'))f=f.slice(0,-1);return f||'audio'}
function pathFor(k){let folder=folderPath();let file=k==='vi'?project.viAudioFile:project.koAudioFile;if(!file)return '';if(file.startsWith('http://')||file.startsWith('https://'))return file;if(folder==='.'||folder==='')return './'+file;if(folder.startsWith('../')||folder.startsWith('./'))return folder+'/'+file;return './'+folder+'/'+file}
function clampVol(v){v=Number(v);if(!Number.isFinite(v))v=100;return Math.max(0,Math.min(200,v))}
function loadVolSettings(){try{return JSON.parse(localStorage.getItem(VOL_KEY)||'{}')||{}}catch(e){return {}}}
function saveVolSettings(){try{localStorage.setItem(VOL_KEY,JSON.stringify({vi:clampVol($('viVol')?.value||100),ko:clampVol($('koVol')?.value||100)}))}catch(e){}}
function volValue(k){return clampVol($(k+'Vol')?.value||100)}
function ensureGain(){
  try{
    const a=engine();
    if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(!mediaSource){
      mediaSource=audioCtx.createMediaElementSource(a);
      gainNode=audioCtx.createGain();
      mediaSource.connect(gainNode);
      gainNode.connect(audioCtx.destination);
    }
    if(audioCtx.state==='suspended')audioCtx.resume().catch(()=>{});
    return true;
  }catch(e){return false}
}
function applyVisibleVolume(k){
  const v=volValue(k), label=$(k+'VolLabel');
  if(label)label.textContent=Math.round(v)+'%';
}
function applyEngineVolume(k){
  engineKind=k||engineKind||'vi';
  const v=volValue(engineKind), a=engine();
  const ok=ensureGain();
  if(ok&&gainNode){a.volume=1;gainNode.gain.value=v/100}
  else a.volume=Math.min(1,v/100);
  applyVisibleVolume(engineKind);
}
function setReaderVolume(k,v,persist=true){
  const slider=$(k+'Vol');
  if(slider)slider.value=String(clampVol(v));
  applyVisibleVolume(k);
  if(engineKind===k)applyEngineVolume(k);
  if(persist)saveVolSettings();
}
function initReaderVolumeControls(){
  const saved=loadVolSettings();
  ['vi','ko'].forEach(k=>{
    const slider=$(k+'Vol');
    const val=clampVol(saved[k]??100);
    if(slider){
      slider.value=String(val);
      slider.oninput=()=>setReaderVolume(k,slider.value,true);
      slider.onchange=()=>setReaderVolume(k,slider.value,true);
    }
    setReaderVolume(k,val,false);
  });
}
function loadPaths(){viUrl=pathFor('vi');koUrl=pathFor('ko');applyVisibleVolume('vi');applyVisibleVolume('ko');$('audioInfo').textContent='Paths: '+viUrl+' | '+koUrl}
function showAudioPaths(){alert('VI: '+viUrl+'\nKO: '+koUrl+'\n\nNếu đặt reader trong thư mục subtitle-master, audio folder thường là ../audio.')}
function loadLocal(k,f){if(!f)return;if(k==='vi')viUrl=URL.createObjectURL(f);else koUrl=URL.createObjectURL(f);applyVisibleVolume(k);$('audioInfo').textContent='Loaded local '+k+': '+f.name}
function toggleAudio(){toggleSettings()}

function badgeHtml(b){
  const vi=hasRange('vi',b)?'<span class="badge vi timingBadge">VI '+rangeLabel(b.viRanges)+'</span>':'<span class="badge no">No VI</span>';
  const ko=hasRange('ko',b)?'<span class="badge vi timingBadge">KO '+rangeLabel(b.koRanges)+'</span>':'<span class="badge no">No KO</span>';
  const type=b.kind==='narration'?'<span class="badge narr">Narration</span>':'<span class="badge">Cue</span>';
  return '<div class="badges">'+type+vi+ko+'</div>';
}
function render(){
  const q=($('q').value||'').toLowerCase();
  let h='';
  project.blocks.forEach(function(b,i){
    const hay=[b.vi,b.ko,b.en,b.text,b.displayNo,b.sourceNo].join(' ').toLowerCase();
    if(q&&!hay.includes(q))return;
    const title=(b.kind==='narration'?'Narration #':'Cue #')+(b.displayNo||b.sourceNo||i+1);
    h+='<div class="item '+(b.kind==='narration'?'narr':'')+' '+(i===idx?'active':'')+'" onclick="idx='+i+';render()">';
    h+='<div class="meta"><span>'+esc2(title)+'</span><span>'+(i===idx?'SELECTED':'')+'</span></div>';
    h+=badgeHtml(b);
    h+='<div class="txt">'+(b.vi?'<div>'+esc2(b.vi)+'</div>':'')+(b.ko?'<div class="ko">'+esc2(b.ko)+'</div>':'')+(b.en?'<div class="en">'+esc2(b.en)+'</div>':'')+'</div>';
    h+='<div class="row" style="margin-top:8px"><button onclick="event.stopPropagation();idx='+i+';readKoCurrent()">Read KO</button><button class="good" onclick="event.stopPropagation();idx='+i+';playCurrent(\'vi\')">VI Dub</button><button class="violet" onclick="event.stopPropagation();idx='+i+';playCurrent(\'ko\')">KO Live</button><button class="warn" onclick="event.stopPropagation();idx='+i+';playCueMode()">VI→VI→KO→KO</button></div>';
    h+='</div>';
  });
  $('list').innerHTML=h||'<div class="item">Không có cue phù hợp.</div>';
  const viCount=project.blocks.filter(b=>hasRange('vi',b)).length, koCount=project.blocks.filter(b=>hasRange('ko',b)).length;
  $('stat').textContent=project.blocks.length+' blocks · VI '+viCount+' · KO '+koCount+' · current '+(idx+1);
}
function cur(){return project.blocks[idx]||{}}
function prev(){idx=Math.max(0,idx-1);render();scrollActive()}
function next(){idx=Math.min(project.blocks.length-1,idx+1);render();scrollActive()}
function scrollActive(){document.querySelector('.item.active')?.scrollIntoView({block:'center',behavior:'smooth'})}
function stopAll(){stop=true;token++;engine().pause();try{speechSynthesis.cancel()}catch(e){}}

function wait(ms){return new Promise(r=>setTimeout(r,ms))}
function waitMedia(a,timeout){timeout=timeout||6000;return new Promise(res=>{if(a.readyState>=1)return res(true);let done=false;function ok(){if(done)return;done=true;clean();res(true)}function bad(){if(done)return;done=true;clean();res(false)}function clean(){a.removeEventListener('loadedmetadata',ok);a.removeEventListener('canplay',ok);a.removeEventListener('error',bad);clearTimeout(to)}a.addEventListener('loadedmetadata',ok,{once:true});a.addEventListener('canplay',ok,{once:true});a.addEventListener('error',bad,{once:true});let to=setTimeout(bad,timeout)})}
async function unlockAudio(){try{let a=engine();let src=viUrl||koUrl||pathFor('vi')||pathFor('ko');if(!src){alert('Chưa có audio path.');return false}if(a.src!==new URL(src,location.href).href){a.src=src;a.load();await waitMedia(a,5000)}let vol=a.volume;a.volume=0.001;await a.play();a.pause();a.volume=vol||1;applyEngineVolume(engineKind||'vi');unlocked=true;$('audioInfo').textContent+=' | unlocked';return true}catch(e){alert('iPhone chưa cho unlock audio. Bấm lại Unlock iPhone Audio. '+(e.message||e));return false}}
function playRange(src,r,myToken,k){
  return new Promise(async res=>{
    if(!src||!r){res(false);return}
    const a=engine();stop=false;
    try{
      const abs=new URL(src,location.href).href;
      if(a.src!==abs){a.pause();a.src=src;a.load();await waitMedia(a,7000)}
      applyEngineVolume(k||'vi');
      a.currentTime=Math.max(0,Number(r.start)||0);
      const end=Math.max(Number(r.end)||0,(Number(r.start)||0)+.2);
      function finish(ok){a.removeEventListener('timeupdate',tick);a.removeEventListener('ended',ended);a.removeEventListener('error',err);res(ok)}
      function tick(){if(stop||myToken!==token){a.pause();finish(false);return}if(a.currentTime>=end-0.03){a.pause();finish(true)}}
      function ended(){finish(true)} function err(){finish(false)}
      a.addEventListener('timeupdate',tick);a.addEventListener('ended',ended,{once:true});a.addEventListener('error',err,{once:true});
      await a.play();
    }catch(e){$('audioInfo').textContent='Không phát được audio: '+(e.message||e)+' | '+src;res(false)}
  })
}
async function playAudioKind(k,myToken){
  const b=cur();const ranges=k==='vi'?b.viRanges:b.koRanges;const src=k==='vi'?viUrl:koUrl;
  if(!ranges||!ranges.length)return false;
  let any=false;
  for(const r of ranges){if(stop||myToken!==token)break;let ok=await playRange(src,r,myToken,k);any=any||ok}
  return any;
}
async function playCurrent(k){const my=++token;stop=false;const ok=await playAudioKind(k,my);if(!ok)await readKoCurrent()}

function getBestVoice(lang){
  try{
    const voices=speechSynthesis.getVoices()||[];
    const prefix=String(lang||'').slice(0,2).toLowerCase();
    const scored=voices.map(v=>{
      const hay=((v.lang||'')+' '+(v.name||'')).toLowerCase();
      let score=0;
      if((v.lang||'').toLowerCase().startsWith(prefix))score+=100;
      if(lang==='ko-KR' && /ko|korean|한국|yuna|siri|google|microsoft|samsung|premium|enhanced/.test(hay))score+=60;
      if(lang==='vi-VN' && /vi|vietnam|tiếng việt|vietnamese|google|microsoft|premium|enhanced/.test(hay))score+=60;
      if(v.localService)score+=5;
      return {v,score};
    }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
    return scored[0]?.v||null;
  }catch(e){return null}
}
function readTts(text,lang,myToken,rate){
  return new Promise(res=>{
    text=String(text||'').trim();
    if(!text){res(false);return}
    try{
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text.slice(0,1200));
      u.lang=lang;
      u.rate=rate||1;
      u.pitch=1;
      const v=getBestVoice(lang); if(v)u.voice=v;
      let done=false;
      function finish(ok){if(done)return;done=true;res(ok)}
      u.onend=()=>finish(true);u.onerror=()=>finish(false);
      speechSynthesis.speak(u);
      setTimeout(()=>{if(myToken!==token){speechSynthesis.cancel();finish(false)}},50);
    }catch(e){res(false)}
  })
}
function readKo(text,myToken){return readTts(text,'ko-KR',myToken,0.88)}
function readVi(text,myToken){return readTts(text,'vi-VN',myToken,0.95)}
function readKoCurrent(){const my=++token;stop=false;return readKo(cur().ko||cur().text||'',my)}
function readViCurrent(){const my=++token;stop=false;return readVi(cur().vi||'',my)}
if('speechSynthesis' in window){speechSynthesis.onvoiceschanged=()=>{try{speechSynthesis.getVoices()}catch(e){}}}

async function playByModeForCurrent(mode,my){
  const b=cur();
  const hasVi=hasRange('vi',b), hasKo=hasRange('ko',b);
  if(mode==='vi-readvi-readko-ko'){
    if(hasVi) await playAudioKind('vi',my); else await readVi(b.vi||'',my);
    if(stop||my!==token)return;
    await readKo(b.ko||b.text||'',my);
    if(stop||my!==token)return;
    if(hasKo) await playAudioKind('ko',my);
  }else if(mode==='vi-readko-ko'){
    if(hasVi) await playAudioKind('vi',my);
    if(stop||my!==token)return;
    await readKo(b.ko||b.text||'',my);
    if(stop||my!==token)return;
    if(hasKo) await playAudioKind('ko',my);
  }else if(mode==='vi-ko'){
    if(hasVi)await playAudioKind('vi',my);
    if(stop||my!==token)return;
    if(hasKo)await playAudioKind('ko',my);
    else if(!hasVi)await readKo(b.ko||b.text||'',my);
  }else if(mode==='vi'){
    const ok=await playAudioKind('vi',my);
    if(!ok)await readVi(b.vi||'',my);
  }else if(mode==='ko'){
    const ok=await playAudioKind('ko',my);
    if(!ok)await readKo(b.ko||b.text||'',my);
  }else if(mode==='readko'){
    await readKo(b.ko||b.text||'',my);
  }
}
async function playCueMode(){
  const my=++token;stop=false;
  await playByModeForCurrent($('mode').value,my);
}
async function smart(){
  stop=false;const my=++token;
  const mode=$('mode').value;
  if((mode==='vi-readko-ko'||mode==='vi-readvi-readko-ko')&&!unlocked&&/iPad|iPhone|iPod/.test(navigator.userAgent)){await unlockAudio()}
  for(;idx<project.blocks.length&&my===token&&!stop;idx++){
    render();scrollActive();
    await playByModeForCurrent(mode,my);
    if(stop||my!==token)break;
  }
}
initReaderVolumeControls();loadPaths();render();
</script>
