"narration","text":"Vâng.\n네.\nYes.","sourceUid":"merged-0359","sourceNo":359},{"id":331,"readerNo":332,"displayNo":360,"n":360,"type":"narration","text":"Min Jeong,\nở tổng công ty cô cũng vậy à?\n민정 씨, 본사에서도 이랬어?\nMin Jeong,\nwere you like this at the HQ, too?","sourceUid":"merged-mq99c6q7-777","sourceNo":360},{"id":332,"readerNo":333,"displayNo":361,"n":361,"type":"narration","text":"Ý anh là gì?\n무슨 말씀이시죠?","sourceUid":"merged-mq90mx6c-214","sourceNo":361},{"id":333,"readerNo":334,"displayNo":362,"n":362,"type":"narration","text":"Cô cũng nghiêm túc như thế này ở tổng công ty sao?\n아니, 본사에서도 이렇게 딱딱하게 굴었냐고.\nWhat do you mean?\nWere you also so stiff back at the HQ?","sourceUid":"merged-mq99cg33-778","sourceNo":362},{"id":334,"readerNo":335,"displayNo":363,"n":363,"type":"narration","text":"Hay cô coi thường chi nhánh cửa hàng\nvì mình đến từ tổng công ty?\nMin Jeong.\nCô nghĩ mình sẽ quay lại tổng công ty sao?\n아니면 본사 출신이라고 현장 무시하는 거야?\nOr are you looking down on the storefront\nbecause you're from HQ?\nMin Jeong.\nDo you think you'll go back to HQ?","sourceUid":"merged-mq99cr6f-779","sourceNo":363},{"id":335,"readerNo":336,"displayNo":364,"n":364,"type":"narration","text":"Trong thời gian ở đây, cô Min Jeong cần sự ủng hộ của tôi\n여기서는 내가 밀어줘야 돼.\nWhile you're here, you need my support\nfor things to open up for you, Min Jeong.","sourceUid":"merged-mq99d1uv-780","sourceNo":364},{"id":336,"readerNo":337,"displayNo":365,"n":365,"type":"narration","text":"vậy mới có thể tiến xa hơn chứ.\n그래야 민정 씨도 앞날이 쫙 풀리지.\nThat way, Min-jeong, your future will be wide open.","sourceUid":"merged-mq911tg0-219","sourceNo":365},{"id":337,"readerNo":338,"displayNo":366,"n":366,"type":"narration","text":"Cô hiểu ý tôi chứ?\n뭔 말인지 알지?\nYou get what I mean, right?","sourceUid":"merged-mq99dexi-781","sourceNo":366},{"id":338,"readerNo":339,"displayNo":367,"n":367,"type":"narration","text":"Chị, có khách cần tư vấn.\n언니, 여기 상담\nEonni, they need a consultation.","sourceUid":"merged-mq990x8g-657","sourceNo":367},{"id":339,"readerNo":340,"displayNo":368,"n":368,"type":"narration","text":"Vâng.\n네\nOkay.","sourceUid":"merged-mq990pj4-656","sourceNo":368},{"id":340,"readerNo":341,"displayNo":369,"n":369,"type":"narration","text":"Xin chào.\n안녕하세요\nHello.","sourceUid":"merged-0369","sourceNo":369},{"id":341,"readerNo":342,"displayNo":370,"n":370,"type":"narration","text":"Chỗ này có được ưa chuộng không?\n이거 인기 많아요?\nIs this popular?","sourceUid":"merged-mq98zzso-653","sourceNo":370},{"id":342,"readerNo":343,"displayNo":371,"n":371,"type":"narration","text":"Tôi cũng không rõ nữa.\n글쎄요\nI'm not sure.","sourceUid":"merged-0371","sourceNo":371},{"id":343,"readerNo":344,"displayNo":371,"n":371,"type":"narration","text":"Để tôi xem nào.\n글쎄요\nI'm not sure.","sourceUid":"merged-mq913y4i-223","sourceNo":371},{"id":344,"readerNo":345,"displayNo":372,"n":372,"type":"narration","text":"Vợ à, nếu em hỏi như vậy ở đây,\ndĩ nhiên cô ấy sẽ nói mọi thứ đều tốt.\n자기야, 여기서 보면 다 좋다고 하시는데\nHoney, if you ask that here,\nof course, she'll say everything's good.\nShe works here.","sourceUid":"merged-mq99fhx2-882","sourceNo":372},{"id":345,"readerNo":346,"displayNo":373,"n":373,"type":"narration","text":"Cô ấy làm việc ở đây mà.\n직원인데\nI'm an employee.","sourceUid":"merged-mq914m47-225","sourceNo":373},{"id":346,"readerNo":347,"displayNo":374,"n":374,"type":"narration","text":"Trước tiên, tôi sẽ tính điểm của anh chị.\nAnh chị đạt 42 điểm,\nngang với mức điểm chuẩn dự kiến.\n일단 가점 계산해드리면 42점이니까 예상 코트라인인데요\nFirst, let me calculate your score.\nIt's 42 points\nso you're at the estimated cutoff score.","sourceUid":"merged-mq99fsnh-883","sourceNo":374},{"id":347,"readerNo":348,"displayNo":375,"n":375,"type":"narration","text":"Đối với căn hộ 84 x 84, có 55 căn,\n84제곱은 55개가 나왔는데\nFor 84 x 84 apartments, there are 55 available,","sourceUid":"merged-mq99kc00-890","sourceNo":375},{"id":348,"readerNo":349,"displayNo":376,"n":376,"type":"narration","text":"nhưng có đến 2.380 người nộp đơn.\n지금까지 청약하신 분이 2,380명이거든요.\nbut there are 2,380 applicants.","sourceUid":"merged-mq99k81s-889","sourceNo":376},{"id":349,"readerNo":350,"displayNo":377,"n":377,"type":"dialogue","text":"Tỷ lệ cạnh tranh là hơn 43:1.\n경쟁률이 43배가 조금 넘어요.\nThe competition is a little greater than 43:1.","sourceUid":"merged-mq99k4jr-888","sourceNo":377},{"id":350,"readerNo":351,"displayNo":378,"n":378,"type":"narration","text":"Có vẻ sắp tới sẽ có thêm khoảng 3 lần người đăng ký nữa, nếu tính khoảng 4 lần thì sẽ là khoảng 173 lần.\n앞으로 3배 정도 더 지원할 것 같으니 대략 4배로 계산하면 173배 정도네요.","sourceUid":"merged-0378","sourceNo":378},{"id":351,"readerNo":352,"displayNo":378,"n":378,"type":"dialogue","text":"Con số này có thể tăng lên gấp ba lần,\nnếu nhân bốn lần thì tỷ lệ sẽ là khoảng 173:1.\n앞으로 3배 정도 더 지원할 것 같으니 대략 4배로 계산하면 173배 정도네요.\nThat'll likely increase by three times,\nso quadrupling it would be about 173:1.","sourceUid":"merged-mq99jyeh-887","sourceNo":378},{"id":352,"readerNo":353,"displayNo":379,"n":379,"type":"narration","text":"Thấy chưa? Họ chỉ đọc lại những gì đã học thuộc thôi.\n거 봐. 외운 대로 말았지?\nSee? They say lines they've memorized.","sourceUid":"merged-mq99ktuf-891","sourceNo":379},{"id":353,"readerNo":354,"displayNo":380,"n":380,"type":"narration","text":"Đúng không?\n그쵸?\nRight?","sourceUid":"merged-mq91i69y-263","sourceNo":380},{"id":354,"readerNo":355,"displayNo":381,"n":381,"type":"narration","text":"Anh có thể tự tính toán mà, hoàn toàn chính xác đấy.\n계산해 보세요. 맞으니까.\nYou can calculate it yourself. It's correct.","sourceUid":"merged-mq99l7k7-892","sourceNo":381},{"id":355,"readerNo":356,"displayNo":382,"n":382,"type":"narration","text":"Để tôi suy nghĩ một chút.\n잠깐만요.\nGive me a second.","sourceUid":"merged-mq99lbtl-893","sourceNo":382},{"id":356,"readerNo":357,"displayNo":383,"n":383,"type":"narration","text":"Cô ấy nói là 43...\nNhân với 4, đúng không?\n43 곱하기 4배라고 했지?\nShe said 43\nmultiplied by 4, right?","sourceUid":"merged-mq99lm3y-894","sourceNo":383},{"id":357,"readerNo":358,"displayNo":384,"n":384,"type":"narration","text":"Vợ à, 43 nhân 4 là 172.\n자기야, 4x3 곱하기 4가 170이거든.\nHoney, 43 times 4 is 172.","sourceUid":"merged-mq99lq8f-895","sourceNo":384},{"id":358,"readerNo":359,"displayNo":385,"n":385,"type":"narration","text":"Nhưng cô ấy nói là 173.\n근데 저 사람 173이라고 했어\nBut she said it was 173.","sourceUid":"merged-mq99luev-896","sourceNo":385},{"id":359,"readerNo":360,"displayNo":386,"n":386,"type":"narration","text":"Tôi đã nói là hơn 43 một chút mà.\n제가 43배가 조금 넘는다고 말씀드렸잖아요\nI told you that it's a little over 43.","sourceUid":"merged-mq99m0e7-897","sourceNo":386},{"id":360,"readerNo":361,"displayNo":387,"n":387,"type":"narration","text":"Chính xác thì là 43.2727272727 lặp lại.\n정확히는 43.27272727이 계속돼요\nTo be exact, it's 43.2727272727 repeating.","sourceUid":"merged-mq99m57y-898","sourceNo":387},{"id":361,"readerNo":362,"displayNo":388,"n":388,"type":"narration","text":"Nên nếu nhân 4 thì sẽ là 173.0909090909 lặp lại.\n그 4배는 173.09090909가 계속되고요\nSo quadruple that would be 173.0909090909 repeating.","sourceUid":"merged-mq99mah3-899","sourceNo":388},{"id":362,"readerNo":363,"displayNo":389,"n":389,"type":"narration","text":"Vậy nên, 173 là con số chính xác hơn.\n그러니까 173이 더 맞는 숫자예요\nSo 173 is the more accurate number.","sourceUid":"merged-mq99menq-900","sourceNo":389},{"id":363,"readerNo":364,"displayNo":390,"n":390,"type":"narration","text":"Wow, cô giống như máy tính vậy.\n언니 완전 컴퓨터네요\nWow, you're like a computer.","sourceUid":"merged-mq99mj9r-901","sourceNo":390},{"id":364,"readerNo":365,"displayNo":391,"n":391,"type":"narration","text":"Không hẳn.\n그건 아니지만\nNot really.","sourceUid":"merged-mq99mz2f-902","sourceNo":391},{"id":365,"readerNo":366,"displayNo":392,"n":392,"type":"narration","text":"Nhưng phép tính thì chính xác.\n계산은 맞아요\nBut the calculation is correct.","sourceUid":"merged-mq99n2z3-903","sourceNo":392},{"id":366,"readerNo":367,"displayNo":393,"n":393,"type":"narration","text":"À mà, nếu chị đang mang thai...\n혹시 임신하신 거면\nBy the way, if you are pregnant...","sourceUid":"merged-mq99n71j-904","sourceNo":393},{"id":367,"readerNo":368,"displayNo":394,"n":394,"type":"narration","text":"Sao cô biết tôi đang mang thai?\n어떻게 아셨어요? 저 임신한 거?\nHow did you know that I'm pregnant?","sourceUid":"merged-mq99nc3b-905","sourceNo":394},{"id":368,"readerNo":369,"displayNo":395,"n":395,"type":"narration","text":"Gì cơ? Vợ, em mang thai à?\n뭐야? 저기 임신했어?\nWhat? Honey, are you pregnant?","sourceUid":"merged-mq99nhxy-906","sourceNo":395},{"id":369,"readerNo":370,"displayNo":396,"n":396,"type":"narration","text":"Tổ trưởng Yoon?\n팀장님?\nMr. Yun?","sourceUid":"merged-mq99no0u-907","sourceNo":396},{"id":370,"readerNo":371,"displayNo":397,"n":397,"type":"narration","text":"Trưởng nhóm!\n팀장님!\nTeam leader!","sourceUid":"merged-0397","sourceNo":397},{"id":371,"readerNo":372,"displayNo":398,"n":398,"type":"narration","text":"Tổ trưởng, sao anh lại ở đây?\n여기 어떻게 오셨어요?\nMr. Yun, how did you get here?","sourceUid":"merged-mq99nuca-908","sourceNo":398},{"id":372,"readerNo":373,"displayNo":399,"n":399,"type":"narration","text":"Tôi đi taxi tới.\n택시 타고요\nI came by taxi.","sourceUid":"merged-mq99nyu0-909","sourceNo":399},{"id":373,"readerNo":374,"displayNo":400,"n":400,"type":"narration","text":"Không... Ý tôi là...\n아니요\nNo... I mean...","sourceUid":"merged-mq99o2vq-910","sourceNo":400},{"id":374,"readerNo":375,"displayNo":401,"n":401,"type":"narration","text":"Anh bị giáng chức à?\n그... 자천당하신 거예요?\nwere you demoted?","sourceUid":"merged-mq99odp2-911","sourceNo":401},{"id":375,"readerNo":376,"displayNo":402,"n":402,"type":"narration","text":"Không hẳn là vậy, nhưng cũng gần giống.\n아, 그런 건 아니고\nAh, it's not exactly that.","sourceUid":"merged-mq922cnp-53","sourceNo":402},{"id":376,"readerNo":377,"displayNo":403,"n":403,"type":"narration","text":"Cũng na ná thế.\n뭐 비슷한 건데\nIt's not like that, but it's something similar.","sourceUid":"merged-mq99oibb-912","sourceNo":403},{"id":377,"readerNo":378,"displayNo":404,"n":404,"type":"narration","text":"Cô có muốn làm cùng tôi không?\n나랑 같이 일할 수 있어요?\nCan you work with me?","sourceUid":"merged-mq99omdz-913","sourceNo":404},{"id":378,"readerNo":379,"displayNo":405,"n":405,"type":"narration","text":"- Yeong Soo. - Vâng?\n연수씨\nYour consultation.\n- Yeong Su. - Yes?","sourceUid":"merged-mq99p19u-914","sourceNo":405},{"id":379,"readerNo":380,"displayNo":406,"n":406,"type":"narration","text":"Nếu chị đang mang thai,\nhãy chọn căn hộ có thể ở được nhiều người hơn.\n임신하신 거면 다자녀랑 딴 거 하세요\nIf you're pregnant, get a different one for more kids.","sourceUid":"merged-mq99pi52-915","sourceNo":406},{"id":380,"readerNo":381,"displayNo":407,"n":407,"type":"narration","text":"Nếu là tôi, tôi sẽ không chọn căn này đâu.\n저라면 이거 그냥 안 받아요\nI wouldn't get this one if I were you.","sourceUid":"merged-mq99plso-916","sourceNo":407},{"id":381,"readerNo":382,"displayNo":408,"n":408,"type":"narration","text":"Cô được điều chuyển về đây khi nào?\n여기로 발령은 언제 난 거예요?\nWhen did you get transferred here?","sourceUid":"merged-mq99pqkm-917","sourceNo":408},{"id":382,"readerNo":383,"displayNo":409,"n":409,"type":"narration","text":"Ngay sau khi Tổ trưởng rời đi.\n팀장님 가시고 얼마 지나지 않아서요.\nIt was shortly after you left, Mr. Yun.","sourceUid":"merged-mq99puef-918","sourceNo":409},{"id":383,"readerNo":384,"displayNo":410,"n":410,"type":"narration","text":"Là quyết định của Giám đốc Ha, đúng không?\n하정우님 결정인 거죠?\nIt was Mr. Ha's decision, right?","sourceUid":"merged-mq99py9j-919","sourceNo":410},{"id":384,"readerNo":385,"displayNo":411,"n":411,"type":"narration","text":"Nhưng làm việc ở đó tôi thấy rất vui.\n근데 저는 거기 재밌었어요.\nBut working there was fun for me.","sourceUid":"merged-mq99q2j4-920","sourceNo":411},{"id":385,"readerNo":386,"displayNo":412,"n":412,"type":"narration","text":"Lẽ ra cô nên tìm một công việc khác.\nNhiều nơi chắc chắn muốn tuyển cô.\n이 집 가시지. 찾는 데 많았을 텐데.\nYou should've gotten a new job.\nMany places would've wanted you.","sourceUid":"merged-mq99q7t2-921","sourceNo":412},{"id":386,"readerNo":387,"displayNo":413,"n":413,"type":"narration","text":"Thực ra, chẳng ai muốn tuyển tôi cả.\n찾는 데? 없던데요?\nActually, no one wanted me.","sourceUid":"merged-mq99qexb-922","sourceNo":413},{"id":387,"readerNo":388,"displayNo":414,"n":414,"type":"narration","text":"Thế thì tốt.\n다행이네요\nThat's a relief.","sourceUid":"merged-mq9261df-64","sourceNo":414},{"id":388,"readerNo":389,"displayNo":415,"n":415,"type":"narration","text":"Nhưng chúng ta đang đi đâu ở Suwon vậy?\n수원 어디죠? 지금 우리 가는 데가?\nWhere in Suwon? Where are we going now?","sourceUid":"merged-mq9269t4-65","sourceNo":415},{"id":389,"readerNo":390,"displayNo":416,"n":416,"type":"narration","text":"Ừ.\n어\nUh","sourceUid":"merged-0416","sourceNo":416},{"id":390,"readerNo":391,"displayNo":417,"n":417,"type":"narration","text":"Văn phòng luật sư.\n법률사무소.\nLaw firm.","sourceUid":"merged-0417","sourceNo":417},{"id":391,"readerNo":392,"displayNo":418,"n":418,"type":"narration","text":"Luật sư Oh Sun-young.\nVăn phòng luật Hyerang.\n오순영 변호사님\nAttorney Oh Sun-young","sourceUid":"merged-mq926qot-66","sourceNo":418},{"id":392,"readerNo":393,"displayNo":419,"n":419,"type":"narration","text":"Chú.\n삼촌\nUncle","sourceUid":"merged-0419","sourceNo":419},{"id":393,"readerNo":394,"displayNo":420,"n":420,"type":"narration","text":"Hả?\n응?\nHuh?","sourceUid":"merged-0420","sourceNo":420},{"id":394,"readerNo":395,"displayNo":421,"n":421,"type":"narration","text":"Mình gọi món thịt xào chua ngọt được không ạ?\n탕수육 하나 먹으면 안 돼?\nCan't I just have one piece of sweet and sour pork?","sourceUid":"merged-mq928xl6-68","sourceNo":421},{"id":395,"readerNo":396,"displayNo":422,"n":422,"type":"narration","text":"Không được.\n응, 안 돼\nNo, you can't.","sourceUid":"merged-mq9295u0-69","sourceNo":422},{"id":396,"readerNo":397,"displayNo":423,"n":423,"type":"narration","text":"Tháng này chúng ta chưa có vụ kiện nào cả.\n이번 달 수입 하나도 못 했어\nI didn't make any income this month.","sourceUid":"merged-mq929gaa-70","sourceNo":423},{"id":397,"readerNo":398,"displayNo":424,"n":424,"type":"narration","text":"Đó là lỗi của chú, không phải của cháu.\n내가 못했나? 삼촌이 못했지\nDid I fail? It was you, Uncle, who failed.","sourceUid":"merged-mq92a48t-71","sourceNo":424},{"id":398,"readerNo":399,"displayNo":425,"n":425,"type":"narration","text":"Này, luật sư.\n저리 해줘, 변호사 양반\nStep aside, Mr. Lawyer.","sourceUid":"merged-mq92j06p-72","sourceNo":425},{"id":399,"readerNo":400,"displayNo":426,"n":426,"type":"narration","text":"Anh còn nhớ chuyện tôi nói lần trước không?\n내가 저번에 말했던 거\nWhat I told you last time.","sourceUid":"merged-mq92j6uh-73","sourceNo":426},{"id":400,"readerNo":401,"displayNo":427,"n":427,"type":"narration","text":"Nhưng mà... tôi không gọi món này.\n근데 우리 이거 안 시켰는데요?\nB-But we didn't order this.","sourceUid":"merged-mq9dikqe-64","sourceNo":427},{"id":401,"readerNo":402,"displayNo":428,"n":428,"type":"narration","text":"Cứ thử đi. Món này bán chạy nhất quán tôi đấy.\n아 드셔봐 이거 우리 집에서 제일 잘 나가는 거니까\nTry it. This is the best-selling dish in our restaurant.","sourceUid":"merged-mq9diybj-65","sourceNo":428},{"id":402,"readerNo":403,"displayNo":429,"n":429,"type":"narration","text":"Cảm ơn anh.\n감사합니다\nThank you.","sourceUid":"merged-0429","sourceNo":429},{"id":403,"readerNo":404,"displayNo":430,"n":430,"type":"narration","text":"Tôi đã nói với anh\nlà gã môi giới nhà đất đó bêu xấu tôi, anh nhớ không?\n내가 저기 복덕방 놈이 배욕 감사됐다고 했지\nI told you that real estate agent said he was appointed as the audit director.\nI told you that realtor is badmouthing me, right?","sourceUid":"merged-mq9dhook-62","sourceNo":430},{"id":404,"readerNo":405,"displayNo":431,"n":431,"type":"narration","text":"Tôi đang thắc mắc liệu đó có phải là tội phỉ báng không.\n혹시 그게 그 명예훼손이 되는 게 아닌가라는 거지\nI was wondering if that might constitute defamation.\nI was wondering if that may be defamation.","sourceUid":"merged-mq9dhavy-61","sourceNo":431},{"id":405,"readerNo":406,"displayNo":432,"n":432,"type":"narration","text":"Là tên môi giới nhà đất à?\n그게 부동산 아저씨였어요?\nIt was the realtor?","sourceUid":"merged-mq9dk524-66","sourceNo":432},{"id":406,"readerNo":407,"displayNo":433,"n":433,"type":"narration","text":"Hắn ta đã nói gì?\n뭐라고 하고 다녔는데요?\nWhat did he go around saying?","sourceUid":"merged-mq9dkdrw-67","sourceNo":433},{"id":407,"readerNo":408,"displayNo":434,"n":434,"type":"narration","text":"Tên khốn đó đi khắp nơi nói rằng\ntôi dùng thịt kỳ lạ để nấu ăn.\n이 썩을 놈이 내가 이상한 고기를 쓴다고\nThat rotten jerk went around saying\nI used weird meat in my food!","sourceUid":"merged-mq9dkou5-68","sourceNo":434},{"id":408,"readerNo":409,"displayNo":435,"n":435,"type":"narration","text":"Nó đã làm loạn lên, đúng là làm loạn.\n지랄을 한 거야 지랄을\nHe was just bullshitting, just bullshitting.","sourceUid":"merged-0435","sourceNo":435},{"id":409,"readerNo":410,"displayNo":436,"n":436,"type":"narration","text":"Anh có biết bắt chim bồ câu khó thế nào không?\n비둘기 잡는 게 얼마나 힘든데\nDo you know how hard it is to catch pigeons?","sourceUid":"merged-mq9dkufw-69","sourceNo":436},{"id":410,"readerNo":411,"displayNo":437,"n":437,"type":"narration","text":"Vậy việc này\nlà phỉ báng dựa trên sự thật và\n어 그러니까 그게 사실적지에 의한 명예훼손이 있고\nSo, the thing is,\nthere is defamation by truthful statement","sourceUid":"merged-mq9dl7e9-70","sourceNo":437},{"id":411,"readerNo":412,"displayNo":438,"n":438,"type":"narration","text":"phỉ báng do lan truyền thông tin sai lệch.\nTrường hợp của anh là gì?\n허위사실을 유포한 게 있는데 어느 쪽이세요?\nand defamation by spreading false information.\nWhich one is it?","sourceUid":"merged-mq9dli1g-71","sourceNo":438},{"id":412,"readerNo":413,"displayNo":439,"n":439,"type":"narration","text":"Ý anh là sao?\n아 그게 뭔 소리야?\nWhat does that mean?","sourceUid":"merged-mq9dlp3o-72","sourceNo":439},{"id":413,"readerNo":414,"displayNo":440,"n":440,"type":"narration","text":"Tôi đang hỏi anh dùng loại thịt gì.\n어떤 고기를 쓰시냐고요?\nI'm asking what meat you use.","sourceUid":"merged-mq9dlvn0-73","sourceNo":440},{"id":414,"readerNo":415,"displayNo":441,"n":441,"type":"narration","text":"Thịt bồ câu.\n비둘기\nPigeons.","sourceUid":"merged-mq9dlz20-74","sourceNo":441},{"id":415,"readerNo":416,"displayNo":442,"n":442,"type":"narration","text":"Đùa thôi.\n농담이에요\nIt's a joke.","sourceUid":"merged-mq9dm68c-75","sourceNo":442},{"id":416,"readerNo":417,"displayNo":443,"n":443,"type":"narration","text":"Đùa mà.\n농담\nA joke!","sourceUid":"merged-mq9dmdfc-76","sourceNo":443},{"id":417,"readerNo":418,"displayNo":444,"n":444,"type":"narration","text":"Chúng tôi chỉ ăn thịt heo loại A thôi, đúng không?\n우리 1등급 돼지고기만 쓰지\nWe only use Grade-A pork for our food.","sourceUid":"merged-mq9dmje2-77","sourceNo":444},{"id":418,"readerNo":419,"displayNo":445,"n":445,"type":"narration","text":"Đúng nhỉ?\nVậy thì đó là lan truyền thông tin sai lệch.\n그러면 허위사실 유포가 맞는데\nRight?\nThen it is spreading false information,","sourceUid":"merged-mq9dmq5x-78","sourceNo":445},{"id":419,"readerNo":420,"displayNo":446,"n":446,"type":"narration","text":"Nhưng thôi cứ giữ hòa khí đi.\n그냥 두 분이서 화해하세요\nbut just make peace.","sourceUid":"merged-mq9dmvsu-79","sourceNo":446},{"id":420,"readerNo":421,"displayNo":447,"n":447,"type":"narration","text":"Tôi cũng nghe người môi giới nói,\n우리 부동산 아저씨 얘기 들어보니까\nFrom what I hear from the realtor,","sourceUid":"merged-mq9dn1ro-80","sourceNo":447},{"id":421,"readerNo":422,"displayNo":448,"n":448,"type":"narration","text":"chú đã chế giễu chú ấy bị hói mà.\n아저씨가 대머리라고 놀리고 다니셨더만요\nyou mocked him for being bald.","sourceUid":"merged-mq9dn7ek-81","sourceNo":448},{"id":422,"readerNo":423,"displayNo":449,"n":449,"type":"narration","text":"Thì anh ta bị hói thật mà.\n대머리 맞잖아요\nBut he is bald.","sourceUid":"merged-mq9dnglf-82","sourceNo":449},{"id":423,"readerNo":424,"displayNo":450,"n":450,"type":"narration","text":"Tôi có nói sai gì sao?\n내가 틀린 말 했나?\nDid I say something wrong?","sourceUid":"merged-mq9dnmrj-83","sourceNo":450},{"id":424,"readerNo":425,"displayNo":451,"n":451,"type":"narration","text":"Anh ta hói thì tôi kêu hói.\n대머리를 대머리라고 한 건데\nI called him bald because he is.","sourceUid":"merged-mq9dns8z-84","sourceNo":451},{"id":425,"readerNo":426,"displayNo":452,"n":452,"type":"narration","text":"Dù có đội tóc giả thì cũng là hói thôi.\n그리고 가발 써도 엄청 티나더만\nEven if he wears a wig, it's obvious.","sourceUid":"merged-mq9dnx8x-85","sourceNo":452},{"id":426,"readerNo":427,"displayNo":453,"n":453,"type":"narration","text":"Không, cái đó sao mà gọi là vu khống được?\n아니 그게 무슨 명예훼손이오\nNo, how is that defamation?","sourceUid":"merged-0453","sourceNo":453},{"id":427,"readerNo":428,"displayNo":454,"n":454,"type":"narration","text":"như thế chính là phỉ báng bằng những lời nói đúng sự thật rồi.\n그거는 사실적 시에 의한 명예훼손이라고\nThat's defamation based on factual assertion.","sourceUid":"merged-mq9drdu2-86","sourceNo":454},{"id":428,"readerNo":429,"displayNo":455,"n":455,"type":"narration","text":"Họ nói điều đó gây tổn thương tinh thần,\ndạo này còn bị xử phạt nghiêm hơn đấy.\n그런 거는 심적 고통을 준 거다 그래서 요즘도 엄하게 처벌하는 추세거든요\nthat is defamation by truthful statements.\nThey say it causes mental distress,\nand they punish it more strictly these days.","sourceUid":"merged-mq9e2x3o-179","sourceNo":455},{"id":429,"readerNo":430,"displayNo":456,"n":456,"type":"narration","text":"Trước đây, tổn thương thể xác quan trọng hơn,\nnhưng giờ người ta coi trọng cả nỗi đau tinh thần nữa.\n예전에는 몸 다친 게 더 중요했는데 요즘에는 마음도 중요하다는 인식이 있어요\nBodily harm used to be more important,\nbut emotional pain is considered important now.","sourceUid":"merged-mq9e36w1-180","sourceNo":456},{"id":430,"readerNo":431,"displayNo":457,"n":457,"type":"narration","text":"Thôi, thôi, không cần biết.\nTôi sẽ khiếu nại anh ta.\n몰라 몰라 몰라 나 그냥 고소할 거야\nWhatever, whatever, whatever!\nI'm just going to sue him.","sourceUid":"merged-mq9e3gnn-181","sourceNo":457},{"id":431,"readerNo":432,"displayNo":458,"n":458,"type":"narration","text":"Hai người tự thương lượng đi.\n합의 보세요 그냥\nYou two should just settle this.","sourceUid":"merged-mq9e3lpm-182","sourceNo":458},{"id":432,"readerNo":433,"displayNo":459,"n":459,"type":"narration","text":"Tên môi giới đó cứ dọa tôi hoài,\nhắn bảo con nuôi của hắn là luật sư!\n밥폭토빵 놈이 지 야가들이라는 놈이 변호사라고 엄청 겁을 주는 게\nThat realtor keeps trying to scare me\nsaying his adopted son is a lawyer!","sourceUid":"merged-mq9e3v1s-183","sourceNo":459},{"id":433,"readerNo":434,"displayNo":460,"n":460,"type":"narration","text":"Nhưng mà thời đại này mà còn nhận con nuôi à?\n아니 근데 요새 또 그 야가들이 있나?\nBut are there still adopted sons these days?","sourceUid":"merged-mq9e411n-184","sourceNo":460},{"id":434,"readerNo":435,"displayNo":461,"n":461,"type":"narration","text":"Mà sao cũng được, tôi vẫn khiếu nại anh ta.\n아무튼 나 고소할 거야\nIn any case, I will sue him.","sourceUid":"merged-mq9e49ff-185","sourceNo":461},{"id":435,"readerNo":436,"displayNo":462,"n":462,"type":"narration","text":"Việc đưa đơn xin hòa giải là\n고식장 써드리는거는\nFiling the complaint.","sourceUid":"merged-0462","sourceNo":462},{"id":436,"readerNo":437,"displayNo":463,"n":463,"type":"narration","text":"Phí viết đơn khiếu nại là 50.000 won.\n5만원\nWriting up a complaint costs 50,000 won.","sourceUid":"merged-mq9e4dl2-186","sourceNo":463},{"id":437,"readerNo":438,"displayNo":464,"n":464,"type":"narration","text":"Thôi cứ xuống nước đi để không phải hối hận về sau.\n화해하세요. 나중에 후회하지 마시고.\nJust make up instead of regretting it later.","sourceUid":"merged-mq9e4q48-187","sourceNo":464},{"id":438,"readerNo":439,"displayNo":465,"n":465,"type":"narration","text":"Không, tôi quyết rồi.\n아니요. 나 마음먹었어.\nNo, I made up my mind.","sourceUid":"merged-mq9e4u0m-188","sourceNo":465},{"id":439,"readerNo":440,"displayNo":466,"n":466,"type":"narration","text":"Hôm nay, tôi sẽ đến đồn cảnh sát.\n나 오늘 경찰서 갈게요.\nI'll go to the police station today.","sourceUid":"merged-mq9e56p9-189","sourceNo":466},{"id":440,"readerNo":441,"displayNo":467,"n":467,"type":"narration","text":"Tôi sẽ khiếu nại anh ta.\n고소할게요.\nI'll sue him.","sourceUid":"merged-mq9e5aha-190","sourceNo":467},{"id":441,"readerNo":442,"displayNo":468,"n":468,"type":"narration","text":"Này nhé.\n자.\nAll right.","sourceUid":"merged-mq9e5e3i-191","sourceNo":468},{"id":442,"readerNo":443,"displayNo":469,"n":469,"type":"narration","text":"Luật sư ấy mà, họ chẳng khác gì đám chó săn cả.\n변호사는요.\nA lawyer is like a hunting dog. A hunting dog.","sourceUid":"merged-mq9e5is8-192","sourceNo":469},{"id":443,"readerNo":444,"displayNo":470,"n":470,"type":"narration","text":"Nó giống như một con chó săn vậy.\n사냥개 같은 거예요.\nLike a hunting dog.","sourceUid":"merged-0470","sourceNo":470},{"id":444,"readerNo":445,"displayNo":471,"n":471,"type":"narration","text":"Chó săn ấy.\n사냥개.\nA hunting dog.","sourceUid":"merged-mq9dwzow-101","sourceNo":471},{"id":445,"readerNo":446,"displayNo":472,"n":472,"type":"narration","text":"Thì đó.\nNên tôi mới muốn thuê họ để cắn tên môi giới đó.\n아니, 그니까 복덕방 놈을 확 물어뜯으란 말이야.\nExactly! I want you to bite that realtor.","sourceUid":"merged-mq9e60jj-193","sourceNo":472},{"id":446,"readerNo":447,"displayNo":473,"n":473,"type":"narration","text":"Tôi sẽ đưa tiền cho cậu.\n내가 돈 줄 테니까.\nI'll give you the money.","sourceUid":"merged-mq9e647r-194","sourceNo":473},{"id":447,"readerNo":448,"displayNo":474,"n":474,"type":"narration","text":"Ý tôi là...\nNếu ta cắn tên môi giới đó,\n그러니까. 복덕방 아저씨를 그냥 확 물어뜯으면\nThat's what I mean. If I bite the realtor,","sourceUid":"merged-mq9e69tc-195","sourceNo":474},{"id":448,"readerNo":449,"displayNo":475,"n":475,"type":"narration","text":"thì liệu chú ấy có ngồi yên không?\n복덕방 아저씨가 가만히 있겠어요?\nwill he just stay put?","sourceUid":"merged-mq9e6igf-196","sourceNo":475},{"id":449,"readerNo":450,"displayNo":476,"n":476,"type":"narration","text":"Chắc chắn cũng sẽ thuê luật sư thôi.\n변호사 선임하겠죠?\nHe'll probably hire a lawyer.","sourceUid":"merged-mq9e6o2f-197","sourceNo":476},{"id":450,"readerNo":451,"displayNo":477,"n":477,"type":"narration","text":"Lỡ chú ấy cũng thuê luật sư khiếu nại chú, thì làm sao?\n그래가지고 선임해가지고 소송하면 어떻게 되겠어요?\nAnd if he does and sues you, what will happen?","sourceUid":"merged-mq9e6tb6-198","sourceNo":477},{"id":451,"readerNo":452,"displayNo":478,"n":478,"type":"narration","text":"Đương nhiên luật sư của tôi sẽ thắng rồi.\n아니, 우리 변호사님이 다 이기지.\nMy lawyer will win, of course!","sourceUid":"merged-mq9e6xfl-199","sourceNo":478},{"id":452,"readerNo":453,"displayNo":479,"n":479,"type":"narration","text":"Bọn khốn đó. Bảo chúng ngon nhào vô đây.\n이 개자식들 다 나오라고 그래\nThose sons of bitches. Tell them to come at us!","sourceUid":"merged-mq9e725c-200","sourceNo":479},{"id":453,"readerNo":454,"displayNo":480,"n":480,"type":"narration","text":"Đương nhiên, chúng ta sẽ xử hết bọn họ.\n물론 제가 다 이기죠\nOf course, I'd beat them all.","sourceUid":"merged-mq9eae9q-252","sourceNo":480},{"id":454,"readerNo":455,"displayNo":481,"n":481,"type":"narration","text":"Nhưng luật sư không đấu đá lẫn nhau đâu.\n근데 변호사끼리는 안 싸워요\nBut lawyers don't fight each other.","sourceUid":"merged-mq9eamoz-253","sourceNo":481},{"id":455,"readerNo":456,"displayNo":482,"n":482,"type":"narration","text":"Luật sư chú ấy sẽ xé xác chú,\n그쪽 사냥기는 사장님 물어뜯고\nHis lawyer will tear at you","sourceUid":"merged-mq9eavuv-254","sourceNo":482},{"id":456,"readerNo":457,"displayNo":483,"n":483,"type":"narration","text":"trong khi tôi xé xác chú môi giới.\n저는 부동산 아저씨 물어뜯고\nwhile I tear at the realtor.","sourceUid":"merged-mq9eb3zh-255","sourceNo":483},{"id":457,"readerNo":458,"displayNo":484,"n":484,"type":"narration","text":"Ý là hai người đều sẽ chịu trận,\n그럼 그냥 두 분만 죽어나는 거예요\nIt means you two will suffer","sourceUid":"merged-mq9eb9gu-256","sourceNo":484},{"id":458,"readerNo":459,"displayNo":485,"n":485,"type":"narration","text":"trong khi luật sư thì chỉ ngồi đó đếm tiền.\n변호사는 앉아가지고 돈만 버는 거고\nwhile the lawyers sit back and make money.","sourceUid":"merged-mq9ebirz-257","sourceNo":485},{"id":459,"readerNo":460,"displayNo":486,"n":486,"type":"narration","text":"Thế giờ cậu muốn tôi làm gì đây?\n그럼 뭐 어쩌라고\nThen what do you want me to do?","sourceUid":"merged-mq9ebr9b-258","sourceNo":486},{"id":460,"readerNo":461,"displayNo":487,"n":487,"type":"narration","text":"Cứ hòa giải đi.\n하시라고요\nJust make up.","sourceUid":"merged-mq9ec06h-259","sourceNo":487},{"id":461,"readerNo":462,"displayNo":488,"n":488,"type":"narration","text":"Chính vì thế mà ngay cả thịt heo chua ngọt chúng ta cũng không đủ tiền mua.\n그러니까 상수육 사 먹을 돈도 없지\nThis is why we can't afford sweet and sour pork.","sourceUid":"merged-mq9ec6o1-260","sourceNo":488},{"id":462,"readerNo":463,"displayNo":489,"n":489,"type":"narration","text":"Ôi trời, bề ngoài thì như giang hồ\n등치는 꼭 건들 같아가지고\nGeez, you're built like a gangster, but you're so scared.","sourceUid":"merged-mq9ecfnt-261","sourceNo":489},{"id":463,"readerNo":464,"displayNo":490,"n":490,"type":"narration","text":"mà lại nhát cấy như thế.\n겁은 아니\n\"Scared\"? This is not about being scared.","sourceUid":"merged-mq9ecpm5-262","sourceNo":490},{"id":464,"readerNo":465,"displayNo":491,"n":491,"type":"narration","text":"Nhát? Đây không phải vấn đề nhát hay không.\n아..이거 검..검이 아니고\nHow can you compare me to a gangster?","sourceUid":"merged-mq9ed9n4-264","sourceNo":491},{"id":465,"readerNo":466,"displayNo":492,"n":492,"type":"narration","text":"Sao chú có thể so sánh tôi như giang hồ chứ?\n아 이거 건달이라뇨\nOh, calling me a thug?","sourceUid":"merged-mq9ee7aq-265","sourceNo":492},{"id":466,"readerNo":467,"displayNo":493,"n":493,"type":"narration","text":"Thật ra thì...\nTôi cũng đáng yêu mà.\n내가 얼마나 귀여운 스타일인데\nI'm cute, actually.","sourceUid":"merged-mq9eegc7-266","sourceNo":493},{"id":467,"readerNo":468,"displayNo":494,"n":494,"type":"narration","text":"Con trai!\nVào uống ly cà phê rồi đi.\n아들! 커피 한잔하고 가지.\nSon!\nHave a cup of coffee before you go.","sourceUid":"merged-mq9efeu5-267","sourceNo":494},{"id":468,"readerNo":469,"displayNo":495,"n":495,"type":"narration","text":"Sao chú cứ gọi tôi là \"con trai\" vậy chứ?\nTôi đâu đáng tuổi con chú đâu.\n왜 자꾸 아들이래요? 나이사이가 그게 아닌데.\nWhy do you keep calling me son?\nOur age difference isn't that much.","sourceUid":"merged-mq9eg5xo-268","sourceNo":495},{"id":469,"readerNo":470,"displayNo":496,"n":496,"type":"narration","text":"Đâu phải cứ quan hệ máu mủ mới là con trai tôi đâu.\nTôi thích cậu thì cậu vẫn làm con trai tôi được mà.\n꼭 피가 섞이야만 아들이가 그 말이 좋으면 아들인거지.\nYou don't have to be blood-related to be my son.\nIf I like you, you can be my son.","sourceUid":"merged-mq9fpb2k-320","sourceNo":496},{"id":470,"readerNo":471,"displayNo":497,"n":497,"type":"narration","text":"Người khác lần đầu gặp\nthì thấy cậu đáng sợ,\nnhưng tôi lại thấy cậu đáng yêu.\n넘들은 인상이 별로다 그래서 무섭다고 하는데 내 눈에는 귀엽기만 하다.\nOthers say you are scary because of your first impression,\nbut I find you cute.","sourceUid":"merged-mq9fpn0w-321","sourceNo":497},{"id":471,"readerNo":472,"displayNo":498,"n":498,"type":"narration","text":"Vào đi.\n들어가자.\nLet's go inside.","sourceUid":"merged-mq9fhuht-271","sourceNo":498},{"id":472,"readerNo":473,"displayNo":499,"n":499,"type":"narration","text":"Vậy em về trước nhé.\n자, 먼저 가요!\nI'll go ahead.","sourceUid":"merged-mq9fop0o-319","sourceNo":499},{"id":473,"readerNo":474,"displayNo":500,"n":500,"type":"narration","text":"Là...\nông chú bán món Hoa nói xấu chú, đúng không?\n근데 아저씨 욕하고 다닌 사람이 중국집 아저씨죠?\nChinese food guy, who badmouthed you, right?","sourceUid":"merged-mq9fq0vm-322","sourceNo":500},{"id":474,"readerNo":475,"displayNo":501,"n":501,"type":"narration","text":"Anh ta còn nói xấu tôi với cậu cơ à?\n와 자네한테까지 내오가더라\nDid he trash me with you, too?","sourceUid":"merged-mq9fqcw9-323","sourceNo":501},{"id":475,"readerNo":476,"displayNo":502,"n":502,"type":"narration","text":"Không đâu, là luật sư nên phải nghe thôi.\n아니요 변호사함 그냥 알게 돼요\nNo, you hear about it if you are an attorney.","sourceUid":"merged-mq9fqipj-324","sourceNo":502},{"id":476,"readerNo":477,"displayNo":503,"n":503,"type":"narration","text":"Thế cậu định làm gì?\nCậu sẽ khiếu nại anh ta, đúng chứ?\n그럼 잘 끼고 고사할게 이제\nSo, what will you do? You will sue him, right?","sourceUid":"merged-mq9fr17e-325","sourceNo":503},{"id":477,"readerNo":478,"displayNo":504,"n":504,"type":"narration","text":"Thôi, làm hòa đi.\n그냥 화해하세요\nJust reconcile.","sourceUid":"merged-mq9fr7d9-326","sourceNo":504},{"id":478,"readerNo":479,"displayNo":505,"n":505,"type":"narration","text":"Tôi cũng nghe chú nói\nchú ấy nhồi thịt bồ câu trong bánh bao mà.\n아저씨도 굳이 만두에 비둘기 고기 쓴다고 했다면서요\nI heard you also said he uses pigeon meat in his dumplings.","sourceUid":"merged-mq9frnjx-327","sourceNo":505},{"id":479,"readerNo":480,"displayNo":506,"n":506,"type":"narration","text":"Tôi á?\nKhông hề.\nTôi chưa bao giờ nói thế.\n내가? 아닌데? 나 안 그랬는데\nMe? That's not true.\nI never said that.","sourceUid":"merged-mq9fselt-330","sourceNo":506},{"id":480,"readerNo":481,"displayNo":507,"n":507,"type":"narration","text":"Chú nói với tôi như thế mà.\n저한테도 그러셨다니까요\nYou told me that, too.","sourceUid":"merged-mq9fsplr-331","sourceNo":507},{"id":481,"readerNo":482,"displayNo":508,"n":508,"type":"narration","text":"Có không ta?\n아 맞나?\nOh, is that right?","sourceUid":"merged-mq9fyhwk-382","sourceNo":508},{"id":482,"readerNo":483,"displayNo":509,"n":509,"type":"narration","text":"Thế thì sao?\nTên khốn đó bôi tro trét trấu lên mặt tôi trước.\n근데 뭐 그 새끼가 언제 이 내 외모에 대해서 지적질한 거 아이가\nThat jerk insulted my appearance first!","sourceUid":"merged-mq9fyuhn-383","sourceNo":509},{"id":483,"readerNo":484,"displayNo":510,"n":510,"type":"narration","text":"Nhưng mà...\nđể chứng minh doanh thu giảm\nsau khi tin đồn lan ra thì dễ.\n근데요 소문이 난 이후로 중국집 매출 떨어진 거 증명하기가 쉬워요\nBut you know, it's easy to prove\ntheir drop in revenue after the rumor spread.","sourceUid":"merged-mq9fz46q-384","sourceNo":510},{"id":484,"readerNo":485,"displayNo":511,"n":511,"type":"narration","text":"Chú ấy chỉ cần đưa sổ sách ra là xong.\n가게도 뒤집어 까서 보여주면 되니까\nAll he has to do is show his ledger.","sourceUid":"merged-mq9fzfa9-385","sourceNo":511},{"id":485,"readerNo":486,"displayNo":512,"n":512,"type":"narration","text":"Nhưng để chứng minh chú bị tổn thương,\nthì mới là chuyện khó.\n근데 아저씨 그 가슴에 상처 입은 거는 증명하기가 어렵거든요\nBut it's difficult to prove that your feelings were hurt.\nIt's not like you can open up your heart and show it.","sourceUid":"merged-mq9fzvrd-386","sourceNo":512},{"id":486,"readerNo":487,"displayNo":513,"n":513,"type":"narration","text":"Chú đâu thể mở trái tim ra cho người ta xem được.\n상처 입은 가슴을 뒤집어 까서 보여줄 수도 없고","sourceUid":"merged-mq9g01sp-387","sourceNo":513},{"id":487,"readerNo":488,"displayNo":514,"n":514,"type":"narration","text":"Thì ý tôi là vậy đó.\nCậu biết tôi đã tổn thương nhường nào không?\n내 말이 그 말이다 내가 이 일 얼마나 가슴이 아팠는지 알아\nThat's what I mean.\nDo you know how hurt I was?","sourceUid":"merged-mq9g085e-388","sourceNo":514},{"id":488,"readerNo":489,"displayNo":515,"n":515,"type":"narration","text":"Vậy nên, chú cũng nên xem như cảm xúc tổn thương của mình\nvà khoản doanh thu mà chú kia mất là hòa nhau đi.\n그니까 아저씨 상처입은 가슴하고 그 중국집 매출 떨어진거하고 퉁쳐요\nSo you should consider your hurt feelings\nand his loss of revenue even.","sourceUid":"merged-mq9g0izz-389","sourceNo":515},{"id":489,"readerNo":490,"displayNo":516,"n":516,"type":"narration","text":"Cậu đang nói gì thế?\nCậu đâu hiểu được cảm giác của tôi đâu mà nói thế?\n이 뭐시랄게 샀노? 아니 니가 내 아픔을 어쩌러서 그딴소리해서 하고있노?\nWhat are you saying?\nHow can you say that when you don't know my pain?","sourceUid":"merged-mq9g0x3d-390","sourceNo":516},{"id":490,"readerNo":491,"displayNo":517,"n":517,"type":"narration","text":"Từ khi thằng đó gọi tôi là đầu hói,\nthì ngay cả lúc đội cái này,\nhay lúc tháo ra tôi vẫn thấy mặc cảm.\n그 새끼가 내한테 개머리라 카고 난 다음부터 나있나?\nEver since that jerk called me bald,","sourceUid":"merged-mq9g18u1-391","sourceNo":517},{"id":491,"readerNo":492,"displayNo":518,"n":518,"type":"narration","text":"Mặc cái này vào thì thấy ngượng, mà cởi ra cũng thấy ngượng.\n내가 이걸 서도 부끄럽고 벗어도 부끄럽다\nI'm embarrassed when I wear this\nand when I take it off.","sourceUid":"merged-mq9fwfqp-340","sourceNo":518},{"id":492,"readerNo":493,"displayNo":519,"n":519,"type":"narration","text":"Tôi cảm giác khi đội lên thì như không đội, không đội khi đang đội\n이걸 서도 안 쓴거 같고 벗어도 쓴거 같다 이 말이다\nIt feels like I'm not wearing it when I am,\nand I feel like I'm wearing it when I'm not.","sourceUid":"merged-mq9g3c4d-393","sourceNo":519},{"id":493,"readerNo":494,"displayNo":520,"n":520,"type":"narration","text":"Tôi thấy thằng con trai không hiểu lòng tôi mới là người đáng thất vọng hơn.\n나는 내 마음을 몰라주는 우리 아들이 더 섭섭해\nI am more sad that my son\ndoesn't know how I feel.","sourceUid":"merged-mq9g65gb-394","sourceNo":520},{"id":494,"readerNo":495,"displayNo":521,"n":521,"type":"narration","text":"Ừ, anh cứ suy nghĩ đi rồi làm hòa nhé.\n네 뭐 저 고민해보시고 화해하세요\nWell, so... um...\nthink about it and...\nmake peace.","sourceUid":"merged-mq9g6dd1-395","sourceNo":521},{"id":495,"readerNo":496,"displayNo":522,"n":522,"type":"narration","text":"Songi đến rồi ạ.\n송이 오셨는데","sourceUid":"merged-0522","sourceNo":522},{"id":496,"readerNo":497,"displayNo":523,"n":523,"type":"narration","text":"Dạ? Khách ạ?\n네? 손님?\nYou have guests.\nWhat? Guests?","sourceUid":"merged-mq9g71f3-398","sourceNo":523},{"id":497,"readerNo":498,"displayNo":524,"n":524,"type":"narration","text":"Luật sư.\n변호사님\nAttorney.","sourceUid":"merged-0524","sourceNo":524},{"id":498,"readerNo":499,"displayNo":525,"n":525,"type":"narration","text":"Sao anh không hợp tác với tôi nhỉ?\n프로젝트 같이 하나 하시죠\nAttorney.\nWhy don't you work on a project with me?","sourceUid":"merged-mq9ivzy6-445","sourceNo":525},{"id":499,"readerNo":500,"displayNo":526,"n":526,"type":"narration","text":"Tôi thấy làm việc với Tổ trưởng và cô Min Jeong là vui nhất á.\n저는요. 팀장님이랑 윤정씨랑 일할 때가 제일 재밌었어요.\nI had the most fun when I worked with you and Min Jeong.","sourceUid":"merged-mq9iwekz-446","sourceNo":526},{"id":500,"readerNo":501,"displayNo":527,"n":527,"type":"narration","text":"Chiến đấu không phải bản chất của tôi,\nnên M&A là lựa chọn hoàn hảo.\n전 싸우는 게 체질이 아니어서 M&A가 딱이더라고요.\nIt's not in my blood to fight,\nso M&A is perfect for me.","sourceUid":"merged-mq9iwxqx-447","sourceNo":527},{"id":501,"readerNo":502,"displayNo":528,"n":528,"type":"dialogue","text":"[MMA: Đấu vật tổng hợp] Nhìn anh cứ như dân MMA ấy,\nnhưng có vẻ M&A mới thật sự hợp với anh.\n음. M&A 하시게 생기셨는데. M&A가 딱이신가 봐요.\nYou look like you'd do MMA*, (*MMA: Mixed Martial arts)\nbut I guess M&A is perfect for you.","sourceUid":"merged-mq9ixjzd-448","sourceNo":528},{"id":502,"readerNo":503,"displayNo":529,"n":529,"type":"narration","text":"Nhưng chẳng phải tôi đã\ntrở nên dễ thương hơn trong thời gian chúng ta xa nhau sao?\n저 근데 안보는 사이에 좀 귀여워지지 않았나요?\nBut didn't I get cuter while we were apart?","sourceUid":"merged-mq9ixt55-449","sourceNo":529},{"id":503,"readerNo":504,"displayNo":530,"n":530,"type":"narration","text":"Hàng xóm cũng nói tôi khá \"cute\" đó.\n동네 사람들이 저보고 많이 귀엽다고 하던데..\nMy neighbors said I'm pretty cute.","sourceUid":"merged-mq9ixxp6-450","sourceNo":530},{"id":504,"readerNo":505,"displayNo":531,"n":531,"type":"narration","text":"Nếu không khí cứ thế này thì tôi không nhập hội được đâu.\n이런 식이라면 전 이 팀과 함께하지 못할 것 같습니다.\nI can't be part of this team if this is how it is.","sourceUid":"merged-mq9jcxvp-510","sourceNo":531},{"id":505,"readerNo":506,"displayNo":532,"n":532,"type":"narration","text":"Vậy là chúng ta tự làm chuyện này sao, Tổ trưởng Yoon?\n그럼 팀장님이랑 저랑 둘이서 하는 건가요?\nThen are we doing this by ourselves, Mr. Yun?","sourceUid":"merged-mq9jd8jm-511","sourceNo":532},{"id":506,"readerNo":507,"displayNo":533,"n":533,"type":"narration","text":"Không thì còn sao nữa?\n그렇게 되나요?\nIs that so?","sourceUid":"merged-mq9jdd0b-512","sourceNo":533},{"id":507,"readerNo":508,"displayNo":534,"n":534,"type":"narration","text":"À, còn thêm một người nữa.\n다음, 한 명 더 있습니다.\nThere is one more person.","sourceUid":"merged-mq9jdgki-513","sourceNo":534},{"id":508,"readerNo":509,"displayNo":535,"n":535,"type":"narration","text":"Tôi đặt nó ở đây. Anh thấy được chưa?\n이렇게 했는데 괜찮으시죠?\nI set it up like this. Is that okay?","sourceUid":"merged-mq9jebmg-515","sourceNo":535},{"id":509,"readerNo":510,"displayNo":536,"n":536,"type":"narration","text":"Tôi chỉ đến phỏng vấn thôi.\n아, 저는 그냥 면접 온 거라서요\nI'm only here for an interview.","sourceUid":"merged-mq9je5a7-514","sourceNo":536},{"id":510,"readerNo":511,"displayNo":537,"n":537,"type":"narration","text":"Ai cũng làm như vậy mà. Chắc không sao đâu.\n다들 이렇게 하니까 괜찮을 거예요\nEveryone does it like this. It should be fine.","sourceUid":"merged-mq9jemf7-516","sourceNo":537},{"id":511,"readerNo":512,"displayNo":538,"n":538,"type":"narration","text":"Trông có hơi sến...\n촌스럽긴 한데\nIt looks a bit tacky...","sourceUid":"merged-mq9jere2-517","sourceNo":538},{"id":512,"readerNo":513,"displayNo":539,"n":539,"type":"narration","text":"Cậu đang đợi anh ta à?\n기다리고 있네\nAre you waiting for him?","sourceUid":"merged-mq9jf0u0-518","sourceNo":539},{"id":513,"readerNo":514,"displayNo":540,"n":540,"type":"narration","text":"Sao anh lại ở đây?\n왜 들어와요?\nWhy are you here?","sourceUid":"merged-mq9jbwnw-509","sourceNo":540},{"id":514,"readerNo":515,"displayNo":541,"n":541,"type":"narration","text":"Tôi định đi pha ly cà phê.\n커피는 한 잔 하게\nI thought I'd grab some coffee.","sourceUid":"merged-mq9jf80y-519","sourceNo":541},{"id":515,"readerNo":516,"displayNo":542,"n":542,"type":"narration","text":"Tiền bối uống cà phê như uống nước nhỉ.\n선배는 무슨 커피를 물 마시든 마시네요\nSeonbae, you drink coffee like it's water.","sourceUid":"merged-mq9jfdqh-520","sourceNo":542},{"id":516,"readerNo":517,"displayNo":543,"n":543,"type":"narration","text":"Này,\ncó câu \"Cà phê chảy trong huyết quản của dân văn phòng.\"\n야, 회사원 혈관은 커피가 흐른다\nHey,\n\"Coffee flows in an office worker's veins.\"","sourceUid":"merged-mq9jfky5-521","sourceNo":543},{"id":517,"readerNo":518,"displayNo":544,"n":544,"type":"narration","text":"Không biết à?\n몰라?\nDon't you know?","sourceUid":"merged-mq9jfq9u-522","sourceNo":544},{"id":518,"readerNo":519,"displayNo":545,"n":545,"type":"narration","text":"Trời ạ, đội M&A đúng là\n에휴, M&A 팀 진짜\nThe M&A Team...","sourceUid":"merged-mq9j9tcv-467","sourceNo":545},{"id":519,"readerNo":520,"displayNo":546,"n":546,"type":"narration","text":"Đội M&A...\nthấy tội thật.\n불쌍하다\nI feel bad for them.","sourceUid":"merged-mq9jg8cy-523","sourceNo":546},{"id":520,"readerNo":521,"displayNo":547,"n":547,"type":"narration","text":"Mang đây.\n가져와\n- Why? - Hey.","sourceUid":"merged-mq9ja8r7-468","sourceNo":547},{"id":521,"readerNo":522,"displayNo":548,"n":548,"type":"narration","text":"Cái gì đã bắt đầu ạ?\n뭐가요?\nWhat has?","sourceUid":"merged-0548","sourceNo":548},{"id":522,"readerNo":523,"displayNo":549,"n":549,"type":"narration","text":"Này.\nĐi thôi.\n야 가져와\nHey, bring it here.","sourceUid":"merged-mq9jjejf-528","sourceNo":549},{"id":523,"readerNo":524,"displayNo":550,"n":550,"type":"narration","text":"Tôi sẽ cho cậu thấy\n형이 알려줄게\nI'll show you","sourceUid":"merged-mq9k5vxo-580","sourceNo":550},{"id":524,"readerNo":525,"displayNo":551,"n":551,"type":"narration","text":"một đội thành công thì sẽ như thế nào.\n잘나가는 팀이 어떤거지\nwhat a successful team is like.","sourceUid":"merged-mq9k5rwi-579","sourceNo":551},{"id":525,"readerNo":526,"displayNo":552,"n":552,"type":"narration","text":"Sao ta phải lên đó?\n그걸 왜 봐야해?\nWhy do I have to look at that?","sourceUid":"merged-mq9k6fhs-581","sourceNo":552},{"id":526,"readerNo":527,"displayNo":553,"n":553,"type":"narration","text":"Đúng vậy...\n그러게...\nI know, right...","sourceUid":"merged-0553","sourceNo":553},{"id":527,"readerNo":528,"displayNo":554,"n":554,"type":"narration","text":"Mang cái thằng thực tập sinh hạng bét này\n인턴 나부랭이를 내가지고\nYou're using a lowly intern like me","sourceUid":"merged-0554","sourceNo":554},{"id":528,"readerNo":529,"displayNo":555,"n":555,"type":"narration","text":"Tôi đang dẫn một thực tập sinh đến một nơi tầm cỡ như đây.\n귀한 데로 오시네?\nI'm bringing an intern to such a high-level place.","sourceUid":"merged-mq9k6w3w-582","sourceNo":555},{"id":529,"readerNo":530,"displayNo":556,"n":556,"type":"narration","text":"Này, đây là tầng cao nhất đó.\n야, 여기가 제일 높은 데야.\nHey, this is the highest floor.","sourceUid":"merged-mq9k73kr-583","sourceNo":556},{"id":530,"readerNo":531,"displayNo":557,"n":557,"type":"narration","text":"Nhưng ở trên còn một tầng nữa.\n2층도 있잖아.\nThere is a floor above this one, though.","sourceUid":"merged-mq9k7dpd-584","sourceNo":557},{"id":531,"readerNo":532,"displayNo":558,"n":558,"type":"narration","text":"Đó là phòng Chủ tịch.\n거긴 회장실이잖아.\nThat's the chairman's office.","sourceUid":"merged-mq9k7hxf-585","sourceNo":558},{"id":532,"readerNo":533,"displayNo":559,"n":559,"type":"narration","text":"Còn với nhân viên bình thường, thì đây là tầng cao nhất.\n민간인한테 여기가 제일 높은 데지.\nThat is the chairman's office.\nFor normal employees, this is the highest floor.","sourceUid":"merged-mq9k7m8g-586","sourceNo":559},{"id":533,"readerNo":534,"displayNo":560,"n":560,"type":"narration","text":"Bên trái là phòng Giám đốc Ha.\n왼쪽이 아줌마님\nOn the left, there's Mr. Ha.","sourceUid":"merged-mq9k7u0k-587","sourceNo":560},{"id":534,"readerNo":535,"displayNo":561,"n":561,"type":"narration","text":"Còn bên phải là phòng Giám đốc Lee.\n오른쪽이 이장모님\nAnd on the right, there's Mr. Lee.","sourceUid":"merged-mq9kep2n-588","sourceNo":561},{"id":535,"readerNo":536,"displayNo":562,"n":562,"type":"narration","text":"Rồi, Jin Soo à.\nNhìn này.\nCái này là đẳng cấp đó.\n야, 진수야. 이거 봐. 응?\nAll right, Jin Su.\nLook at this.\nThere's class here.","sourceUid":"merged-mq9kpw2h-590","sourceNo":562},{"id":536,"readerNo":537,"displayNo":563,"n":563,"type":"narration","text":"Ở đây này.\n여기 있잖아.\nIt's right here.","sourceUid":"merged-0563","sourceNo":563},{"id":537,"readerNo":538,"displayNo":564,"n":564,"type":"narration","text":"Này, Jin Soo à,\ncậu mà làm việc cho tôi\nthì sẽ được hưởng những thứ này.\n야, 진수야. 너 형이랑 일하면 이런 거 마시는 거고\nHey, Jin Su. You know,\nif you work with me,\nyou get to drink stuff like this,","sourceUid":"merged-mq9kqakw-591","sourceNo":564},{"id":538,"readerNo":539,"displayNo":565,"n":565,"type":"narration","text":"Còn nếu cậu xuống dưới cái góc xó xỉnh đó,\nvới đội thất bại đó,\n저 밑에 구석에서 곧 망하는 팀에서 일하면\nand if you work down there in that corner\nwith that doomed team,","sourceUid":"merged-mq9kqmw8-592","sourceNo":565},{"id":539,"readerNo":540,"displayNo":566,"n":566,"type":"narration","text":"thì chỉ có uống cà phê hòa tan mà thôi.\nHiểu chứ?\n맨날 믹스커피나 마시는 거야. 알겠어?\nyou'll just drink instant coffee all the time.\nDo you understand?","sourceUid":"merged-mq9lc5bo-691","sourceNo":566},{"id":540,"readerNo":541,"displayNo":567,"n":567,"type":"narration","text":"Cậu nghĩ sao?\nLàm việc cho tôi chứ?\nAnh đang chiêu mộ tôi đấy à?\n저 스카우트 하시는 건가요?\nSo what do you think?\nWill you work with me?\nAre you scouting me?","sourceUid":"merged-mq9lcksz-692","sourceNo":567},{"id":541,"readerNo":542,"displayNo":568,"n":568,"type":"narration","text":"Còn tùy vào cách cậu thể hiện.\n나는 거 봤어\nThat depends on your behavior.","sourceUid":"merged-mq9lcr4b-693","sourceNo":568},{"id":542,"readerNo":543,"displayNo":569,"n":569,"type":"narration","text":"Nhưng nghe đồn Tổ trưởng Yoon là người thừa kế đó.\n근데 이 팀장님 후계자라는 소문이 있던데요\nBut it's rumored that Mr. Yun is the heir.","sourceUid":"merged-mq9lcxk3-694","sourceNo":569},{"id":543,"readerNo":544,"displayNo":570,"n":570,"type":"narration","text":"Vậy sao? Tôi tưởng là tôi mới đúng chứ.\n아 그래? 내가 후계자인 줄 알았는데\nOh, really?\nI thought I was the heir.","sourceUid":"merged-mq9ldei2-695","sourceNo":570},{"id":544,"readerNo":545,"displayNo":571,"n":571,"type":"narration","text":"Không đâu,\nChủ tịch nói không trao quyền cho con ruột đâu.\n아니 회장님이 이세 경영 안 하신다고 하셨잖아요\nThe chairman said\nhe won't pass ownership to his child.","sourceUid":"merged-mq9lejw3-696","sourceNo":571},{"id":545,"readerNo":546,"displayNo":572,"n":572,"type":"narration","text":"Tôi không biết làm thế có nên không.\n난 근데 그게 좋은 건지 모르겠다\nI don't know if that's a good thing.","sourceUid":"merged-mq9leq0k-697","sourceNo":572},{"id":546,"readerNo":547,"displayNo":573,"n":573,"type":"narration","text":"Bảo sao nội bộ công ty ngày càng đấu đá nhau.\n그것 때문에 괜히 회사 정치만 잘 부려진 거였고\nDue to that, office politics got more fierce.","sourceUid":"merged-mq9lewkf-698","sourceNo":573},{"id":547,"readerNo":548,"displayNo":574,"n":574,"type":"narration","text":"Mà tôi nghe nói Chủ tịch có con riêng,\n근데요 회장님한테 숨겨놓은 딸이 있는데\nBut I heard the chairman has a secret daughter","sourceUid":"merged-mq9lf0zu-699","sourceNo":574},{"id":548,"readerNo":549,"displayNo":575,"n":575,"type":"narration","text":"ông ấy còn dự định gả cho Tổ trưởng Yoon nữa.\n그 딸이랑 윤팀장님이랑 결혼시킬 거래요\nand he will marry her off to Mr. Yun.","sourceUid":"merged-mq9lf7cq-700","sourceNo":575},{"id":549,"readerNo":550,"displayNo":576,"n":576,"type":"narration","text":"Cho nên mới không trao quyền thừa kế cho con ruột.\n그래서 이사 경영 안 하신다고 한 거래요\nThat's why he won't pass ownership to his child.","sourceUid":"merged-mq9lfbl0-701","sourceNo":576},{"id":550,"readerNo":551,"displayNo":577,"n":577,"type":"narration","text":"Ai nói thế?\n누가 그래?\nWho told you that?","sourceUid":"merged-mq9lfh0a-702","sourceNo":577},{"id":551,"readerNo":552,"displayNo":578,"n":578,"type":"narration","text":"Tôi tình cờ nghe được thôi.\n그냥 지나가다 들었어요\nI just happened to overhear it.","sourceUid":"merged-mq9lfkzh-703","sourceNo":578},{"id":552,"readerNo":553,"displayNo":579,"n":579,"type":"narration","text":"Thật vậy à?\n아 진짜?\nOh, really?","sourceUid":"merged-mq9lfoto-704","sourceNo":579},{"id":553,"readerNo":554,"displayNo":580,"n":580,"type":"narration","text":"Nhưng Tổ trưởng Yoon Joo No...\n근데 윤준호 팀장\nBut Team Leader Yoon Jun-ho...","sourceUid":"merged-mq9l9y0x-650","sourceNo":580},{"id":554,"readerNo":555,"displayNo":581,"n":581,"type":"narration","text":"Trưởng nhóm không sao chứ?\nmà làm Chủ tịch thì có ổn không nhỉ?\n팀장님 괜찮으신가?\nBut Mr. Yun Ju No...\nIs the chairman okay with that?","sourceUid":"merged-mq9lhvga-747","sourceNo":581},{"id":555,"readerNo":556,"displayNo":582,"n":582,"type":"narration","text":"Cậu ta có vợ rồi mà.\n교부남인데\nHe's a married man.","sourceUid":"merged-mq9lxwzt-810","sourceNo":582},{"id":556,"readerNo":557,"displayNo":583,"n":583,"type":"narration","text":"Hả?\n네?\nYes?","sourceUid":"merged-0583","sourceNo":583},{"id":557,"readerNo":558,"displayNo":584,"n":584,"type":"narration","text":"Tổ trưởng Yoon có vợ rồi.\n윤 팀장 교부남이라고 인마\nMr. Yun is a married man.","sourceUid":"merged-mq9lwb2j-807","sourceNo":584},{"id":558,"readerNo":559,"displayNo":585,"n":585,"type":"narration","text":"Cậu ta kết hôn rồi.\n결혼했다고\nWhat?\nHe's married.","sourceUid":"merged-mq9lwzfo-808","sourceNo":585},{"id":559,"readerNo":560,"displayNo":586,"n":586,"type":"narration","text":"Vâng.\n네\nYes.","sourceUid":"merged-0586","sourceNo":586},{"id":560,"readerNo":561,"displayNo":587,"n":587,"type":"narration","text":"Cơ mà, anh về một mình à?\n같이 오시지\nBy the way, did you come by yourself?","sourceUid":"merged-mq9lxir4-809","sourceNo":587},{"id":561,"readerNo":562,"displayNo":588,"n":588,"type":"narration","text":"Phải.\nPhải đưa cô ấy về cùng chứ.\nVậy, anh về Hàn Quốc luôn rồi à?\n그럼 이번에 아예 한국 오신 거예요?\nYes.\nYou should've brought her with you.\nThen did you come back to Korea for good?","sourceUid":"merged-mq9lw1uh-806","sourceNo":588},{"id":562,"readerNo":563,"displayNo":589,"n":589,"type":"narration","text":"Chưa biết nữa.\n글쎄요\nNot sure.","sourceUid":"merged-mq9lvo6r-805","sourceNo":589},{"id":563,"readerNo":564,"displayNo":590,"n":590,"type":"narration","text":"Còn tùy vào dự án thế nào sao ạ?\n이번 프로젝트에 달려있는 건가요?\nDoes that depend on how this project goes?","sourceUid":"merged-mq9lvjb3-804","sourceNo":590},{"id":564,"readerNo":565,"displayNo":591,"n":591,"type":"narration","text":"Dự án này mà kết thúc,\nthì chắc tôi cũng sẽ bị sa thải thôi.\n이번 프로젝트가 끝나면 전 짤리지 않을까요?\nWhen this project is over,\nI'll probably get fired.","sourceUid":"merged-mq9lv7i2-803","sourceNo":591},{"id":565,"readerNo":566,"displayNo":592,"n":592,"type":"narration","text":"Dù có thành công...\nhay là không.\n잘 돼도 안 돼도\nWhether it goes well or not.","sourceUid":"merged-mq9lv0gy-802","sourceNo":592},{"id":566,"readerNo":567,"displayNo":593,"n":593,"type":"narration","text":"Về phía Yoon Joo No,\nnếu dự án này mà thất bại,\nthì cậu ta xong đời.\n암튼 윤준호는 이 프로젝트 실패하면 실패해서 망하는 거고\nIn any case, for Yun Ju No,\nif he fails this project, he's screwed for failing.","sourceUid":"merged-mq9lurwz-801","sourceNo":593},{"id":567,"readerNo":568,"displayNo":594,"n":594,"type":"narration","text":"Còn nếu thành công,\nthì cũng tiêu đời vì lỡ đắc tội với Số 2.\n성공하면 넘버트 눈밖에 나서 망하는 거야\nIf he succeeds,\nhe's screwed for getting on Number 2's wrong side.","sourceUid":"merged-mq9luhar-800","sourceNo":594},{"id":568,"readerNo":569,"displayNo":595,"n":595,"type":"narration","text":"- Giám đốc Ha sao? - Đúng rồi.\n하정민님이요?\n- Mr. Ha? - Yes.","sourceUid":"merged-mqan7xqw-516","sourceNo":595},{"id":569,"readerNo":570,"displayNo":596,"n":596,"type":"narration","text":"Ừ.\n그래\nRight.","sourceUid":"merged-0596","sourceNo":596},{"id":570,"readerNo":571,"displayNo":597,"n":597,"type":"narration","text":"Này, thà thất bại còn hơn là đắc tội với CEO tương lai.\n자기 CEO 눈밖에 나느니 차라리 실패하는 게 나아\nHey, it's better to fail than to get on the future CEO's wrong side.","sourceUid":"merged-mqan8jrm-518","sourceNo":597},{"id":571,"readerNo":572,"displayNo":598,"n":598,"type":"narration","text":"Làm việc chủ yếu là về chính trị\nvà chọn đúng \"nền văn minh\".\n회사는 정치야 라인이고\nWorking is all about politics and picking the right side.","sourceUid":"merged-mqan8qzf-519","sourceNo":598},{"id":572,"readerNo":573,"displayNo":599,"n":599,"type":"narration","text":"Về mặt lịch sử, đây cũng là chân lý bất biến.\n이건 뭐 역사적으로도 불변의 진리야\nhistorically proven to be an unchanging truth.\nThis is...","sourceUid":"merged-mqanqnao-593","sourceNo":599},{"id":573,"readerNo":574,"displayNo":600,"n":600,"type":"narration","text":"Này nhé.\nLý Thuấn Thần có chết vì chiến đấu dở không?\n야 이순신이 뭐 싸뭇해서 죽었냐?\nHey.\nDid Yi Sun Shin die because he was bad at fighting?","sourceUid":"merged-mqanqy75-594","sourceNo":600},{"id":574,"readerNo":575,"displayNo":601,"n":601,"type":"narration","text":"Dù cho cậu có giỏi,\nmà không biết luồn lách chính trị thì chỉ có chết.\n아무리 잘났어도 정체를 못하면 죽는 거야\nEven if you're great, you'll die if you can't navigate politics.","sourceUid":"merged-mqanrem8-595","sourceNo":601},{"id":575,"readerNo":576,"displayNo":602,"n":602,"type":"narration","text":"Ngay khi cậu chọn làm việc dưới trướng Yoon Joo No,\nthì cậu rồi cũng sẽ có kết cục như cậu ta mà thôi.\n너도 금이 들어 들어간 순간 윤준호랑 같은 꼴 나는 거고\nThe moment you work under Yun Ju No,\nyou will end up having the same fate as him.","sourceUid":"merged-mqanrvi7-596","sourceNo":602},{"id":576,"readerNo":577,"displayNo":603,"n":603,"type":"narration","text":"Nên cậu đó...\nnên nghĩ cách rớt phỏng vấn đi là vừa.\n그러니까 넌 면접에서 어떻게 떨어질지 고민하고 있어\nSo you should just...\nthink about how you'll fail the interview.","sourceUid":"merged-mqans38o-597","sourceNo":603},{"id":577,"readerNo":578,"displayNo":604,"n":604,"type":"narration","text":"Tại sao?\n왜?\nWhy?","sourceUid":"merged-0604","sourceNo":604},{"id":578,"readerNo":579,"displayNo":605,"n":605,"type":"narration","text":"tôi là Choi Jin Soo, thực tập sinh mới ạ.\nXin chào anh chị,\n안녕하십니까. 저는 최진수 인턴입니다.\nHello, I'm Intern Choi Jin Su.","sourceUid":"merged-mqansods-598","sourceNo":605},{"id":579,"readerNo":580,"displayNo":606,"n":606,"type":"narration","text":"Cậu ứng tuyển vào Đội M&A là có lý do à?\nM&A 팀에 지원한 이유가 있나요?\nIs there a reason you applied for the M&A Team?","sourceUid":"merged-mqant9so-600","sourceNo":606},{"id":580,"readerNo":581,"displayNo":607,"n":607,"type":"narration","text":"Tôi cảm thấy đó là cơ hội tốt để được học hỏi từ anh.\n네. 윤준호 팀장님에게 배울 수 있는 기회라고 생각해서 지원했습니다.\nYes.\nI felt it was an opportunity to learn from you.","sourceUid":"merged-mqantd2z-601","sourceNo":607},{"id":581,"readerNo":582,"displayNo":608,"n":608,"type":"narration","text":"Chúng ta phải huy động 11 nghìn tỷ won ngay lúc này\nmà vẫn giữ giá cổ phiếu trên 100.000 won.\nCậu biết chứ?\nCậu đã nghe lúc ở phòng họp rồi đó.\n지금 우리 팀은 11조 원을 조달해야 하는 상황입니다. 주가도 10만 원 선을 방어하면서요. 알고 있죠? 아까 회의실에서 같이 들었으니까.\nWe have to procure 11 trillion won right now,\nwhile keeping our stock price above 100,000 won.\nYou know that, right?\nSince you heard it in the meeting room earlier.","sourceUid":"merged-mqantowd-602","sourceNo":608},{"id":582,"readerNo":583,"displayNo":609,"n":609,"type":"narration","text":"Vâng.\n네.\nYes.","sourceUid":"merged-mqantx3d-603","sourceNo":609},{"id":583,"readerNo":584,"displayNo":610,"n":610,"type":"narration","text":"Vâng.\nKhoan, ở đây cũng có thực tập sinh à?\n아니, 인턴이 어떻게 거기 있었어요?\nWait, how was an intern there?","sourceUid":"merged-mqanu2rt-604","sourceNo":610},{"id":584,"readerNo":585,"displayNo":611,"n":611,"type":"narration","text":"À, tôi đang bày đồ ăn thì cuộc họp bắt đầu đột xuất,\nnên không thể rời đi được.\n아, 다과 세팅하다가 갑자기 회의가 시작돼서 못 나갔습니다.\nI couldn't leave when the meeting suddenly started\nwhile setting up the refreshments.","sourceUid":"merged-mqanuev3-605","sourceNo":611},{"id":585,"readerNo":586,"displayNo":612,"n":612,"type":"narration","text":"Vốn hóa thị trường của công ty chúng ta là bao nhiêu?\n우리 회사 시가총액은 얼마입니까?\nWhat is our company's market capitalization?","sourceUid":"merged-mqanzife-675","sourceNo":612},{"id":586,"readerNo":587,"displayNo":613,"n":613,"type":"narration","text":"Theo tôi biết là khoảng 19 tỷ won.\n19조 정도를 알고 있습니다.\nI know it to be around 19 trillion won.","sourceUid":"merged-mqanzbsw-674","sourceNo":613},{"id":587,"readerNo":588,"displayNo":614,"n":614,"type":"narration","text":"Nếu chúng ta trả xong khoản 11 nghìn tỷ won thì sao?\n현재 조달해야 하는 11조 원을 다 갚으면요?\nWhat if we pay off our goal of 11 trillion won?","sourceUid":"merged-mqanzwpw-676","sourceNo":614},{"id":588,"readerNo":589,"displayNo":615,"n":615,"type":"narration","text":"Vốn hóa thị trường sao ạ?\n시총이요?\nThe market capitalization?","sourceUid":"merged-mqanyvjk-673","sourceNo":615},{"id":589,"readerNo":590,"displayNo":616,"n":616,"type":"narration","text":"Phải.\n네.\nYes.","sourceUid":"merged-mqao82tc-692","sourceNo":616},{"id":590,"readerNo":591,"displayNo":617,"n":617,"type":"narration","text":"Tôi không biết ạ.\n알 수 없습니다.\nThere's no way to know.","sourceUid":"merged-mqao08x5-677","sourceNo":617},{"id":591,"readerNo":592,"displayNo":618,"n":618,"type":"narration","text":"Sao thế?\n왜요?\nWhy is that?","sourceUid":"merged-mqao0irb-678","sourceNo":618},{"id":592,"readerNo":593,"displayNo":619,"n":619,"type":"narration","text":"Nếu trả xong, chẳng phải giá sẽ tăng lại sao?\n그거 다 갚으면 다시 올라가야 되는 거 아닌가?\nIf we pay it off, shouldn't it go back up?","sourceUid":"merged-mqao9kco-813","sourceNo":619},{"id":593,"readerNo":594,"displayNo":620,"n":620,"type":"narration","text":"Giá cổ phiếu hiện tại đã phản ánh hết mọi thứ rồi.\n지금 주가에 그 부분도 다 반영되어 있는 건데요\nThe current stock price already reflects all that.","sourceUid":"merged-mqao9qr4-814","sourceNo":620},{"id":594,"readerNo":595,"displayNo":621,"n":621,"type":"narration","text":"Vậy nếu nó vẫn duy trì ở mức 19 tỷ won thì sao?\n그러면 그대로 19조다?\nWill it then remain at 19 trillion won?","sourceUid":"merged-mqao9vyq-815","sourceNo":621},{"id":595,"readerNo":596,"displayNo":622,"n":622,"type":"narration","text":"Không ạ, chắc chắn sẽ thay đổi,\n아니요 바뀌긴 할 것 같은데\nNo. It will probably change,","sourceUid":"merged-mqaoa097-816","sourceNo":622},{"id":596,"readerNo":597,"displayNo":623,"n":623,"type":"narration","text":"nhưng tôi nghĩ còn tùy vào Tổ trưởng Yoon.\n팀장님 아시게 달려있는 것 같습니다\nbut I think it's up to how Mr. Yun performs.","sourceUid":"merged-mqaoa54h-817","sourceNo":623},{"id":597,"readerNo":598,"displayNo":624,"n":624,"type":"narration","text":"Cậu từng là chủ tịch một câu lạc bộ đầu tư chứng khoán.\n주식투자 동아리 회장까지 하셨네요\nYou were a president of a stock investment club.","sourceUid":"merged-mqaoab07-818","sourceNo":624},{"id":598,"readerNo":599,"displayNo":625,"n":625,"type":"narration","text":"Tôi là Yang Hyun Ah, Giám đốc phòng Nhân sự.\n인사팀 양현아 과장입니다\nThis is Manager Yang Hyeon Ah from the HR.","sourceUid":"merged-mqaoahjd-819","sourceNo":625},{"id":599,"readerNo":600,"displayNo":626,"n":626,"type":"narration","text":"Vì anh đã đăng xuất khỏi tin nhắn nội bộ của công ty,\nnên tôi mới nhắn ở đây.\n사내 메신저가 로그아웃이어서 폰으로 연락드렸습니다\nI'm contacting you via phone since you're\nlogged out of the company messenger.","sourceUid":"merged-mqaoau6h-820","sourceNo":626},{"id":600,"readerNo":601,"displayNo":627,"n":627,"type":"narration","text":"Phiền anh đưa tôi danh sách thành viên,\ntôi sẽ làm thủ tục chuyển nhượng cho họ.\n팀원 명단 주시면 보직 이동으로 처리하겠습니다\nIf you give me a list of your members,\nI'll process them as transfers.","sourceUid":"merged-mqaob1ox-821","sourceNo":627},{"id":601,"readerNo":602,"displayNo":628,"n":628,"type":"narration","text":"Cảm ơn anh.\n감사합니다\nThank you.","sourceUid":"merged-mqaob5ut-822","sourceNo":628},{"id":602,"readerNo":603,"displayNo":629,"n":629,"type":"narration","text":"Có lời không?\n땄어요?\nDid you profit?","sourceUid":"merged-mqaobaez-823","sourceNo":629},{"id":603,"readerNo":604,"displayNo":630,"n":630,"type":"narration","text":"Quản lý Kwak Min Jeong...\n광민정 과장\n- Manager Kwak Min Jeong -","sourceUid":"merged-mqaobphj-824","sourceNo":630},{"id":604,"readerNo":605,"displayNo":631,"n":631,"type":"narration","text":"Và luật sư Oh Soon Young.\n오순영 변호사입니다\nand Attorney Oh Sun Yeong.","sourceUid":"merged-mqaogg4n-904","sourceNo":631},{"id":605,"readerNo":606,"displayNo":632,"n":632,"type":"narration","text":"Cậu chẳng nói gì thế.\n다 아니래\nYou're saying no to everything.","sourceUid":"merged-mqaogwqn-905","sourceNo":632},{"id":606,"readerNo":607,"displayNo":633,"n":633,"type":"narration","text":"Tôi chưa biết, vì vẫn chưa rút tiền.\n아직 수익 실현을 안 해서 알 수 없습니다\nI don't know yet since I haven't cashed out yet.","sourceUid":"merged-mqaoh2m8-906","sourceNo":633},{"id":607,"readerNo":608,"displayNo":634,"n":634,"type":"narration","text":"Tỷ suất lợi nhuận hiện tại của cậu là bao nhiêu?\n그럼 형제 수익률은?\nWhat's your current return on investment?","sourceUid":"merged-mqaoga3m-903","sourceNo":634},{"id":608,"readerNo":609,"displayNo":635,"n":635,"type":"narration","text":"Là 700% ạ.\n700%입니다\nIt's 700%.","sourceUid":"merged-mqaog3ts-902","sourceNo":635},{"id":609,"readerNo":610,"displayNo":636,"n":636,"type":"narration","text":"Tôi nghĩ mình chỉ gặp may thôi.\n그냥 운이 좋았던 것 같습니다\nI think I just got lucky.","sourceUid":"merged-mqaog015-901","sourceNo":636},{"id":610,"readerNo":611,"displayNo":637,"n":637,"type":"narration","text":"Nếu không được chọn, cậu muốn vào đội nào?\n우리 팀에 불합격하면 어느 팀으로 가고 싶어요?\nWhat team do you want to join if you don't make it?","sourceUid":"merged-mqaoftgv-900","sourceNo":637},{"id":611,"readerNo":612,"displayNo":638,"n":638,"type":"narration","text":"Sao ạ?\n네?\nPardon?","sourceUid":"merged-mqaohby8-907","sourceNo":638},{"id":612,"readerNo":613,"displayNo":639,"n":639,"type":"narration","text":"À, thì...\n아... 그럼... 뭐...\nOh, well...","sourceUid":"merged-mqaohhr3-908","sourceNo":639},{"id":613,"readerNo":614,"displayNo":640,"n":640,"type":"narration","text":"Thật ra, cũng có người bảo tôi về đội của họ rồi.\n사실 저에게 같이 일하자고 한 분이 있습니다\nActually, someone had asked me to work with him.","sourceUid":"merged-mqaohnzp-909","sourceNo":640},{"id":614,"readerNo":615,"displayNo":641,"n":641,"type":"narration","text":"Thật à?\nĐội nào vậy?\n벌써? 어디서?\nAlready? Where?","sourceUid":"merged-mqaohw6p-910","sourceNo":641},{"id":615,"readerNo":616,"displayNo":642,"n":642,"type":"narration","text":"Không biết có được nói không,\nnhưng anh ấy ở phòng Nhân sự.\n말해도 될지 모르겠지만 그분은 인사팀입니다\nI don't know if I can tell you, but he's in the HR Team.","sourceUid":"merged-mqaoi4hu-911","sourceNo":642},{"id":616,"readerNo":617,"displayNo":643,"n":643,"type":"narration","text":"Phòng Nhân sự cũng khá nổi mà.\n인사팀이면 인기 있는 부서인데\nThe HR Team is a popular department.","sourceUid":"merged-mqaoi98p-912","sourceNo":643},{"id":617,"readerNo":618,"displayNo":644,"n":644,"type":"narration","text":"Có vẻ họ ấn tượng với cậu đấy, Jin Soo.\n진수씨를 잘 봤나 보네요?\nI guess they were impressed with you, Jin Su.","sourceUid":"merged-mqaoigux-913","sourceNo":644},{"id":618,"readerNo":619,"displayNo":645,"n":645,"type":"narration","text":"Chắc họ sẽ là người đầu tiên nhận ra tài năng đó.\n하긴... 인재는 거기가 뭔지 알아볼 테니까\nI suppose they'd be the first to notice a talent.","sourceUid":"merged-mqaoima3-914","sourceNo":645},{"id":619,"readerNo":620,"displayNo":646,"n":646,"type":"narration","text":"Không ạ, nhưng tôi thích Đội M&A.\n아니요 저는 M&A팀이 좋습니다\nNo, I prefer the M&A Team.","sourceUid":"merged-mqaol733-986","sourceNo":646},{"id":620,"readerNo":621,"displayNo":647,"n":647,"type":"narration","text":"Phòng Nhân sự có tuyển người không?\n혹시 인사팀에 TO가 있나요?\nDoes the HR Team have an opening?","sourceUid":"merged-mqaolps1-987","sourceNo":647},{"id":621,"readerNo":622,"displayNo":648,"n":648,"type":"narration","text":"Cậu nói phòng Nhân sự...\n인사팀이라고 했나요?\nDid you say it was the HR Team","sourceUid":"merged-mqaoluou-988","sourceNo":648},{"id":622,"readerNo":623,"displayNo":649,"n":649,"type":"narration","text":"đề nghị cậu qua đó à?\n진수씨한테 오프한 것이\nthat offered you a position?","sourceUid":"merged-mqaolza9-989","sourceNo":649},{"id":623,"readerNo":624,"displayNo":650,"n":650,"type":"narration","text":"Vâng.\n네\nYes.","sourceUid":"merged-mqaom4sp-990","sourceNo":650},{"id":624,"readerNo":625,"displayNo":651,"n":651,"type":"narration","text":"Phòng Nhân sự của chúng tôi sao?\n저희 인사팀에서요?\nOn our HR Team?","sourceUid":"merged-mqaoma21-991","sourceNo":651},{"id":625,"readerNo":626,"displayNo":652,"n":652,"type":"narration","text":"Không có đâu.\n아니요. 없습니다.\nNo, there isn't.","sourceUid":"merged-mqaomd6u-992","sourceNo":652},{"id":626,"readerNo":627,"displayNo":653,"n":653,"type":"narration","text":"Đội M&A chỉ có hai nhân sự thôi sao?\nM&A팀은 말씀하신 두 분이 전부인가요?\nAre those two the only members for the M&A Team?","sourceUid":"merged-mqaomh3l-993","sourceNo":653},{"id":627,"readerNo":628,"displayNo":654,"n":654,"type":"narration","text":"Vâng.\n네.\nYes.","sourceUid":"merged-mqaomkca-994","sourceNo":654},{"id":628,"readerNo":629,"displayNo":655,"n":655,"type":"narration","text":"Câu hỏi cuối, cậu nghĩ dự án này có thành công không?\n마지막으로 이 프로젝트 성공할까요?\nFinally, do you think this project will succeed?","sourceUid":"merged-mqaomthe-995","sourceNo":655},{"id":629,"readerNo":630,"displayNo":656,"n":656,"type":"narration","text":"Không ạ.\n안녕\nNo.","sourceUid":"merged-mqaomwoh-996","sourceNo":656},{"id":630,"readerNo":631,"displayNo":657,"n":657,"type":"narration","text":"Thế sao cậu còn ứng tuyển?\n그럼 왜 지원했습니까?\nThen why did you apply?","sourceUid":"merged-mqaya8jk-1069","sourceNo":657},{"id":631,"readerNo":632,"displayNo":658,"n":658,"type":"narration","text":"Thành thật mà nói,\ntôi có nghe tin đồn về Tổ trưởng Yoon.\n솔직히 말씀드리면 팀장님에 대한 소문을 좀 들었는데요.\nTo be honest,\nI've heard some rumors about you, Mr. Yun.","sourceUid":"merged-mqayaiq6-1070","sourceNo":658},{"id":632,"readerNo":633,"displayNo":659,"n":659,"type":"narration","text":"Tôi có cảm giác anh sẽ làm mọi thứ có thể,\ndù dự án này có thất bại.\n이 프로젝트가 실패하는 과정에서 무슨 일이든 할 수 있는 건 다 하실 것 같습니다.\nI feel you'll do everything you can\nin the process of this project failing.","sourceUid":"merged-mqayas5u-1071","sourceNo":659},{"id":633,"readerNo":634,"displayNo":660,"n":660,"type":"narration","text":"Nên tôi nghĩ mình sẽ học hỏi nhiều từ anh.\n거기서 많이 배울 것 같습니다.\nI think I'll learn a lot from that.","sourceUid":"merged-mqayaz4t-1072","sourceNo":660},{"id":634,"readerNo":635,"displayNo":661,"n":661,"type":"narration","text":"Nhưng biết đâu nó lại thành công thì sao.\n성공할 수도 있죠.\nBut it might succeed, though.","sourceUid":"merged-mqayb5w6-1073","sourceNo":661},{"id":635,"readerNo":636,"displayNo":662,"n":662,"type":"narration","text":"Vâng, đúng vậy.\n아, 그쵸. 그쵸.\nTrue, true.","sourceUid":"merged-mqayb9gp-1074","sourceNo":662},{"id":636,"readerNo":637,"displayNo":663,"n":663,"type":"narration","text":"Cùng xem nó sẽ thế nào nhé.\nTôi được nhận rồi sao?\n합격인가요?\nHave I been accepted?","sourceUid":"merged-mqayboo6-1075","sourceNo":663},{"id":637,"readerNo":638,"displayNo":664,"n":664,"type":"narration","text":"Tôi là Kwak Min Jeong\nphụ trách mảng tài chính.\n광민정입니다. 재무 담당이고요.\nI'm Kwak Min Jeong.\nI'm in charge of finance.","sourceUid":"merged-mqayc9xm-1076","sourceNo":664},{"id":638,"readerNo":639,"displayNo":665,"n":665,"type":"narration","text":"Tôi là Oh Soon Young.\nTôi chuyên về luật doanh nghiệp.\n우순영입니다. 기업 법률 전공이고\nOkay.\nI'm Oh Sun Yeong.\nI specialize in corporate law.","sourceUid":"merged-mqaycusg-1077","sourceNo":665},{"id":639,"readerNo":640,"displayNo":666,"n":666,"type":"narration","text":"làm đủ thứ việc lặt vặt.\n이것저것 해요.\nI do a bit of everything.","sourceUid":"merged-mqaopjgh-1006","sourceNo":666},{"id":640,"readerNo":641,"displayNo":667,"n":667,"type":"narration","text":"Thêm thực tập sinh Choi Jin Soo,\nlà tổng cộng có ba người.\n최진수 인턴까지 총 3명입니다\nIncluding Intern Choi Jin Su,\nthere are a total of three people.","sourceUid":"merged-mqaydi1a-1078","sourceNo":667},{"id":641,"readerNo":642,"displayNo":668,"n":668,"type":"narration","text":"Tôi có thể hỏi anh một câu không, Tổ trưởng Yoon?\n질문 하나 해도 될까요 팀장님?\nCould I ask you a question, Mr. Yun?","sourceUid":"merged-mqayed7s-1079","sourceNo":668},{"id":642,"readerNo":643,"displayNo":669,"n":669,"type":"narration","text":"Vâng, cứ hỏi đi.\n네 하세요\nYes, go ahead.","sourceUid":"merged-0669","sourceNo":669},{"id":643,"readerNo":644,"displayNo":670,"n":670,"type":"narration","text":"Không biết...\nanh đã kết hôn chưa?\n혹시 결혼하셨나요?\nBy chance,\nare you married?","sourceUid":"merged-mqayfns8-1081","sourceNo":670},{"id":644,"readerNo":645,"displayNo":671,"n":671,"type":"narration","text":"Trời ơi, khủng khiếp thật.\n아이고, 어마어마하네.\nOh my, that's quite something.","sourceUid":"merged-0671","sourceNo":671},{"id":645,"readerNo":646,"displayNo":672,"n":672,"type":"narration","text":"Thể lực của cậu có vấn đề gì à?\n너 이거 체력이 뭐꼬, 왜 그래?\nWhat's wrong with your stamina?","sourceUid":"merged-mqayi8im-1084","sourceNo":672},{"id":646,"readerNo":647,"displayNo":673,"n":673,"type":"narration","text":"Muốn làm nên chuyện lớn\nthì phải có thể lực tốt, đúng không?\n큰일 날라카면 체력이 좋아야지, 안글라.\nYou need good stamina\nif you want to accomplish big things, right?","sourceUid":"merged-mqayi0p5-1083","sourceNo":673},{"id":647,"readerNo":648,"displayNo":674,"n":674,"type":"narration","text":"Dạo này tôi không có thời gian tập luyện,\nnhưng tôi được trời phú cho thể lực bẩm sinh, thưa Chủ tịch.\n제가 요즘 운동을 못해서 그렇지, 타고난 체력은 좋습니다, 회장님.\nI haven't been able to work out lately,\nbut I was gifted with natural stamina, Chairman.","sourceUid":"merged-mqayjadi-1086","sourceNo":674},{"id":648,"readerNo":649,"displayNo":675,"n":675,"type":"narration","text":"Có vẻ không phải như thế đâu, ừ.\n그거 아닌 것 같은데, 그래.\nI'm not so sure about that.","sourceUid":"merged-mqayjhru-1087","sourceNo":675},{"id":649,"readerNo":650,"displayNo":676,"n":676,"type":"narration","text":"Không hẳn ạ, thưa Chủ tịch.\n아닙니다, 회장님.\nNo, really, Chairman.","sourceUid":"merged-mqaz70qt-1160","sourceNo":676},{"id":650,"readerNo":651,"displayNo":677,"n":677,"type":"narration","text":"Tôi sẽ luyện thể lực ngay.\n저 금방 체력 올리겠습니다.\nI'll improve my stamina right away.","sourceUid":"merged-mqaz6rb2-1159","sourceNo":677},{"id":651,"readerNo":652,"displayNo":678,"n":678,"type":"narration","text":"Tốt, tốt.\n그래, 그래 해야지.\nGood, good.","sourceUid":"merged-mqaz6fk6-1158","sourceNo":678},{"id":652,"readerNo":653,"displayNo":679,"n":679,"type":"narration","text":"Muốn làm chuyện lớn thì nên như thế.\n큰일 날라카면 그래.\nAs you should if you want to do big things.","sourceUid":"merged-mqaz7as7-1161","sourceNo":679},{"id":653,"readerNo":654,"displayNo":680,"n":680,"type":"narration","text":"Làm việc...\ncũng chỉ là chuyện sức bền mà thôi.\n일이라는 게 결국은 체력 아이가.\nWork is all about\nstamina in the end.","sourceUid":"merged-mqaz7pvj-1162","sourceNo":680},{"id":654,"readerNo":655,"displayNo":681,"n":681,"type":"narration","text":"Chủ tịch ngài muốn uống trà không?\n차 한잔 하시겠습니까?\nWould you like a cup of tea?","sourceUid":"merged-mqaz83ct-1163","sourceNo":681},{"id":655,"readerNo":656,"displayNo":682,"n":682,"type":"narration","text":"Được, cho tôi một ly.\n네 한잔 더\nYes, I'd like one.","sourceUid":"merged-mqaz87fv-1164","sourceNo":682},{"id":656,"readerNo":657,"displayNo":683,"n":683,"type":"narration","text":"Đây là sản phẩm của chúng ta à?\nVâng, đây là bình giữ nhiệt của Bareun Lifestyle.\n아 예 그래서 바른 생활에서 나온 텀블러 입니다\nIs this our product?\nYes, this is a tumbler from Bareun Lifestyle.","sourceUid":"merged-mqaz8igv-1165","sourceNo":683},{"id":657,"readerNo":658,"displayNo":684,"n":684,"type":"narration","text":"Giờ đang là thời đại thân thiện môi trường,\nnên có nhiều người trẻ mua dùng lắm.\nSản xuất ra mấy cái này còn hại môi trường hơn.\n요즘 친환경이 유행이 구해서 젊은이들이 많이 삽니다 그거 만든다고 그래 환경이 더 많이 파괴될 게 있네\nBeing eco-friendly is in right now,\nso many young people are buying it.\nMaking those probably harms the environment more.","sourceUid":"merged-mqaz9bem-1166","sourceNo":684},{"id":658,"readerNo":659,"displayNo":685,"n":685,"type":"narration","text":"Nhưng cái đó lại phổ biến với giới trẻ à?\nThế mới nói nhỉ?\nCái đó sẽ không bán chạy lâu đâu.\n그 뭐 요즘 아들한테 좋다 그 그렇게 말입니다 그거 오래 안 팔리기도 하네\nBut that's popular among young people?\nI know, right?\nThat won't sell well for long.","sourceUid":"merged-mqazcxf2-1231","sourceNo":685},{"id":659,"readerNo":660,"displayNo":686,"n":686,"type":"narration","text":"Bảo họ làm loại vừa rẻ vừa đẹp đi.\n싸고 와있나 이쁜거 이쁜거 그런거 만들어라 예\nTell them to make affordable and pretty ones.","sourceUid":"merged-mqazd6ad-1232","sourceNo":686},{"id":660,"readerNo":661,"displayNo":687,"n":687,"type":"narration","text":"Vâng.\nTôi còn phải học hỏi nhiều\n제가 회장님 인사이트 따라가려면\nI have a long way to go before I can attain","sourceUid":"merged-mqazdchp-1233","sourceNo":687},{"id":661,"readerNo":662,"displayNo":688,"n":688,"type":"narration","text":"mới đạt được tầm nhìn như Chủ tịch ạ.\n하참 먼 것 같습니다\nyour level of insight.","sourceUid":"merged-mqazdgfa-1234","sourceNo":688},{"id":662,"readerNo":663,"displayNo":690,"n":690,"type":"narration","text":"Cảm ơn cậu vì ly trà nhé.\n사람을 잘 따를 줄 알아야 된다 그래\nThanks for the tea.\nManaging Director Ha.\nYes, Chairman.","sourceUid":"merged-mqazrjpz-1384","sourceNo":690},{"id":663,"readerNo":664,"displayNo":691,"n":691,"type":"narration","text":"Nếu cậu...\nmuốn leo cao hơn,\nthì cậu cần biết cách quản lý nhân sự cho tốt.\n니 다 알 필요는 뭐 있노\nIf you want to...\nclimb up higher,\nyou need to know how to manage people well.","sourceUid":"merged-mqazqzu7-1383","sourceNo":691},{"id":664,"readerNo":665,"displayNo":692,"n":692,"type":"narration","text":"Sao cứ phải tự làm thế?\nCứ để người khác xử lý cho cậu. Hiểu chứ?\n시키면 되는 거 아이가 그래\nWhy do everything yourself?\nJust have others handle it for you. Got it?","sourceUid":"merged-mqazs1cu-1385","sourceNo":692},{"id":665,"readerNo":666,"displayNo":693,"n":693,"type":"narration","text":"Ê.\n어이\nHey.","sourceUid":"merged-0693","sourceNo":693},{"id":666,"readerNo":667,"displayNo":694,"n":694,"type":"narration","text":"Vâng.\n예\nYes.","sourceUid":"merged-0694","sourceNo":694},{"id":667,"readerNo":668,"displayNo":695,"n":695,"type":"narration","text":"Vâng, tôi hiểu, thưa Chủ tịch.\n영심하겠습니다 회장님\nYes. I'll take that to heart, Chairman.","sourceUid":"merged-mqazsfvo-1386","sourceNo":695},{"id":668,"readerNo":669,"displayNo":696,"n":696,"type":"narration","text":"Ngài định ăn trưa món gì ạ?\n식사는 어떻게 하시겠습니까\nWhat will you do about lunch?","sourceUid":"merged-mqb0bjlo-1452","sourceNo":696},{"id":669,"readerNo":670,"displayNo":697,"n":697,"type":"narration","text":"Tôi có đặt nhà hàng rồi.\n예약은 해뒀습니다\nI've reserved a restaurant.","sourceUid":"merged-mqazstcr-1388","sourceNo":697},{"id":670,"readerNo":671,"displayNo":698,"n":698,"type":"narration","text":"Để lần sau đi.\n다음에 묵지 뭐 그래\nLet's eat another time.","sourceUid":"merged-mqazszmd-1389","sourceNo":698},{"id":671,"readerNo":672,"displayNo":699,"n":699,"type":"narration","text":"Tôi không đói lắm.\n내가 안 고프네\nI'm not that hungry.","sourceUid":"merged-mqazt46k-1390","sourceNo":699},{"id":672,"readerNo":673,"displayNo":700,"n":700,"type":"narration","text":"Vâng.\n예\nYes.","sourceUid":"merged-0700","sourceNo":700},{"id":673,"readerNo":674,"displayNo":701,"n":701,"type":"narration","text":"cứu công ty là ưu tiên hàng đầu, đúng không?\n봐라 봐라 뒤 좀 보자 그래\nsaving the company is the first priority, okay?","sourceUid":"merged-mqb0c2i3-1453","sourceNo":701},{"id":674,"readerNo":675,"displayNo":702,"n":702,"type":"narration","text":"Được rồi, đi thôi.\n됐다. 그만 가자.\nThat's enough. Let's go.","sourceUid":"merged-mqazl0rc-1309","sourceNo":702},{"id":675,"readerNo":676,"displayNo":703,"n":703,"type":"narration","text":"Giờ tôi đưa ngài về nhà nhé ạ?\n댁으로 모실까요?\nShall I take you home?","sourceUid":"merged-mqazl8q7-1310","sourceNo":703},{"id":676,"readerNo":677,"displayNo":704,"n":704,"type":"narration","text":"Hôm nay tôi sẽ đến chợ trời.\nNgài có thời gian không?\n오늘 풍물시장 가려고 가는데 시간이 있으신가?\nI'm going to the flea market today.\nDo you have time?","sourceUid":"merged-mqb0ddxb-1454","sourceNo":704},{"id":677,"readerNo":678,"displayNo":705,"n":705,"type":"narration","text":"Thôi khỏi. Đến thẳng Cheonggyecheon đi.\n됐고 그래도 전기철로 가자.\nForget it, let's just go by electric train.","sourceUid":"merged-mqazlrsn-1312","sourceNo":705},{"id":678,"readerNo":679,"displayNo":706,"n":706,"type":"narration","text":"Sao tự dưng lại gọi tôi ra đây nhỉ?\n갑자기 왜 나오라는 겁니까?\nWhy are you suddenly telling me to come out?","sourceUid":"merged-mqazlz46-1313","sourceNo":706},{"id":679,"readerNo":680,"displayNo":707,"n":707,"type":"narration","text":"Anh ta đang định dạy dỗ chúng ta hay gì?\n또 분기 잡으려고 그러나\nTrying to catch another quarterly target, I suppose.","sourceUid":"merged-mqazm772-1314","sourceNo":707},{"id":680,"readerNo":681,"displayNo":708,"n":708,"type":"narration","text":"Giám đốc điều hành.\n주문\nOrder.","sourceUid":"merged-mqazmo8v-1315","sourceNo":708},{"id":681,"readerNo":682,"displayNo":709,"n":709,"type":"narration","text":"- Giám đốc Ha, anh đến rồi. - Anh mới đi leo núi à?\n주문","sourceUid":"merged-mqazn57g-1316","sourceNo":709},{"id":682,"readerNo":683,"displayNo":710,"n":710,"type":"narration","text":"Anh/chị ổn chứ?\n괜찮으셨습니까?\nAre you okay?","sourceUid":"merged-0710","sourceNo":710},{"id":683,"readerNo":684,"displayNo":711,"n":711,"type":"narration","text":"Anh/chị có ổn không?\n괜찮으셨어요?\nAre you alright?","sourceUid":"merged-0711","sourceNo":711},{"id":684,"readerNo":685,"displayNo":712,"n":712,"type":"narration","text":"Ừ, tôi đi cùng Chủ tịch.\n회장님이랑\nWith the Chairman","sourceUid":"merged-mqazna99-1317","sourceNo":712},{"id":685,"readerNo":686,"displayNo":713,"n":713,"type":"narration","text":"Chỉ có hai người thôi à?\n두 분이세요?\nJust the two of you?","sourceUid":"merged-mqaznhk5-1318","sourceNo":713},{"id":686,"readerNo":687,"displayNo":714,"n":714,"type":"narration","text":"Ừ, lâu lâu đi ấy mà.\n네 뭐 중등 갑니다\nYes, well, I'm heading to the middle school.","sourceUid":"merged-mqazntml-1319","sourceNo":714},{"id":687,"readerNo":688,"displayNo":715,"n":715,"type":"narration","text":"Chắc anh đã nói một chút với ngài ấy nhỉ.\n얘기 좀 나누셨겠네요\nYou must have had a talk, then.","sourceUid":"merged-mqazo0sf-1320","sourceNo":715},{"id":688,"readerNo":689,"displayNo":716,"n":716,"type":"narration","text":"Ngài ấy nói quanh đi quẩn lại cũng chỉ mấy câu này.\n매번 같은 말씀 하시죠","sourceUid":"merged-mqazo7fw-1321","sourceNo":716},{"id":689,"readerNo":690,"displayNo":717,"n":717,"type":"narration","text":"\"Chăm lo công ty thật tốt\",\n회사 잘 부탁한다\n\"Take good care of the company\"","sourceUid":"merged-mqb0ewdq-1515","sourceNo":717},{"id":690,"readerNo":691,"displayNo":718,"n":718,"type":"narration","text":"Anh phải làm tốt được.\n네가 잘해야 된다\nand \"You have to do well.\"","sourceUid":"merged-mqb0f0cs-1516","
