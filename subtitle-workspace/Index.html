sourceNo":718},{"id":691,"readerNo":692,"displayNo":719,"n":719,"type":"narration","text":"Nhưng hôm nay ngài ấy nhấn mạnh chuyện đó\n그런데 오늘은 너무 강하게 말씀을 하셔서 저도 이제\nBut he spoke so strongly today that","sourceUid":"merged-mqbw9zpu-183","sourceNo":719},{"id":692,"readerNo":693,"displayNo":720,"n":720,"type":"narration","text":"nên làm tôi tự hỏi\nliệu có nên chấp nhận không đây.\n저도 이제 받아들여야 되나 싶더라고요\nit made me wonder...\nif I should accept it now.","sourceUid":"merged-mqbwacub-184","sourceNo":720},{"id":693,"readerNo":694,"displayNo":721,"n":721,"type":"narration","text":"Giờ Chủ tịch cũng đã có tuổi,\n회장님 연세가 있으시니까\nSince the chairman is getting old now,","sourceUid":"merged-mqbwavle-185","sourceNo":721},{"id":694,"readerNo":695,"displayNo":722,"n":722,"type":"narration","text":"tôi lo công ty sẽ gặp rắc rối mất.\n이러다가 회사 큰일 날 것 같아서\nI'm worried our company may end up in trouble.","sourceUid":"merged-mqbwbpde-186","sourceNo":722},{"id":695,"readerNo":696,"displayNo":723,"n":723,"type":"narration","text":"Tất nhiên rồi.\nNgài ấy chẳng nói gì về Yoon Joo No hết hả?\n그럼요 윤준호 관련해서 회장님 별 말씀 없으셨고요\nOf course.\nHe didn't say anything regarding Yun Ju No?","sourceUid":"merged-mqbwd5ey-188","sourceNo":723},{"id":696,"readerNo":697,"displayNo":724,"n":724,"type":"narration","text":"Có lẽ ngài ấy cũng có ngụ ý.\n그것도 같이 말씀을 하신 거겠죠\nHe probably implied it.","sourceUid":"merged-mqbwdncq-189","sourceNo":724},{"id":697,"readerNo":698,"displayNo":725,"n":725,"type":"narration","text":"Vì việc vận hành nhóm bao gồm tất cả mọi thứ.\n그리고 운영이라는 게 다 포함이 돼 있는 거니까\nSince operating the group includes everything.","sourceUid":"merged-mqbwdvxe-190","sourceNo":725},{"id":698,"readerNo":699,"displayNo":726,"n":726,"type":"narration","text":"Của anh đây.\n그러니까\nHere you go.","sourceUid":"merged-mqbwe4i1-191","sourceNo":726},{"id":699,"readerNo":700,"displayNo":727,"n":727,"type":"narration","text":"Giám đốc Ha, hôm nay tôi mời anh một bữa.\n사장님 저 오늘 제가 한 잔 사겠습니다\nMr. Ha, I'll buy you a drink today.","sourceUid":"merged-mqbwegep-192","sourceNo":727},{"id":700,"readerNo":701,"displayNo":728,"n":728,"type":"narration","text":"Tôi sẽ đặt chỗ ngay đây.\n제가 바로 예약을 하겠습니다\nI'll make a reservation right away.","sourceUid":"merged-mqbweuap-193","sourceNo":728},{"id":701,"readerNo":702,"displayNo":729,"n":729,"type":"narration","text":"Chỗ này làm ngon lắm.\n이 집이 진짜 맛있는데요\nThis place is really tasty.","sourceUid":"merged-mqbwfaoz-194","sourceNo":729},{"id":702,"readerNo":703,"displayNo":730,"n":730,"type":"narration","text":"Thôi đừng, lần sau đi.\n아뇨 아뇨 다음에\nNo, no. Next time.","sourceUid":"merged-mqbwfjro-195","sourceNo":730},{"id":703,"readerNo":704,"displayNo":731,"n":731,"type":"narration","text":"Tôi ăn với Chủ tịch rồi.\n나 회장님이랑 뭐 좀 먹었어요\nI already ate with the chairman.","sourceUid":"merged-mqbwftb4-196","sourceNo":731},{"id":704,"readerNo":705,"displayNo":732,"n":732,"type":"narration","text":"Vậy Giám đốc Lee thì sao?\nHẳn anh ta sẽ rời đi nhỉ?\n이상우님은 어떻게 되려나 곧 나가겠죠\nWhat will happen to Mr. Lee?\nHe'll probably leave, right?","sourceUid":"merged-mqbwgh0l-197","sourceNo":732},{"id":705,"readerNo":706,"displayNo":733,"n":733,"type":"narration","text":"Chắc vậy.\n그렇겠네\nThat's probably right.","sourceUid":"merged-0733","sourceNo":733},{"id":706,"readerNo":707,"displayNo":734,"n":734,"type":"narration","text":"- Chắc vậy rồi. - Ừ.\nPhải vậy chứ, đi thôi.\n그럼 나가야지 갑시다\n- Probably. - Yes.\nHe should. Let's go.","sourceUid":"merged-mqbwgvjc-198","sourceNo":734},{"id":707,"readerNo":708,"displayNo":735,"n":735,"type":"narration","text":"Chú ơi, cái này bao nhiêu tiền ạ?\n- Cậu muốn mua cái kia hả? - Vâng.\n사장님 이거 얼마예요\nSir, how much is this?\n- Do you want to buy that? - Yes.","sourceUid":"merged-mqbwhs16-199","sourceNo":735},{"id":708,"readerNo":709,"displayNo":736,"n":736,"type":"narration","text":"Anh mua không? Anh mua đi?\n사세요? 사시게?\nBuy it? Are you buying it?","sourceUid":"merged-0736","sourceNo":736},{"id":709,"readerNo":710,"displayNo":737,"n":737,"type":"narration","text":"Vâng.\n네\nYes.","sourceUid":"merged-0737","sourceNo":737},{"id":710,"readerNo":711,"displayNo":738,"n":738,"type":"narration","text":"Cậu rành về xà cừ nhỉ.\nMón đó 500.000 won.\n자기를 좀 아시네, 50?\nYou know your mother-of-pearl*. (*pearlescent interior of mollusc shell)\nIt's 500,000 won.","sourceUid":"merged-mqbwj20y-201","sourceNo":738},{"id":711,"readerNo":712,"displayNo":739,"n":739,"type":"narration","text":"Đắt thế.\n에이, 비싸다\nThat's expensive.","sourceUid":"merged-mqbwifp5-200","sourceNo":739},{"id":712,"readerNo":713,"displayNo":740,"n":740,"type":"narration","text":"Xà cừ mà giá đó là rẻ rồi.\n자기가 50이면 싸지\n500,000 won is cheap for mother-of-pearl.","sourceUid":"merged-mqbwjkew-202","sourceNo":740},{"id":713,"readerNo":714,"displayNo":741,"n":741,"type":"narration","text":"Rẻ thì sao trong khi tôi không có nhiều tiền đến thế.\n싸우면 뭐해요, 나한테 그만한 돈이 없는데\nSo what if it's cheap\nwhen I don't have that much money.","sourceUid":"merged-mqbwjzw1-203","sourceNo":741},{"id":714,"readerNo":715,"displayNo":742,"n":742,"type":"narration","text":"Vậy cậu có bao nhiêu?\n얼마 있는데?\nHow much do you have?","sourceUid":"merged-mqbwkl82-204","sourceNo":742},{"id":715,"readerNo":716,"displayNo":743,"n":743,"type":"narration","text":"Chắc khoảng 400.000 won.\n이거 한 40 되려나?\nMaybe about 400,000 won.","sourceUid":"merged-mqbwnv4n-326","sourceNo":743},{"id":716,"readerNo":717,"displayNo":744,"n":744,"type":"narration","text":"Được rồi.\nKhoan, khoan.\n봐라, 봐라, 봐라\nWait, wait, wait.","sourceUid":"merged-mqbwobs2-327","sourceNo":744},{"id":717,"readerNo":718,"displayNo":745,"n":745,"type":"narration","text":"Sao anh lại mua mấy thứ vô bổ nữa rồi?\n물도 쓰잘데 없는거 살라고 그래\nWhy are you buying something useless again?","sourceUid":"merged-mqbwooep-328","sourceNo":745},{"id":718,"readerNo":719,"displayNo":746,"n":746,"type":"narration","text":"Ông ấy nói đây là xà cừ.\n자괴라는데\nHe says this is mother-of-pearl.","sourceUid":"merged-mqbwp687-329","sourceNo":746},{"id":719,"readerNo":720,"displayNo":747,"n":747,"type":"narration","text":"Xà cừ hay vỏ sò?\n아이고 자괴가 조괴가네\nMother-of-pearl or clam.","sourceUid":"merged-mqbwpl6i-330","sourceNo":747},{"id":720,"readerNo":721,"displayNo":748,"n":748,"type":"narration","text":"Sao anh lại mua đồ đã qua sử dụng?\n남이 쓰던걸 뭐한다고 사라고 그래\nWhy would you buy a used item?","sourceUid":"merged-mqbwpw3l-331","sourceNo":748},{"id":721,"readerNo":722,"displayNo":749,"n":749,"type":"narration","text":"Đi ăn mì đi.\n가자 국수나 먹으러\nLet's go get some noodles.","sourceUid":"merged-mqbwq5og-332","sourceNo":749},{"id":722,"readerNo":723,"displayNo":750,"n":750,"type":"narration","text":"Đi thôi.\n가라 그래\nLet's go.","sourceUid":"merged-mqbwqeqn-333","sourceNo":750},{"id":723,"readerNo":724,"displayNo":751,"n":751,"type":"narration","text":"Tên khốn này.\nTự nhiên xen vào.\n에라이, 거지 깨깨이 같은 놈이. 대박이네.\nDamn that wretched jerk.\nWhy interfere?","sourceUid":"merged-mqbwqmzu-334","sourceNo":751},{"id":724,"readerNo":725,"displayNo":752,"n":752,"type":"narration","text":"Ngon mà nhỉ?\n맛있는데?\nIt's delicious, isn't it?","sourceUid":"merged-0752","sourceNo":752},{"id":725,"readerNo":726,"displayNo":753,"n":753,"type":"narration","text":"Cảm ơn cô.\nKhẩu vị của anh chẳng khác gì hồi trẻ.\n요리 때 입맛은 참 안 변하지.\nThank you.\nYour tastes don't change from your youth.","sourceUid":"merged-mqbwyaa0-336","sourceNo":753},{"id":726,"readerNo":727,"displayNo":754,"n":754,"type":"narration","text":"Tất nhiên rồi.\nChính vì thế mà nó trở thành một ký ức đẹp.\n맞지. 그러니까 내가 뭐 추억도 내고 그러는 거 아이가.\nOf course not.\nThat's how it becomes a cherished memory.","sourceUid":"merged-mqbwyrvu-337","sourceNo":754},{"id":727,"readerNo":728,"displayNo":755,"n":755,"type":"narration","text":"Anh nói đúng.\n그러네.\nYou're right.","sourceUid":"merged-mqbwz40a-338","sourceNo":755},{"id":728,"readerNo":729,"displayNo":756,"n":756,"type":"narration","text":"Sao anh lại bỏ cuộc?\n나 그만두는데.\nWhy are you quitting?","sourceUid":"merged-mqbwzd61-339","sourceNo":756},{"id":729,"readerNo":730,"displayNo":757,"n":757,"type":"narration","text":"Lại nhắc nữa.\n또 그 얘기 하시네.\nYou're bringing that up again.","sourceUid":"merged-mqbwzjim-340","sourceNo":757},{"id":730,"readerNo":731,"displayNo":758,"n":758,"type":"narration","text":"Tôi và anh có chung nhiều kỷ niệm mà,\nnên nó làm tôi buồn.\n사람아 자네하고 내가하고 추억이 얼마나 많냐고 그래 섭섭하고\nYou and I share so many memories. It makes me so sad.","sourceUid":"merged-mqbx0krc-343","sourceNo":758},{"id":731,"readerNo":732,"displayNo":759,"n":759,"type":"narration","text":"Tôi chỉ nghĩ đã đến lúc phải đi thôi.\n그냥 이제 자리 피워줄 때 됐지 싶어서\nI just thought it was time to leave now.","sourceUid":"merged-mqbx1zxt-345","sourceNo":759},{"id":732,"readerNo":733,"displayNo":760,"n":760,"type":"narration","text":"Tôi thấy mình trở nên tham lam hơn.\n내가 뭐 욕심이 더 많이 생기던데\nI feel like I've become greedier.","sourceUid":"merged-mqbx28rm-346","sourceNo":760},{"id":733,"readerNo":734,"displayNo":761,"n":761,"type":"narration","text":"Người ta nói một cái chậu cũ chứa được nhiều thứ hơn.\n밝은 부대일수록 더 많이 당긴다 안 하드나\nThey say an old basin can hold much more.","sourceUid":"merged-mqbx2p9b-347","sourceNo":761},{"id":734,"readerNo":735,"displayNo":762,"n":762,"type":"narration","text":"Đã có mọi thứ trong tay, anh còn muốn gì hơn nữa?\n다 가지셨으면서 무슨 욕심을 또\nWhat more could you want when you have everything?","sourceUid":"merged-mqbx2yg2-348","sourceNo":762},{"id":735,"readerNo":736,"displayNo":763,"n":763,"type":"narration","text":"Tôi cần sự đồng hành của con người\n뭐 사람 욕심이지\nMy desire for people.","sourceUid":"merged-mqbx3k7d-349","sourceNo":763},{"id":736,"readerNo":737,"displayNo":764,"n":764,"type":"narration","text":"Mọi người dần rời xa tôi theo thời gian.\n시간이기라도 하나 둘 떠나가는데\nPeople are leaving me as time goes by.","sourceUid":"merged-mqbx3zuq-350","sourceNo":764},{"id":737,"readerNo":738,"displayNo":765,"n":765,"type":"narration","text":"Người ta chết thì tôi không làm gì được,\n죽어가는 거야 뭐 어쩔 수 없다 해도\nI can't help it when people die,","sourceUid":"merged-mqbx59kx-351","sourceNo":765},{"id":738,"readerNo":739,"displayNo":766,"n":766,"type":"narration","text":"nhưng người sống mà chạy trốn khỏi tôi\nthì không được.\n사는 놈이 내한테 도망갔다 오는 건 뭐 거짓말 안 걸려?\nbut when a live person runs away from me,\nthat's no good.","sourceUid":"merged-mqbx5t0a-352","sourceNo":766},{"id":739,"readerNo":740,"displayNo":767,"n":767,"type":"narration","text":"Có biết bao nhiêu người theo anh mà anh nói vậy được hả?\n우리 회장이 다른 사람이 얼마나 많은지 끊소\nHow could you say that when so many follow you?","sourceUid":"merged-mqbx6dax-353","sourceNo":767},{"id":740,"readerNo":741,"displayNo":768,"n":768,"type":"narration","text":"Họ chỉ muốn công ty của tôi, vì tôi không giao nó lại cho con cái.\n내 회사를 자식한테 몰려준다 하니까\nThey just want my company since I'm not passing it\nto my children. How can I trust those people?","sourceUid":"merged-mqbx9jne-415","sourceNo":768},{"id":741,"readerNo":742,"displayNo":769,"n":769,"type":"narration","text":"Sao tôi tin đám người đó được?\n그거 받으려고 하니 그런 놈들 어찌 믿겠노?\nHow can I trust those kinds of people who would only try to take it?","sourceUid":"merged-mqbxd4s9-418","sourceNo":769},{"id":742,"readerNo":743,"displayNo":770,"n":770,"type":"narration","text":"Đó là lý do…\nTôi phụ thuộc rất nhiều vào anh đó.\n그래가 내 얘한테 많이 의지하잖아\nThat's why...\nI depend on you a lot.","sourceUid":"merged-mqbxcy4a-417","sourceNo":770},{"id":743,"readerNo":744,"displayNo":771,"n":771,"type":"narration","text":"Xin lỗi nha.\nAnh không có ý định giao lại cho Giám đốc Ha à?\n의왕호, 현준아, 인하.\nUiwang-ho, Hyeon-jun-ah, In-ha.\nYou're not interested in passing it onto Mr. Ha?","sourceUid":"merged-mqcdc8fg-61","sourceNo":771},{"id":744,"readerNo":745,"displayNo":772,"n":772,"type":"narration","text":"Da, để tôi xem sao, cứ chờ xem. Dù sao đi nữa về vụ Ju Yun No - Anh nói đó là yêu cầu cuối cùng của anh\n뭐 자네가 많이 막 부탁해라가.\n- Yes? - You said it was your final request","sourceUid":"merged-mqcds7at-73","sourceNo":772},{"id":745,"readerNo":746,"displayNo":773,"n":773,"type":"narration","text":"Dù sao đi nữa, nên tôi đã đưa cậu ta quay về.\n왜 들어왔는데? 응.\nWhy did you come in?\nso I brought him back.\nYeah.","sourceUid":"merged-mqcdxvzz-80","sourceNo":773},{"id":746,"readerNo":747,"displayNo":776,"n":776,"type":"narration","text":"Nhưng tôi không tin cậu ta.\n- Ừ… - Nên cho tới khi cậu ta làm xong việc,\nthì anh không được rời khỏi tôi.\n얼마가 이게 마칠 때까지, 니, 내 딸 하면 안 돼.\n- Okay. However, I don't trust him. If that guy causes trouble again so until he finishes his job, you can't leave me.","sourceUid":"merged-mqcdvwkw-78","sourceNo":776},{"id":747,"readerNo":748,"displayNo":777,"n":777,"type":"narration","text":"Này, tôi thật sự muốn nghỉ ngơi mà.\n아니, 난 진짜 좀 쉬고 싶어서 그래.\nI really want to rest a bit.","sourceUid":"merged-mqcdto23-75","sourceNo":777},{"id":748,"readerNo":749,"displayNo":780,"n":780,"type":"narration","text":"Nếu cậu ta lại gây rắc rối,\nkhông phải anh phải chịu trách nhiệm sao?\n니 책임져야 할 거 아이가?\nwon't you have to take responsibility for it?","sourceUid":"merged-mqcdu87k-76","sourceNo":780},{"id":749,"readerNo":750,"displayNo":783,"n":783,"type":"narration","text":"Anh cũng biết tôi tin tưởng anh\nchứ không phải cậu ta mà.\n그러면 안 믿는다 알아\nYou know, I'm trusting you,\nnot him. Do you understand?","sourceUid":"merged-mqcdhjp2-64","sourceNo":783},{"id":750,"readerNo":751,"displayNo":784,"n":784,"type":"narration","text":"Tôi biết rồi.\nNhưng…\nYoon Joo No không phải người như vậy.\n알겠네 근데 윤준호가 그런 사람은 아니거든\nI understand. But... Yun Ju No isn't like that.","sourceUid":"merged-mqcdhvgq-65","sourceNo":784},{"id":751,"readerNo":752,"displayNo":785,"n":785,"type":"narration","text":"Thôi, ngưng đi, được không?\nÔi, ông bạn già. Không có tôi anh làm gì được đây?\n됐다 그래 고마워라 어이 아이고 이 사람아 그래 나이 가면\nForget it. Stop it. Okay?\nAigoo, friend.\nWhat will you do without me?","sourceUid":"merged-mqcdk8we-66","sourceNo":785},{"id":752,"readerNo":753,"displayNo":786,"n":786,"type":"narration","text":"Từng tuổi này rồi sao anh còn ngây thơ vậy? Anh còn muốn mua xà cừ nữa chứ, ôi trời…\n그리 순진해 빠져가 너 역시 어찌 남이 쓰다버리면 자괴나 산다\nHow could you be so naive at your age?\nYou tried to buy a used mother-of-pearl. Aigoo...","sourceUid":"merged-mqcdn92d-68","sourceNo":786},{"id":753,"readerNo":754,"displayNo":787,"n":787,"type":"narration","text":"Thật là…\nĂn mì của anh đi.\n까지 않나 아이고야 참 국신아 물어 어이\nGoodness.\nJust eat your noodles. Okay?","sourceUid":"merged-mqcdnxbi-69","sourceNo":787},{"id":754,"readerNo":755,"displayNo":788,"n":788,"type":"narration","text":"Tôi tò mò một chuyện.\n궁금한 게 있어서\nI was curious about something.","sourceUid":"merged-mqcdoqsg-70","sourceNo":788},{"id":755,"readerNo":756,"displayNo":789,"n":789,"type":"narration","text":"Vâng.\n네\nOkay.","sourceUid":"merged-mqcdpb9s-72","sourceNo":789},{"id":756,"readerNo":757,"displayNo":790,"n":790,"type":"narration","text":"Cậu có lý do khác đến Hàn Quốc không?\n전에 한국으로 온 이유가 따로 있는 건가?\nDo you have a different reason for coming to Korea?","sourceUid":"merged-mqcdp4lq-71","sourceNo":790},{"id":757,"readerNo":758,"displayNo":791,"n":791,"type":"narration","text":"về chuyện Yoon Joo No…\n사모님이 저를 한국으로 부르신 건\nabout Yun Ju No...\nI know you called me back to Korea","sourceUid":"merged-mqce0mnb-81","sourceNo":791},{"id":758,"readerNo":759,"displayNo":792,"n":792,"type":"narration","text":"Tôi biết ngài gọi tôi về Hàn Quốc là với ý định cứu lấy Sannin.\n산인을 살리라는 뜻인 건 저도 알고 있습니다\nto save Sanin, Executive Director.","sourceUid":"merged-mqce2fys-143","sourceNo":792},{"id":759,"readerNo":760,"displayNo":793,"n":793,"type":"narration","text":"Tôi muốn hỏi để biết liệu cậu có động cơ thầm kín nào không.\n다른 이유가 있냐고 물은 거네\nI asked if you have any ulterior motives.","sourceUid":"merged-mqce3o9j-145","sourceNo":793},{"id":760,"readerNo":761,"displayNo":794,"n":794,"type":"narration","text":"Vâng.\nNếu cậu làm vì động cơ đó,\nthì hãy rút khỏi chuyện này đi.\n그런 마음으로 이 일을 하는 거면 그만두게.\nYes.\nIf you are working with such a motive,\ntake your hands off of it.","sourceUid":"merged-mqce4f5i-146","sourceNo":794},{"id":761,"readerNo":762,"displayNo":795,"n":795,"type":"narration","text":"Tổ trưởng Yoon.\nNếu cậu làm vì động cơ đó,\ncậu sẽ làm hỏng việc và tự hủy hoại mình.\n윤팀장, 그런 마음으로 일을 하면 일도 그르치고 자네도 망가져.\nMr. Yun,\nif you work with such a motive,\nyou will mess up the task and ruin yourself.","sourceUid":"merged-mqceg7ea-147","sourceNo":795},{"id":762,"readerNo":763,"displayNo":796,"n":796,"type":"narration","text":"Tôi còn có thể hủy hoại bản thân tệ hơn bây giờ được nữa sao?\n제가 여기서 어떻게 더 망가질 수 있겠습니까?\nHow could I ruin myself more than I already am?","sourceUid":"merged-mqcegjqc-148","sourceNo":796},{"id":763,"readerNo":764,"displayNo":797,"n":797,"type":"narration","text":"Đúng là bộ phận Xây dựng đang gánh vác phần còn lại.\n사실상 건설이 나머지를 먹여 살리고 있는 게 맞습니다\nIt's true that Construction is carrying the rest.","sourceUid":"merged-mqcej848-149","sourceNo":797},{"id":764,"readerNo":765,"displayNo":798,"n":798,"type":"narration","text":"Vấn đề là tỷ suất lợi nhuận của bộ phận Xây dựng\ncũng đang giảm do sự chậm trễ\n문제는 건설도 재건축 관련 규제 완화가 지연되면서\nThe problem is Construction's profit margin\nis also trending down due to delays","sourceUid":"merged-mqcejqo3-150","sourceNo":798},{"id":765,"readerNo":766,"displayNo":799,"n":799,"type":"narration","text":"khiến cho tỷ suất lợi nhuận đang có xu hướng giảm.\n이익률이 하향세를 그리고 있는 건데요\nAs the deregulation of reconstruction-related policies is being delayed.","sourceUid":"merged-0799","sourceNo":799},{"id":766,"readerNo":767,"displayNo":800,"n":800,"type":"narration","text":"Nhưng đối với bộ phận Xây dựng,trong việc nới lỏng các quy định về tái thiết.\nviệc thay đổi quy định có thể tạo động lực,\n근데 건축 쪽은 법이 바뀌면 모멘텀에 있을 수 있어서요\nBut for Construction,\nin easing regulations on reconstruction.\na change in regulations can give it momentum,","sourceUid":"merged-mqcelk8g-151","sourceNo":800},{"id":767,"readerNo":768,"displayNo":801,"n":801,"type":"narration","text":"do đó tỷ suất lợi nhuận của họ có thể phục hồi.\n이익률이 반등할 수도 있습니다\nso its profit margin could rebound.","sourceUid":"merged-mqcenmwn-153","sourceNo":801},{"id":768,"readerNo":769,"displayNo":802,"n":802,"type":"narration","text":"Giá thị trường để bán tất cả các công ty con\nngoại trừ bộ phận Xây dựng là khoảng 7 nghìn tỷ won.\n그래서 건설을 제외한 회사를 다 팔면 7조 정도가 시장 가격입니다\nThe market price for selling every subsidiary,\napart from the Construction, is about 7 trillion won.\nIf selling all but Construction gets us to 7 trillion,","sourceUid":"merged-mqceo4xo-154","sourceNo":802},{"id":769,"readerNo":770,"displayNo":803,"n":803,"type":"narration","text":"Bán hết trừ mảng xây dựng được 7 nghìn tỷ, vậy nếu chúng ta làm tốt, có thể tạo ra tới 11 nghìn tỷ không?\n건설 빼고 다 팔아서 7조면 우리가 잘하면 11조까지 만들 수 있나요?\nIf we sell everything except construction for 7 trillion, can we make it up to 11 trillion if we do well?","sourceUid":"merged-0803","sourceNo":803},{"id":770,"readerNo":771,"displayNo":804,"n":804,"type":"narration","text":"Không dễ nhưng không phải không thể.\n쉽진 않겠지만 불가능하진 않습니다.\nIt won't be easy, but it's not impossible.","sourceUid":"merged-mqcepx33-155","sourceNo":804},{"id":771,"readerNo":772,"displayNo":805,"n":805,"type":"narration","text":"Nếu chúng ta bán các công ty con khác thành công,\n- thì không phải là không thể sao? - Vâng.\n나머지 회사들을 잘 팔면 불가능하진 않다?\nIf we sell other subsidiaries well,\n- it's not impossible? - No.","sourceUid":"merged-mqceseg5-216","sourceNo":805},{"id":772,"readerNo":773,"displayNo":806,"n":806,"type":"narration","text":"Vấn đề duy nhất là doanh số\nnhìn tổng thế đang bị chậm lại.\n네. 다만 전반적으로 매출이 부진한 문제가 있어서요.\nThe only thing is, the sales\nare lagging overall.","sourceUid":"merged-mqcestz1-217","sourceNo":806},{"id":773,"readerNo":774,"displayNo":807,"n":807,"type":"narration","text":"Lý do là gì?\n이유는?\nWhy?","sourceUid":"merged-mqcet3g5-218","sourceNo":807},{"id":774,"readerNo":775,"displayNo":808,"n":808,"type":"narration","text":"Việc chúng ta không thể gia nhập thị trường trực tuyến\nlà yếu tố chính.\n온라인 마켓으로 진입하는 데 실패한 게 큰 요인으로 보입니다.\nOur failure to enter the online market\nis a major factor.","sourceUid":"merged-mqcetqsd-219","sourceNo":808},{"id":775,"readerNo":776,"displayNo":809,"n":809,"type":"narration","text":"Hầu hết các hoạt động kinh doanh chủ chốt của chúng ta\nđều dựa vào doanh số bán hàng tại cửa hàng truyền thống.\n저희 주력 기업들은 대부분이 오프라인 매장 판매가 주인데요.\nMost of our key businesses\nrely on offline store sales.","sourceUid":"merged-mqceu699-220","sourceNo":809},{"id":776,"readerNo":777,"displayNo":810,"n":810,"type":"dialogue","text":"Các công ty khác đã bắt đầu chuyển đổi sang\nmô hình D2C hơn một thập kỷ trước. (D2C: Trực tiếp đến người tiêu dùng)\n다른 기업들은 10여 년 전부터 G2C로 변경하고 있었고\nOther companies started transitioning to\nD to C* more than a decade ago. (*Direct to Consumer)","sourceUid":"merged-mqceulp4-221","sourceNo":810},{"id":777,"readerNo":778,"displayNo":811,"n":811,"type":"narration","text":"Hiện tại, doanh thu trực tuyến của họ chiếm tỷ trọng lớn hơn.\n지금은 온라인 비중이 훨씬 더 큽니다\nNow, their online sales make up a larger portion.","sourceUid":"merged-mqcf3cfm-222","sourceNo":811},{"id":778,"readerNo":779,"displayNo":812,"n":812,"type":"narration","text":"So ra thì\nSanin gần như không có mặt trên thị trường trực tuyến.\n그에 비해 산인은 온라인 마켓에 손꼽을 정도고요\nIn comparison, Sanin has\nbarely any presence in the online market.","sourceUid":"merged-mqcf47jn-223","sourceNo":812},{"id":779,"readerNo":780,"displayNo":813,"n":813,"type":"narration","text":"Chắc chỉ có ngành Thời trang thôi.\n패션 용도네\nOnly in Fashion, I guess.","sourceUid":"merged-mqcf4on9-224","sourceNo":813},{"id":780,"readerNo":781,"displayNo":814,"n":814,"type":"narration","text":"Thành thật mà nói\nchuyện họ chưa phá sản đúng là phép màu.\n아니 솔직히 이러고도 안 망한 게 다행이죠\nHonestly,\nit's a miracle they haven't gone under yet.","sourceUid":"merged-mqcf50jr-225","sourceNo":814},{"id":781,"readerNo":782,"displayNo":815,"n":815,"type":"narration","text":"Bây giờ, ai cũng mua sắm bằng điện thoại.\n요즘 다들 핸드폰으로 사는데\nEveryone shops on their phones nowadays.","sourceUid":"merged-mqcf5jyc-226","sourceNo":815},{"id":782,"readerNo":783,"displayNo":816,"n":816,"type":"narration","text":"Nhưng\nsao họ không chuyển hướng?\n근데 왜 안 하는 거예요?\nBut...\nwhy aren't they making the shift?","sourceUid":"merged-mqcf5u4l-227","sourceNo":816},{"id":783,"readerNo":784,"displayNo":817,"n":817,"type":"narration","text":"Nếu đặt hàng bằng điện thoại\nthì sáng hôm sau đã có hàng rồi.\n요즘은 핸드폰으로 주문하면 다음날 아침에 오는데\nIf you order on your phone,\nit arrives the next morning.","sourceUid":"merged-mqcfbase-228","sourceNo":817},{"id":784,"readerNo":785,"displayNo":818,"n":818,"type":"narration","text":"Việc họ chỉ bán ở cửa hàng truyền thống…\n아직까지 오프라인 매장에서만 판매를 한다는 게\nThe fact they only sell in offline stores...","sourceUid":"merged-mqcfcpqj-230","sourceNo":818},{"id":785,"readerNo":786,"displayNo":819,"n":819,"type":"narration","text":"Thật sự tôi rất sốc\nkhi Sanin không bán hàng trực tuyến.\n솔직히 충격 먹었습니다\nI'm honestly shocked\nthat Sanin doesn't do online sales.","sourceUid":"merged-mqcfdg2k-231","sourceNo":819},{"id":786,"readerNo":787,"displayNo":820,"n":820,"type":"narration","text":"Chuyện là ông San vẫn chưa bán online.\n산인이 아직도 온라인을 안 한다는 거\nThat Sanin still doesn't do online stuff.","sourceUid":"merged-0820","sourceNo":820},{"id":787,"readerNo":788,"displayNo":821,"n":821,"type":"narration","text":"Tôi thấy cậu sốc nặng luôn, thực tập sinh ạ.\nChúng tôi thậm chí còn không chạy quảng cáo.\n우리 인턴 많이 놀랐구나. 여긴 광고도 안 해요.\nI see you were very shocked, Intern. We don't even do advertising.","sourceUid":"merged-mqcfe87o-232","sourceNo":821},{"id":788,"readerNo":789,"displayNo":822,"n":822,"type":"narration","text":"- Không chạy quảng cáo? - Đúng.\n광고도 안 해요?\n- No advertising? - No.","sourceUid":"merged-mqcfefn8-233","sourceNo":822},{"id":789,"readerNo":790,"displayNo":823,"n":823,"type":"narration","text":"Các công ty con của Tập đoàn Sanin trực thuộc tổng công ty,\ncó nghĩa là ý kiến của Chủ tịch là rất quan trọng.\n우리 산인그룹은 본사 밑으로 자회사들이 줄줄이 있는 구조고 이런 구조는 회장님의 의견이 전적으로 중요합니다.\nSanin Group's subsidiaries fall directly under HQ,\nwhich means the chairman's opinion is crucial.","sourceUid":"merged-mqcfetza-234","sourceNo":823},{"id":790,"readerNo":791,"displayNo":824,"n":824,"type":"narration","text":"Nhưng chẳng phải ai đó nên nói với ông ấy là điều này không ổn sao?\n그래도 이러면 안 된다고 누가 말씀을 드려야 하지 않나요?\nBut shouldn't someone tell him that this won't do?","sourceUid":"merged-mqcfsays-295","sourceNo":824},{"id":791,"readerNo":792,"displayNo":825,"n":825,"type":"narration","text":"Đúng vậy.\n그래야죠\nYes, they should.","sourceUid":"merged-0825","sourceNo":825},{"id":792,"readerNo":793,"displayNo":826,"n":826,"type":"narration","text":"- Phải. - Nhưng ai sẽ nói đây?\n누가요?\n- Right. - But who will do that?","sourceUid":"merged-mqcfshoj-296","sourceNo":826},{"id":793,"readerNo":794,"displayNo":827,"n":827,"type":"narration","text":"Xin chào, tôi là Tổ trưởng Yoon Joo No\ncủa phòng M&A.\n안녕하십니까. M&A 사업 부팀장 윤준호입니다.\nHello, I am Team Leader Yun Ju No of the M&A division.","sourceUid":"merged-mqcfsufo-297","sourceNo":827},{"id":794,"readerNo":795,"displayNo":828,"n":828,"type":"narration","text":"Tôi sẽ bắt đầu bằng việc phân tích doanh nghiệp.\n먼저 기업 분석부터 발표하겠습니다.\nI'll start with the corporate analysis.","sourceUid":"merged-mqcft1td-298","sourceNo":828},{"id":795,"readerNo":796,"displayNo":829,"n":829,"type":"narration","text":"Trước tiên, tôi sẽ bắt đầu bằng việc\nđặt tên cho dự án huy động 11 nghìn tỷ won.\n우선 11조 원을 조달하는 프로젝트의 이름부터 말씀드리겠습니다\nFirst, I'll start with the name\nfor the project to raise 11 trillion won.","sourceUid":"merged-mqcfts2n-299","sourceNo":829},{"id":796,"readerNo":797,"displayNo":830,"n":830,"type":"narration","text":"Chúng ta hãy đưa ra tên dự án trước.\n일단 프로젝트 이름부터 정하죠\nLet's come up with the project name first.","sourceUid":"merged-mqcfu95p-300","sourceNo":830},{"id":797,"readerNo":798,"displayNo":831,"n":831,"type":"narration","text":"Đây mới là điều quan trọng nhất.\n이게 제일 중요한 건데\nThis is the most important thing.","sourceUid":"merged-0831","sourceNo":831},{"id":798,"readerNo":799,"displayNo":832,"n":832,"type":"narration","text":"Đây là phần quan trọng nhất. Đặt tên là khó nhất mà.\n작명이 제일 어렵죠\nThis is the most important part.\nNaming is always the hardest.","sourceUid":"merged-mqcfuffh-301","sourceNo":832},{"id":799,"readerNo":800,"displayNo":833,"n":833,"type":"narration","text":"Vì chúng ta đang đảm nhận một nhiệm vụ bất khả thi…\n우리가 불가능한 미션을 수행하니까\nSince we're taking on an impossible mission...","sourceUid":"merged-mqcfxjlz-303","sourceNo":833},{"id":800,"readerNo":801,"displayNo":835,"n":835,"type":"dialogue","text":"Dự án Nhiệm vụ Bất khả thi.\n프로젝트 미션 임파서블\nProject Mission: Impossible.","sourceUid":"merged-0835","sourceNo":835},{"id":801,"readerNo":802,"displayNo":836,"n":836,"type":"narration","text":"Cái này hay đấy.\n이거 좋다\nThis is good.","sourceUid":"merged-mqcfybx7-304","sourceNo":836},{"id":802,"readerNo":803,"displayNo":838,"n":838,"type":"narration","text":"Hay cô đề xuất một tên đi.\n과장님이 한번 내보세요\nHow about you give us one, Ms. Kwak?","sourceUid":"merged-mqcfz5ex-305","sourceNo":838},{"id":803,"readerNo":804,"displayNo":839,"n":839,"type":"narration","text":"- Dài quá. - Tên dài quá.\n길어요\n- That's too long. - It's too long, I see.\nI think this project will be\na big momentum driver for Sanin.","sourceUid":"merged-mqcgbg9m-307","sourceNo":839},{"id":804,"readerNo":805,"displayNo":840,"n":840,"type":"narration","text":"Động lực của dự án.\n프로젝트 모멘텀\nProject Momentum.","sourceUid":"merged-mqcgf5jo-308","sourceNo":840},{"id":805,"readerNo":806,"displayNo":841,"n":841,"type":"narration","text":"Tôi nghĩ dự án này sẽ là\nđộng lực lớn cho sự phát triển của Sanin.\nDự án \"Động lực\".\nDự án \"Động lực\"…\n프로젝트 모멘텀\nProject Momentum...","sourceUid":"merged-mqcghkla-311","sourceNo":841},{"id":806,"readerNo":807,"displayNo":842,"n":842,"type":"narration","text":"Nghe không thuận miệng.\n이거 잘 안 듣는데?\nIt doesn't roll off the tongue.","sourceUid":"merged-mqcggzq7-310","sourceNo":842},{"id":807,"readerNo":808,"displayNo":843,"n":843,"type":"narration","text":"Chúng ta là đội M&A mà.\n우리가 M&A 팀이잖아요\nWe're the M&A Team.","sourceUid":"merged-mqcggg53-309","sourceNo":843},{"id":808,"readerNo":809,"displayNo":844,"n":844,"type":"narration","text":"Jin Soo hay nói những chuyện hiển nhiên như thể mới khám phá ra. Đúng không?\n우리 진수씨는 당연한 얘기를 새로운 것처럼 참 잘해요 그죠?\nJin Su is good at\nstating the obvious like it's new, right?","sourceUid":"merged-mqcgi0fp-312","sourceNo":844},{"id":809,"readerNo":810,"displayNo":845,"n":845,"type":"narration","text":"Chúng ta là phòng M&A.\nM&A, Mission Impossible,\nM&A 미션 임파서블 모멘텀\nM&A, Mission Impossible,\nMomentum...","sourceUid":"merged-mqcgimpv-313","sourceNo":845},{"id":810,"readerNo":811,"displayNo":846,"n":846,"type":"dialogue","text":"Momentum…\nVì tất cả từ đó đều bắt đầu bằng M…\nTên dự án là…\nDự án: M.\n다 M으로 시작하니까 프로젝트 이름은\nSince they all start with M...\nThe project name is\nProject: M.","sourceUid":"merged-mqcgj8cz-314","sourceNo":846},{"id":811,"readerNo":812,"displayNo":847,"n":847,"type":"narration","text":"Dự án M.\n프로젝트 M입니다.\nProject M.","sourceUid":"merged-0847","sourceNo":847},{"id":812,"readerNo":813,"displayNo":848,"n":848,"type":"narration","text":"Chúng tôi đã xem lại báo cáo công ty mà anh đã gửi.\n제출해주신 기업 보고서는 잘 검토하였습니다.\nWe reviewed the corporate report you gave me.","sourceUid":"merged-mqcgjrrq-315","sourceNo":848},{"id":813,"readerNo":814,"displayNo":849,"n":849,"type":"narration","text":"Nhờ có sự hợp tác của anh,\nchúng tôi đã hoàn tất quá trình thẩm định.\n협조해주신 덕분에 실사도 잘 마칠 수 있었습니다.\nThanks to your cooperation,\nwe were able to complete due diligence.","sourceUid":"merged-mqcgk0di-316","sourceNo":849},{"id":814,"readerNo":815,"displayNo":850,"n":850,"type":"narration","text":"Bây giờ, chúng ta hãy xem qua các tài liệu đã chuẩn bị.\n이를 바탕으로 준비된 자료 보시겠습니다.\nNow, let's go over the prepared materials.","sourceUid":"merged-mqcgl5p7-377","sourceNo":850},{"id":815,"readerNo":816,"displayNo":851,"n":851,"type":"narration","text":"Mọi người sẽ thấy hầu hết tỷ suất lợi nhuận đều không tốt.\n보시면 대부분의 익률이 좋지 않습니다만\nYou'll see most of the profit margins are not good.","sourceUid":"merged-mqcgmckg-379","sourceNo":851},{"id":816,"readerNo":817,"displayNo":852,"n":852,"type":"narration","text":"Nhưng mọi người cũng đã đưa ra các chiến lược tăng trưởng cho năm nay.\nNên chúng ta hãy cùng xem xét lại chúng.\n올해 성장할 수 있는 방안들도 같이 주셨기에 함께 검토하였습니다\nBut you also gave strategies for growth this year so we reviewed them together.","sourceUid":"merged-mqcgnf4s-380","sourceNo":852},{"id":817,"readerNo":818,"displayNo":853,"n":853,"type":"narration","text":"Bộ phận Xây dựng cũng đóng góp một nửa doanh thu của chúng ta trong quý vừa rồi.\n지난 붕괴도 우리 건설이 절반 가까이 했네\nConstruction made\nhalf our revenues last quarter too.","sourceUid":"merged-mqcgoyxw-382","sourceNo":853},{"id":818,"readerNo":819,"displayNo":854,"n":854,"type":"narration","text":"Vâng, đúng vậy.\n네 맞습니다\nYes, that's right.","sourceUid":"merged-mqcgpg8a-383","sourceNo":854},{"id":819,"readerNo":820,"displayNo":855,"n":855,"type":"narration","text":"Nhưng thật không may, tình hình chung của tập đoàn không được tốt.\n하지만 안타깝게도 그룹 전체 상황이 좋지 못한 만큼\nBut due to the overall poor condition of the group,\nthe sale of certain businesses is inevitable.","sourceUid":"merged-mqcgpsjq-384","sourceNo":855},{"id":820,"readerNo":821,"displayNo":856,"n":856,"type":"narration","text":"việc bán một số doanh nghiệp là điều không thể tránh khỏi.\n일부 사업체는 매각이 불가피한 상황입니다\nFor some businesses, a sale is unavoidable.","sourceUid":"merged-mqcgsi63-387","sourceNo":856},{"id":821,"readerNo":822,"displayNo":857,"n":857,"type":"narration","text":"Chúng tôi cũng nhận thức được điều đó.\n- Đưa ra kết luận của cậu đi. - Vâng.\n그런 건 우리도 공유하고 있으니까 바로 발표하지\nWe're aware of that, too.\n- Get to your conclusion. - Okay.","sourceUid":"merged-mqcgst5f-388","sourceNo":857},{"id":822,"readerNo":823,"displayNo":858,"n":858,"type":"narration","text":"Vâng, vậy tôi sẽ công bố ngay danh sách các doanh nghiệp sẽ tiến hành bán.\nGiờ tôi xin công bố doanh nghiệp sẽ bị bán đi.\n네 그럼 매각을 추진할 사업체를 바로 발표하겠습니다\nYes, then I will immediately announce the businesses to be put up for sale.\nI will now announce the business to be sold off.","sourceUid":"merged-mqcgu203-389","sourceNo":858},{"id":823,"readerNo":824,"displayNo":859,"n":859,"type":"narration","text":"Nếu chúng ta bán hết tất cả, trừ bộ phận Xây dựng,\nliệu có thể thu được 11 nghìn tỷ won không?\n그렇습니다. 건설만 남기고 다 팔면 11조 원을 만들 수 있을지도 모른다?\nIf we sell everything except for Construction,\nwe may be able to raise 11 trillion won?","sourceUid":"merged-mqcgv0fg-391","sourceNo":859},{"id":824,"readerNo":825,"displayNo":860,"n":860,"type":"narration","text":"Được, nhưng không dễ đâu.\n네, 쉽진 않겠지만요.\nYes, though, it won't be easy.","sourceUid":"merged-mqcgvcsn-392","sourceNo":860},{"id":825,"readerNo":826,"displayNo":861,"n":861,"type":"narration","text":"Phải chăng việc không gia nhập thị trường trực tuyến\nhóa ra lại có lợi cho chúng ta?\n온라인 시장으로 진출하지 않은 것이 오히려 가능성이 될 수 있지 않을까요?\nCould it be that not entering the online market\nactually works in our favor?","sourceUid":"merged-mqcgvvuf-393","sourceNo":861},{"id":826,"readerNo":827,"displayNo":862,"n":862,"type":"narration","text":"Anh gọi nó là gì ấy nhỉ?\nTiềm năng chưa được khai thác.\n아, 그걸 뭐라고 하는데?\nWhat do you call that again?\nUntapped potential.","sourceUid":"merged-mqcgw9ej-394","sourceNo":862},{"id":827,"readerNo":828,"displayNo":863,"n":863,"type":"narration","text":"Không gia nhập thị trường trực tuyến là tiềm năng chưa được khai thác.\n글자하는 복권이요.\nNot entering the online market is untapped potential.","sourceUid":"merged-mqcgx5s3-395","sourceNo":863},{"id":828,"readerNo":829,"displayNo":864,"n":864,"type":"narration","text":"Chúng ta có thể nhận thêm 30% dựa trên tiềm năng đó.\n아, 진출하지 않은 것이 오히려 글자하는 복권이 되는 거죠.\nWe could get 30% more based on that potential.","sourceUid":"merged-mqcgxl1l-396","sourceNo":864},{"id":829,"readerNo":830,"displayNo":865,"n":865,"type":"narration","text":"Với khả năng đó, chúng ta có thể đòi thêm 30% trở lên mà.\n그 가능성으로 30% 이상 더 받아낼 수 있잖아요.","sourceUid":"merged-0865","sourceNo":865},{"id":830,"readerNo":831,"displayNo":867,"n":867,"type":"narration","text":"Ý là luật xây dựng có thể thay đổi, đúng không?\nKhông đâu.\nDo khởi đầu muộn,\nsẽ có chi phí tiếp thị phát sinh.\nSẽ khó khăn đấy.\n건설법이 바뀔 수도 있다는 거죠?\n아니요. 후발주자인 만큼 마케팅 비용이 상당할 거라서요. 힘듭니다.\nNo.\nDue to its late start,\nthere will be marketing costs involved.\nIt's going to be tough.","sourceUid":"merged-mqcgz6fm-399","sourceNo":867},{"id":831,"readerNo":832,"displayNo":868,"n":868,"type":"narration","text":"Ý cô là luật xây dựng có thể thay đổi, đúng không?\nChính sách của chính phủ đang có lợi cho ngành xây dựng.\n정부 정책이 건설에 유리한 입장인 건 맞습니다\nYou mean construction laws could change, right?\nGovernment policies are favorable for construction.","sourceUid":"merged-mqcgzmg5-400","sourceNo":868},{"id":832,"readerNo":833,"displayNo":869,"n":869,"type":"narration","text":"- Tại sao? - Với cuộc bầu cử sắp tới,\n이유는?\n- Why? - With the election coming up,","sourceUid":"merged-mqch0an9-401","sourceNo":869},{"id":833,"readerNo":834,"displayNo":870,"n":870,"type":"narration","text":"họ sẽ cố gắng ngăn chặn sự suy thoái kinh tế.\nđã có được các dự án khu vực vững chắc sẽ có lợi.\n선거를 앞두고 경기 둔화를 막는 방향으로 갈 가능성이 높습니다\nthey'll try to prevent an economic slowdown.\nthat secured strong regional projects will benefit.","sourceUid":"merged-mqch2dmd-464","sourceNo":870},{"id":834,"readerNo":835,"displayNo":871,"n":871,"type":"narration","text":"Trong trường hợp đó, những công ty như Xây dựng Sanin\n그렇게 되면 산인건설같이 똘똘한 지역의 사업을 확보해둔 기업에겐 오히려 후재입니다\nIf that happens, companies like Sanin Construction","sourceUid":"merged-mqch3vrg-466","sourceNo":871},{"id":835,"readerNo":836,"displayNo":872,"n":872,"type":"narration","text":"Bộ phận Xây dựng thật sự có lợi nhuận.\n건설이 알지 않긴 알지 않냐\nConstruction really is profitable.","sourceUid":"merged-mqch4dia-467","sourceNo":872},{"id":836,"readerNo":837,"displayNo":873,"n":873,"type":"narration","text":"Vâng.\nVậy thì chúng ta không còn lựa chọn nào khác.\n그럼 어쩔 수 없죠.\nYes.\nThen we have no choice.","sourceUid":"merged-mqch4tr6-468","sourceNo":873},{"id":837,"readerNo":838,"displayNo":874,"n":874,"type":"narration","text":"Chúng tôi đã xem xét tất cả các công ty con\n그룹의 계열사들을 모두 검토하였고\nWe reviewed all the subsidiaries","sourceUid":"merged-mqch5crh-469","sourceNo":874},{"id":838,"readerNo":839,"displayNo":875,"n":875,"type":"narration","text":"và đi đến kết luận sau đây.\n다음의 결과에 도달하였습니다.\nand arrived at the following conclusion.","sourceUid":"merged-mqch5iuz-470","sourceNo":875},{"id":839,"readerNo":840,"displayNo":876,"n":876,"type":"narration","text":"Cậu điên à?\n이게 미쳤나?\nAre you crazy?","sourceUid":"merged-mqch6wzu-472","sourceNo":876},{"id":840,"readerNo":841,"displayNo":877,"n":877,"type":"narration","text":"[Xây dựng Sanin]\nChúng tôi sẽ bán mảng Xây dựng.\n건설을 매각할 경우\n[Sanin Construction]\nWe will sell off Construction.","sourceUid":"merged-mqch6kyj-471","sourceNo":877},{"id":841,"readerNo":842,"displayNo":878,"n":878,"type":"narration","text":"- Nếu chúng ta bán mảng Xây dựng… - Này.\nSanin duy trì hoạt động nhờ mảng Xây dựng.\n야, 우리 산인은 건설로 먹고 살아.\n- If we sell off Construction— - Hey.\nSanin stays afloat with Construction.","sourceUid":"merged-mqch7ku6-473","sourceNo":878},{"id":842,"readerNo":843,"displayNo":879,"n":879,"type":"narration","text":"Nếu bán mảng Xây dựng, thì chúng ta sẽ tiêu đời ngay.\n건설 팔면 다 망해.\nIf we sell Construction, we'll be doomed.","sourceUid":"merged-mqch7xmb-474","sourceNo":879},{"id":843,"readerNo":844,"displayNo":880,"n":880,"type":"narration","text":"Chúng ta vẫn còn hy vọng dù Xây dựng Sanin có bị bán đi.\n산인 건설 팔아도 안 망합니다.\nWe're not doomed even if Sanin Construction is sold.","sourceUid":"merged-mqch84fx-475","sourceNo":880},{"id":844,"readerNo":845,"displayNo":881,"n":881,"type":"narration","text":"Sẽ có khó khăn,\nnhưng chúng ta không đến mức phá sản khi bán mảng Xây dựng.\n아슬아슬하지만 건설을 팔아도 망하진 않습니다.\nIt'll be close,\nbut we won't go under from selling Construction.","sourceUid":"merged-mqch8npi-476","sourceNo":881},{"id":845,"readerNo":846,"displayNo":882,"n":882,"type":"narration","text":"Này, Yoon Jun-ho.\n야, 윤준호.","sourceUid":"merged-0882","sourceNo":882},{"id":846,"readerNo":847,"displayNo":883,"n":883,"type":"narration","text":"Yoon Joo No, câm miệng đi.\n너 조용히 안 해.\nYun Ju No, shut your mouth.","sourceUid":"merged-mqch9im8-477","sourceNo":883},{"id":847,"readerNo":848,"displayNo":884,"n":884,"type":"narration","text":"Đúng là thằng điên.\n완전 미친놈이네.\nYou're absolutely crazy.","sourceUid":"merged-mqch9oxn-478","sourceNo":884},{"id":848,"readerNo":849,"displayNo":885,"n":885,"type":"narration","text":"Nghe cậu ấy nói thêm chút đi.\n좀 더 들어보시죠.\nLet's hear him out a bit more.","sourceUid":"merged-mqcha0w4-479","sourceNo":885},{"id":849,"readerNo":850,"displayNo":886,"n":886,"type":"narration","text":"Nghe gì cơ?\n듣기는 뭘 듣습니까?\nWhat is there to hear?","sourceUid":"merged-0886","sourceNo":886},{"id":850,"readerNo":851,"displayNo":887,"n":887,"type":"narration","text":"Nghe thêm? Cậu ta đang nói nhảm nhí kìa!\n말 같지도 않은 거를\n\"Hear him out\"? He's talking nonsense!","sourceUid":"merged-mqchaoer-480","sourceNo":887},{"id":851,"readerNo":852,"displayNo":888,"n":888,"type":"narration","text":"Cậu đang nhắm vào tôi đấy à?\n너 이거 지금 날 노리고 그러는 거 아니야?\nAre you targeting me with this right now?","sourceUid":"merged-0888","sourceNo":888},{"id":852,"readerNo":853,"displayNo":889,"n":889,"type":"narration","text":"Cậu đâu có định cứu công ty.\nCậu đang cố hạ bệ tôi thì có!\n회사를 살리겠다는 게 아니라 나를 죽이겠다는 거 아니냐고?\nHey...\nyou're doing this to target me.\nYou're not trying to save the company.\nYou're trying to take me down!","sourceUid":"merged-mqchhff5-484","sourceNo":889},{"id":853,"readerNo":854,"displayNo":890,"n":890,"type":"narration","text":"Đúng không?\n그래 안 그래?\nIsn't that right?","sourceUid":"merged-mqchg1lu-482","sourceNo":890},{"id":854,"readerNo":855,"displayNo":891,"n":891,"type":"narration","text":"Có ai không biết rằng mảng Xây dựng giúp Sanin duy trì hoạt động không?\n우리 산인은 건설이 매겨 살린다는 거 모르는 사람 있어?\nIs there anyone who doesn't know that\nConstruction keeps Sanin afloat?","sourceUid":"merged-mqchh5pe-483","sourceNo":891},{"id":855,"readerNo":856,"displayNo":892,"n":892,"type":"narration","text":"Đúng như anh nói,\nngay cả thị trường cũng biết mảng Xây dựng đang gánh vác Tập đoàn Sanin.\n말씀하신 대로 산인그룹을 건설이 견인한다는 건 시장도 다 알고 있습니다\nAs you've said,\neven the market knows that Construction is\ncarrying Sanin Group.","sourceUid":"merged-mqchi78a-485","sourceNo":892},{"id":856,"readerNo":857,"displayNo":893,"n":893,"type":"narration","text":"Nên nếu chúng ta giữ mảng Xây dựng và bán hết những mảng còn lại\nthì ngay giây phút đó\n그렇기 때문에 그 알자만 빼고 나머지를 다 팔겠다고 하면\nSo if we keep Construction and sell the rest,\nat that very moment,","sourceUid":"merged-mqchjzzy-547","sourceNo":893},{"id":857,"readerNo":858,"displayNo":894,"n":894,"type":"narration","text":"Nếu Sanin nói sẽ chỉ giữ lại mảng xây dựng và bán hết phần còn lại,\nSanin sẽ phá sản.\nNếu Sanin bán hết tất cả trừ mảng Xây dựng,\n산인이 건설만 남기고 나머지를 다 팔겠다고 하면\nIf Sanin says they'll sell everything except the construction business,\nIf Sanin sells everything except Construction,\nand selling off the bad ones.","sourceUid":"merged-mqchmwok-548","sourceNo":894},{"id":858,"readerNo":859,"displayNo":895,"n":895,"type":"narration","text":"Gì?\n뭐?\nWhat?","sourceUid":"merged-0895","sourceNo":895},{"id":859,"readerNo":860,"displayNo":897,"n":897,"type":"narration","text":"thị trường sẽ đánh giá rằng chúng ta đang giữ lại phần có lợi nhuận\n시장은 우리를 돈 되는 건 남기고 안 되는 건 다 판다고 생각할 겁니다\nthe market will say we're keeping what's profitable","sourceUid":"merged-mqchp5li-549","sourceNo":897},{"id":860,"readerNo":861,"displayNo":898,"n":898,"type":"narration","text":"và bán đi phần lỗ.\nNói cách khác, chúng tôi sẽ không bán chúng\nmà là vứt chúng đi.\n즉 파는 게 아니라 버리는 게 됩니다\nIn other words, we won't be selling them\nbut throwing them away.\nThen we can't sell them at their proper value.","sourceUid":"merged-mqchpny3-550","sourceNo":898},{"id":861,"readerNo":862,"displayNo":899,"n":899,"type":"narration","text":"Vậy thì chúng ta sẽ không thể bán chúng với giá tốt.\nNgười ta sẽ không trả mức giá hợp lý\ncho những thứ bị vứt đi.\n그렇게 되면 제 값에 팔 수 없습니다.\nPeople won't pay a fair price\nfor something that's thrown away.","sourceUid":"merged-mqchq8mm-551","sourceNo":899},{"id":862,"readerNo":863,"displayNo":900,"n":900,"type":"narration","text":"Bởi vì người ta sẽ không trả giá trị thực cho một món hàng bị vứt bỏ.\n사람들은 버리는 상품을 제 값을 주고 사지 않으니까요.","sourceUid":"merged-0900","sourceNo":900},{"id":863,"readerNo":864,"displayNo":901,"n":901,"type":"narration","text":"Như vậy thì không thể nào thu được 7 nghìn tỷ.\n그럴 경우 7조 원도 불가능합니다.\nIn that case, it's impossible to make 7 trillion.","sourceUid":"merged-mqchr1o2-552","sourceNo":901},{"id":864,"readerNo":865,"displayNo":902,"n":902,"type":"narration","text":"Đồng nghĩa với việc dự án này sẽ thất bại.\n그렇게 되면 이 프로젝트는 실패합니다.\nIf so, this project\nwill fail.","sourceUid":"merged-mqchr9l8-553","sourceNo":902},{"id":865,"readerNo":866,"displayNo":903,"n":903,"type":"narration","text":"Sự phản đối sẽ rất dữ dội.\n반대가 만만치 않을 텐데요.\nThe opposition will be fierce.\nIndeed.","sourceUid":"merged-mqchrq8e-554","sourceNo":903},{"id":866,"readerNo":867,"displayNo":904,"n":904,"type":"narration","text":"Chứ sao nữa.\nGiám đốc Ha sẽ không ngồi yên nếu bán mảng Xây dựng đâu.\n그러니까요. 건설은 또 하 전문님이 가만히 있지 않을 텐데.\nMr. Ha will not sit idle if it's Construction.\nThat's true,","sourceUid":"merged-mqchs1wb-555","sourceNo":904},{"id":867,"readerNo":868,"displayNo":905,"n":905,"type":"narration","text":"Đúng là như vậy, nhưng mọi người nghĩ điều gì là phù hợp cho Sanin?\n그렇긴 한데 산인만 생각하면 뭐가 맞습니까?\nbut what do you think is right for Sanin?","sourceUid":"merged-mqchsgsa-556","sourceNo":905},{"id":868,"readerNo":869,"displayNo":906,"n":906,"type":"narration","text":"Hả?\n네?\nYes?","sourceUid":"merged-0906","sourceNo":906},{"id":869,"readerNo":870,"displayNo":907,"n":907,"type":"narration","text":"- Đúng. - Tôi cũng theo ý kiến của tổ trưởng.\n저도 팀장님 의견에 따르겠습니다.\n- Okay. - I'll follow your opinion, Mr. Yun.","sourceUid":"merged-mqchsv5u-557","sourceNo":907},{"id":870,"readerNo":871,"displayNo":908,"n":908,"type":"narration","text":"Vậy quyết định thế đi.\n그럼 그렇게\nLet's do that then.","sourceUid":"merged-mqcht2rh-558","sourceNo":908},{"id":871,"readerNo":872,"displayNo":909,"n":909,"type":"narration","text":"À, còn cậu thì sao, Jin Soo?\n아, 진수씨는요?\nOh, how about you, Jin Su?","sourceUid":"merged-mqchtbzi-559","sourceNo":909},{"id":872,"readerNo":873,"displayNo":910,"n":910,"type":"narration","text":"Tôi cũng tin vào ý kiến của tổ trưởng ạ.\n저도 팀장님 의견이 맞다고 생각은 하는데요\nI also believe your opinion is right, Mr. Yun,","sourceUid":"merged-mqchukfg-561","sourceNo":910},{"id":873,"readerNo":874,"displayNo":911,"n":911,"type":"narration","text":"Nhưng giá cổ phiếu liệu có ổn không?\n주가가 괜찮을까요?\nbut will the stock price be okay?","sourceUid":"merged-mqchu7qn-560","sourceNo":911},{"id":874,"readerNo":875,"displayNo":912,"n":912,"type":"narration","text":"Nếu mảng Xây dựng không còn, Sanin sẽ trở thành công ty làm ăn thua lỗ.\n건설이 빠지면 산인 마이너스 회사가 되는데요\nIf Construction is out,\nSanin will become a loss-making company.","sourceUid":"merged-mqchv1z2-562","sourceNo":912},{"id":875,"readerNo":876,"displayNo":913,"n":913,"type":"narration","text":"Nhưng điều đó không có nghĩa là chúng ta sẽ bị hủy niêm yết.\n그렇다고 상장 폐지가 되는 건 아니니까\nBut that doesn't mean we'll be delisted.","sourceUid":"merged-mqchv8cb-563","sourceNo":913},{"id":876,"readerNo":877,"displayNo":914,"n":914,"type":"narration","text":"Được rồi. Trước tiên, chúng ta sẽ kéo dài thời gian.\n자, 일단 시간을 벌고 보는 거죠\nOkay. We're buying ourselves some time first.","sourceUid":"merged-mqchvjcc-564","sourceNo":914},{"id":877,"readerNo":878,"displayNo":915,"n":915,"type":"narration","text":"Dù vậy,\nXây dựng Sanin cũng sẽ chỉ hơn 6 nghìn tỷ thôi.\n그렇다 해도 산인 건설은 기껏해야 6조 좀 넘을 건데\nEven so,\nSanin Construction will only be a bit over 6 trillion.","sourceUid":"merged-mqchw07o-565","sourceNo":915},{"id":878,"readerNo":879,"displayNo":916,"n":916,"type":"narration","text":"Mảng Xây dựng được hưởng lợi từ việc nới lỏng các quy định.\n건설은 규제 완화라는 호재가 있어서요\nConstruction has the benefit of regulatory easing.","sourceUid":"merged-mqciexnv-689","sourceNo":916},{"id":879,"readerNo":880,"displayNo":917,"n":917,"type":"narration","text":"Có thể đạt được giá 7 nghìn tỷ.\n7조까지 가능합니다\nIt's possible to get up to 7 trillion.","sourceUid":"merged-mqcif2vp-690","sourceNo":917},{"id":880,"readerNo":881,"displayNo":918,"n":918,"type":"narration","text":"Nhưng điều chúng ta cần 11 nghìn tỷ won.\n그러니까 우리가 필요한 게 11조잖아\nWell, what we need is 11 trillion won.","sourceUid":"merged-mqcif8ly-691","sourceNo":918},{"id":881,"readerNo":882,"displayNo":919,"n":919,"type":"narration","text":"Vậy số còn lại thì sao?\n나머지는?\nHow about the rest?","sourceUid":"merged-mqcihq7e-872","sourceNo":919},{"id":882,"readerNo":883,"displayNo":920,"n":920,"type":"narration","text":"Hiện tại, chúng ta không thể khắc phục hết mọi vấn đề ngay.\n지금 산인의 문제를 한 번에 해결할 방법은 없습니다\nWe can't fix all the problems at once right now.","sourceUid":"merged-mqcii71l-873","sourceNo":920},{"id":883,"readerNo":884,"displayNo":921,"n":921,"type":"narration","text":"Nếu chúng ta thu được 7 nghìn tỷ won sau khi bán mảng Xây dựng,\n일단 건설을 팔아서 7조 원을 확보하면\nIf we secure 7 trillion won after selling Construction,","sourceUid":"merged-mqciix8r-874","sourceNo":921},{"id":884,"readerNo":885,"displayNo":922,"n":922,"type":"narration","text":"- chúng ta có thể tìm kiếm… - Cậu…\n그 다음을 모색할 수...\n- we can look for the next— - You...","sourceUid":"merged-mqcij8ex-875","sourceNo":922},{"id":885,"readerNo":886,"displayNo":923,"n":923,"type":"narration","text":"Cậu nói cậu đồng ý với ý kiến của tôi.\n너, 너 내 의견에 동의한다고 했지?\nYou said you agreed with my opinion.","sourceUid":"merged-mqcijugv-876","sourceNo":923},{"id":886,"readerNo":887,"displayNo":924,"n":924,"type":"narration","text":"Sao cậu có thể phản bội tôi như vậy?\n그럼 그렇게 뒤통수를 쳐?\nHow could you betray me like this after that?","sourceUid":"merged-mqcik41t-877","sourceNo":924},{"id":887,"readerNo":888,"displayNo":925,"n":925,"type":"narration","text":"Đúng.\nTôi hoàn toàn đồng ý với ý kiến của Giám đốc Ha.\n네, 하정우님의 의견에 전적으로 동의합니다\nYes.\nI completely agree with your opinion, Mr. Ha.","sourceUid":"merged-mqcikk5l-878","sourceNo":925},{"id":888,"readerNo":889,"displayNo":926,"n":926,"type":"narration","text":"\"Lục tẩm cốt đoạn.\"\n육참골단\n\"Yook Cham Gol Dan.\"","sourceUid":"merged-mqcikydm-879","sourceNo":926},{"id":889,"readerNo":890,"displayNo":927,"n":927,"type":"narration","text":"\"Cắt thịt của chính mình để chặt xương kẻ thù.\"\n살을 내주고 뼈를 취한다\n\"Cutting one's own flesh to sever the enemy's bones.\"","sourceUid":"merged-0927","sourceNo":927},{"id":890,"readerNo":891,"displayNo":928,"n":928,"type":"narration","text":"Tôi cũng tin chúng ta nên làm như vậy.\n저도 그래야 한다고 생각합니다\nI also believe we should do that.","sourceUid":"merged-mqcio1lz-880","sourceNo":928},{"id":891,"readerNo":892,"displayNo":929,"n":929,"type":"narration","text":"Vấn đề là\nphần thịt Sanin phải cắt đi chính là mảng Xây dựng.\n다만 산인이 내줄 쌀은 건설해야 합니다\nThe only thing is\nthe flesh that Sanin must cut off\nis Construction.","sourceUid":"merged-mqciosf7-882","sourceNo":929},{"id":892,"readerNo":893,"displayNo":930,"n":930,"type":"narration","text":"Tên khốn\n고맙습니다.\nYou jerk","sourceUid":"merged-0930","sourceNo":930},{"id":893,"readerNo":894,"displayNo":931,"n":931,"type":"narration","text":"Ngồi xuống.\nNgồi đi, ngồi đi.\nMọi chuyện thế nào rồi?\n失礼は。\nSit down.\nSit, sit.\nSo how are things going?","sourceUid":"merged-mqcizd4b-891","sourceNo":931},{"id":894,"readerNo":895,"displayNo":932,"n":932,"type":"narration","text":"Vâng.\nChúng tôi sẽ bán mảng Xây dựng.\n건설을 팔겠습니다.\nWell,\nwe will sell Construction.","sourceUid":"merged-mqcixrse-890","sourceNo":932},{"id":895,"readerNo":896,"displayNo":933,"n":933,"type":"narration","text":"Chúng ta có thể nhận được bao nhiêu?\n얼마나 받겠더라?\nHow much can we get for it?","sourceUid":"merged-mqciq0s3-883","sourceNo":933},{"id":896,"readerNo":897,"displayNo":934,"n":934,"type":"narration","text":"Giá trị thị trường hiện tại có thể đạt 7 nghìn tỷ won.\n현재 시장가는 7초까지 가능할 것 같습니다.\nThe current market value can reach 7 trillion won.","sourceUid":"merged-mqciqjd8-885","sourceNo":934},{"id":897,"readerNo":898,"displayNo":935,"n":935,"type":"narration","text":"Thôi nào.\nChúng ta nên thu về ít nhất là hai chữ số cho nó chứ.\n두 자리를 빠트려야지.\nCome on.\nWe should get at least double digits for it.","sourceUid":"merged-mqciu2qd-887","sourceNo":935},{"id":898,"readerNo":899,"displayNo":936,"n":936,"type":"narration","text":"Sao cơ? Xây dựng Sanin là doanh nghiệp đầu tiên của tôi.\n산인건설은 그래 내가 처음 만든거 아이가\nPardon? Sanin Construction was my first business.","sourceUid":"merged-mqciv663-888","sourceNo":936},{"id":899,"readerNo":900,"displayNo":937,"n":937,"type":"narration","text":"Vì vậy,\nchúng ta phải có được một mức giá hợp lý cho nó chứ.\n재값은 받아야 한대요.\nSo...\nshouldn't we get a fair price for it?","sourceUid":"merged-mqcix597-889","sourceNo":937},{"id":900,"readerNo":901,"displayNo":938,"n":938,"type":"narration","text":"Chủ tịch.\nBán với giá cao hơn 3 nghìn tỷ so với giá thị trường là…\n회장님 지금 시장가보다 3조나 더 받는 건 현실적으로 와우.\nChairman.\nGetting 3 trillion over the market value is—","sourceUid":"merged-mqcj1dxi-945","sourceNo":938},{"id":901,"readerNo":902,"displayNo":939,"n":939,"type":"narration","text":"Tại sao?\nCậu nghĩ mình không làm được sao?\n자신 없나?\nWhy?\nYou don't think you can do it?","sourceUid":"merged-mqcj1t2b-946","sourceNo":939},{"id":902,"readerNo":903,"displayNo":940,"n":940,"type":"narration","text":"Gặp nhau vào thứ Hai tuần sau nhé.\n다음 주 월요일에 만나요.","sourceUid":"merged-0940","sourceNo":940},{"id":903,"readerNo":904,"displayNo":941,"n":941,"type":"narration","text":"Tạm biệt.\n안녕히 계세요.","sourceUid":"merged-0941","sourceNo":941},{"id":904,"readerNo":905,"displayNo":942,"n":942,"type":"narration","text":"Tôi nghĩ chỉ khi bán được thứ tốt nhất thì Sanin Group mới sống được.\n제일 좋은 걸 팔아야 산인그룹이 산다고 생각하고 있습니다","sourceUid":"merged-0942","sourceNo":942},{"id":905,"readerNo":906,"displayNo":"EN#1283","n":"EN#1283","type":"narration","text":"♫ Of greed, loss, and betrayal ♫","sourceUid":"merged-mqcj2ty2-947","sourceNo":"EN#1283"},{"id":906,"readerNo":907,"displayNo":943,"n":943,"type":"narration","text":"Thằng đó đã kết thúc ngay khi nói sẽ bán mảng xây dựng.\n걔는 건설을 팔겠다고 한 순간 끝난 거야","sourceUid":"merged-0943","sourceNo":943},{"id":907,"readerNo":908,"displayNo":944,"n":944,"type":"narration","text":"10 nghìn tỷ tuyệt đối không được.\n10조는 절대 안 됩니다","sourceUid":"merged-0944","sourceNo":944},{"id":908,"readerNo":909,"displayNo":945,"n":945,"type":"narration","text":"Vậy thì tôi không bán.\n그럼 내 안 판다","sourceUid":"merged-0945","sourceNo":945},{"id":909,"readerNo":910,"displayNo":946,"n":946,"type":"narration","text":"Mày không biết gì về mọi mối quan hệ của mình mà cứ hì hục đào móc hả?\n자기 모든 판제도 모르고 삽질을 그냥 열심히 하고 있는 거냐고","sourceUid":"merged-0946","sourceNo":946},{"id":910,"readerNo":911,"displayNo":947,"n":947,"type":"narration","text":"Phía đó bảo là chuyên gia đàm phán, hãy cho tôi xem tài năng một lần đi.\n그쪽이 협상 전문가라며 실력 한번 보여주세요","sourceUid":"merged-0947","sourceNo":947},{"id":911,"readerNo":912,"displayNo":948,"n":948,"type":"narration","text":"Thằng điên.\n미친 새끼\nYou crazy bastard","sourceUid":"merged-0948","sourceNo":948},{"id":912,"readerNo":913,"displayNo":949,"n":949,"type":"narration","text":"Chúng tôi đang chiến đấu bằng hợp đồng của Eminem.\n에미네인의 계약서로 싸우는 겁니다\nWe're fighting function fmt(t){t=Number(t||0);let h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=Math.floor(t%60),ms=Math.round((t-Math.floor(t))*1000);return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(ms).padStart(3,'0')}`}

function isIOS(){return /iPad|iPhone|iPod/.test(navigator.userAgent)|| (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1)}
function getRange(kind,i=cur){let b=blocks[i];return (kind==='vi'?vi:ko)[String(b&&b.id)]}
function getAudio(kind){return kind==='vi'?via:koa}

function getSource(kind){let a=getAudio(kind);return a.currentSrc||a.src||''}
function unique(arr){return Array.from(new Set(arr.filter(Boolean)))}
function encPath(p){return String(p||'').split('/').map(x=>encodeURIComponent(decodeURIComponent(x))).join('/')}
function baseAudioFolder(){return String(project.audioFolder||'audio').replace(/^\.\//,'').replace(/^\//,'').replace(/\/$/,'')||'audio'}
function slugBase(){return String(project.githubSlug||project.title||'reader').replace(/[^A-Za-z0-9._-]+/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'')||'reader'}
function candidateNames(kind){
  let main=kind==='vi'?project.viAudioFile:project.koAudioFile;
  let slug=slugBase();
  let fallback=kind==='vi'?[slug+'_VI_Dub.mp3',slug+'_vi_dub.mp3','vi_dub.mp3','VI_Dub.mp3','VI_DUB.mp3','agency_s01e02_VI_Dub.mp3']:[slug+'_KO_Live.mp3',slug+'_ko_live.mp3','ko_live.mp3','KO_Live.mp3','KO_LIVE.mp3','agency_s01e02_KO_Live.mp3'];
  return unique([main,...fallback]);
}
function candidateUrls(kind){
  let folder=baseAudioFolder();
  let names=candidateNames(kind);
  let out=[];
  names.forEach(n=>{out.push('./'+folder+'/'+n); out.push('./'+encPath(folder+'/'+n));});
  return unique(out);
}
function showAudioPaths(){
  alert('VI candidates:\n'+candidateUrls('vi').join('\n')+'\n\nKO candidates:\n'+candidateUrls('ko').join('\n')+'\n\nTên trên GitHub phân biệt HOA/thường. Nếu Smart Flow không phát, kiểm tra file trong folder audio hoặc dùng nút chọn file thủ công.');
}
async function tryLoadCandidate(kind){
  let a=getAudio(kind); let cur=a.currentSrc||a.src||'';
  if(cur && cur.startsWith('blob:')) return cur;
  for(const src of candidateUrls(kind)){
    try{
      engine.pause(); engine.src=src; engine.load();
      let ok=await waitMedia(engine,8000);
      if(ok){ a.src=src; try{a.load();}catch(e){} return src; }
    }catch(e){}
  }
  return '';
}

function waitMedia(a,timeout=5000){return new Promise(res=>{if(a.readyState>=1)return res(true);let done=false;let ok=()=>{if(done)return;done=true;clean();res(true)};let bad=()=>{if(done)return;done=true;clean();res(false)};let clean=()=>{a.removeEventListener('loadedmetadata',ok);a.removeEventListener('canplay',ok);a.removeEventListener('error',bad);clearTimeout(to)};a.addEventListener('loadedmetadata',ok,{once:true});a.addEventListener('canplay',ok,{once:true});a.addEventListener('error',bad,{once:true});let to=setTimeout(bad,timeout)})}
async function prepareEngine(kind,start=0){let src=await tryLoadCandidate(kind);if(!src)throw new Error('Không load được audio '+kind.toUpperCase()+'. Kiểm tra folder audio/tên file trên GitHub, hoặc chọn file thủ công. Bấm Audio paths để xem đường dẫn đang thử.');if(engine.src!==src){engine.pause();engine.src=src;engine.load();}let ok=await waitMedia(engine,8000);if(!ok)throw new Error('Không load được audio '+kind.toUpperCase()+'. File có thể chưa tải xong trên GitHub Pages, thử chờ vài giây rồi bấm lại.');try{engine.currentTime=Math.max(0,Number(start||0));}catch(e){}return engine}
async function unlockAudio(show=true){try{let src=await tryLoadCandidate('vi'); if(!src) src=await tryLoadCandidate('ko'); if(!src){if(show)alert('Chưa tìm thấy audio VI/KO. Kiểm tra thư mục audio hoặc chọn file MP3 thủ công.');return false}if(engine.src!==src){engine.src=src;engine.load();await waitMedia(engine,8000)}let oldVol=engine.volume;engine.volume=0.001;try{engine.currentTime=Math.min(0.05,Math.max(0,engine.currentTime||0));}catch(e){}await engine.play();engine.pause();engine.volume=oldVol||1;unlocked=true;setMsg('Đã unlock audio cho iPhone. Bây giờ bấm Smart Flow hoặc VI/KO.');return true}catch(e){unlocked=false;if(show)alert('iPhone chưa cho phát audio. Hãy bấm Unlock iPhone Audio một lần nữa.\n'+(e&&e.message?e.message:e));return false}}

function render(){let q=($('q').value||'').toLowerCase(),h='';blocks.forEach((b,i)=>{if(q&&!b.text.toLowerCase().includes(q))return;let L=split(b.text),vr=vi[String(b.id)],kr=ko[String(b.id)];let time=(vr?`VI ${fmt(vr.start)}→${fmt(vr.end)}`:'No VI')+' · '+(kr?`KO ${fmt(kr.start)}→${fmt(kr.end)}`:'No KO');h+=`<div class="seg ${i===cur?'active':''}" onclick="cur=${i};render();side()"><div class="meta"><span>Cue #${label(b,i)}</span><span>${time}</span></div><div class="txt">${esc(b.text)}</div><div class="row" style="margin-top:8px"><button class="good" onclick="event.stopPropagation();cur=${i};playCurrent('vi')">VI Dub</button><button class="violet" onclick="event.stopPropagation();cur=${i};playCurrent('ko')">KO Live</button><button class="warn" onclick="event.stopPropagation();cur=${i};smart()">Smart</button></div></div>`});$('list').innerHTML=h;$('stat').textContent=blocks.length+' blocks · current Cue #'+label(blocks[cur]||{},cur)+(isIOS()?' · iPhone mode: dùng 1 audio engine':'');side()}
function side(){let L=split(blocks[cur]?.text||'');$('vip').textContent=L.vi;$('kop').textContent=L.ko}

function play(kind,i=cur,token=++tok){return new Promise(async res=>{let r=getRange(kind,i);if(!r)return res();try{let a=await prepareEngine(kind,r.start);let end=Number(r.end||0);let done=false;let cleanup=()=>{a.removeEventListener('timeupdate',check);a.removeEventListener('ended',ended);a.removeEventListener('error',errored)};let finish=()=>{if(done)return;done=true;cleanup();a.pause();res()};let check=()=>{if(done)return;if(token!==tok||!flow&&token!==tok)return finish();if(a.currentTime>=end-0.03)finish()};let ended=()=>finish();let errored=()=>finish();a.addEventListener('timeupdate',check);a.addEventListener('ended',ended,{once:true});a.addEventListener('error',errored,{once:true});setMsg(`Đang phát ${kind.toUpperCase()} Cue #${label(blocks[i]||{},i)} ${fmt(r.start)} → ${fmt(r.end)}`);try{await a.play();}catch(e){cleanup();if(isIOS()&&!unlocked){alert('iPhone cần unlock audio trước. Bấm Unlock iPhone Audio rồi thử lại.')}else{alert('Không phát được audio: '+(e&&e.message?e.message:e));}return res()}setTimeout(check,80)}catch(e){alert(e.message||e);res()}})}
function playCurrent(k){stopAll(false);tok++;play(k,cur,tok)}
function sequenceFor(mode){if(mode==='vi')return['vi'];if(mode==='ko')return['ko'];if(mode==='vi-ko-vi')return['vi','ko','vi'];return['vi','ko']}
async function smart(){let token=++tok;flow=true;if(isIOS()&&!unlocked){let ok=await unlockAudio(false);if(!ok){alert('Trên iPhone, hãy bấm Unlock iPhone Audio trước, sau đó bấm Smart Flow.');flow=false;return}}let mode=$('mode').value, seq=sequenceFor(mode);for(let i=cur;i<blocks.length&&token===tok&&flow;i++){cur=i;render();document.querySelector('.seg.active')?.scrollIntoView({block:'center'});for(const k of seq){if(token!==tok||!flow)break;await play(k,i,token)}}if(token===tok)setMsg('Smart Flow đã dừng/kết thúc')}
function stopAll(inc=true){if(inc)tok++;flow=false;via.pause();koa.pause();engine.pause();setMsg('Đã stop')}
function next(){cur=Math.min(blocks.length-1,cur+1);render()}function prev(){cur=Math.max(0,cur-1);render()}
$('viaf').onchange=e=>{let f=e.target.files[0];if(f){via.src=URL.createObjectURL(f);if(!engine.src)engine.src=via.src;unlocked=false;setMsg('Đã chọn VI audio. Nếu dùng iPhone, bấm Unlock.')}};
$('koaf').onchange=e=>{let f=e.target.files[0];if(f){koa.src=URL.createObjectURL(f);unlocked=false;setMsg('Đã chọn KO audio. Nếu dùng iPhone, bấm Unlock.')}};
function tryAuto(){let vu=candidateUrls('vi')[0], ku=candidateUrls('ko')[0]; if(vu)via.src=vu; if(ku)koa.src=ku; try{via.load();koa.load();}catch(e){} setMsg('Đã khai báo audio từ GitHub. Nếu iPhone chưa nghe, chờ vài giây rồi bấm Unlock/Smart Flow.')}tryAuto();
(function addIphoneButtons(){let row=document.querySelector('.float .row');if(row){let b=document.createElement('button');b.textContent='Unlock iPhone Audio';b.className='warn';b.onclick=()=>unlockAudio(true);row.insertBefore(b,row.children[3]||null);let d=document.createElement('button');d.textContent='Audio paths';d.onclick=()=>showAudioPaths();row.appendChild(d);}})();
render();</script></body></html>
