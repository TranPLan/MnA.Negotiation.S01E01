,"episodeTitle":"S01E01","githubSlug":"mna_negotiation_s01e01","audioFolder":"../audio","viAudioFile":"mna_negotiation_s01e01_VI_Dub.mp3","koAudioFile":"mna_negotiation_s01e01_KO_Live.mp3","source":"Subtitle Dub VI + KO Live Cut Studio","blocks":[{"id":0,"readerNo":1,"displayNo":1,"n":1,"type":"narration","text":"M&A.NEGOTIATION.S01E01\nTHƯƠNG VỤ BẠC TỶ\nThế giới này như một đại dương hoang vu.\nThe world is a desolate ocean\nThe world is a desolate ocean","sourceUid":"merged-mq6r6so5-41","sourceNo":1},{"id":1,"readerNo":2,"displayNo":2,"n":2,"type":"narration","text":"Được đăng tải vào mỗi Chủ nhật hàng tuần.\n매주 일요일 업로드됩니다.\nUploaded every Sunday.","sourceUid":"merged-0002","sourceNo":2},{"id":2,"readerNo":3,"displayNo":3,"n":3,"type":"narration","text":"Phụ đề được cung cấp bởi Baemin\n자막 제공 배달의민족\nSubtitles provided by Baedal Minjok.","sourceUid":"merged-0003","sourceNo":3},{"id":3,"readerNo":4,"displayNo":4,"n":4,"type":"narration","text":"Này, Yoon Joo No đến rồi đấy.\n야 윤준호인데\nHey, Yun Ju No is coming.","sourceUid":"merged-mq7foyez-43","sourceNo":4},{"id":4,"readerNo":5,"displayNo":5,"n":5,"type":"narration","text":"Điên mất.\n미친\nHoly shit.","sourceUid":"merged-0005","sourceNo":5},{"id":5,"readerNo":6,"displayNo":6,"n":6,"type":"narration","text":"Thật sao? Ai bảo vậy?\nYoon Joo No không ở Hàn mà.\n누가 그래? 윤준호 한국에 없어\nSerious? Who said that?\nYun Ju No isn't even in Korea.","sourceUid":"merged-mq7fpazd-44","sourceNo":6},{"id":6,"readerNo":7,"displayNo":7,"n":7,"type":"narration","text":"Thì giờ đang trên đường về đấy thôi.\n그니까 지금 오고 있다고\nExactly! He is supposedly on his way.","sourceUid":"merged-mq7fpjw1-45","sourceNo":7},{"id":7,"readerNo":8,"displayNo":8,"n":8,"type":"narration","text":"Sắp loạn hết rồi.\n아 난리가 나겠네\nIt's going to be chaotic.","sourceUid":"merged-mq7fppzs-46","sourceNo":8},{"id":8,"readerNo":9,"displayNo":9,"n":9,"type":"narration","text":"Máy bay của chúng tôi sẽ hạ cánh xuống Sân bay Quốc tế Incheon trong ít phút nữa.\n저희 비행기는 잠시 후 인천 국제공항에 도착하겠습니다.\nAttention, passengers, we will arrive at Incheon International Airport shortly.","sourceUid":"merged-mq7fpwxz-47","sourceNo":9},{"id":9,"readerNo":10,"displayNo":10,"n":10,"type":"narration","text":"Thời tiết không xấu nên máy bay sẽ rung lắc, quý khách vui lòng thắt dây an toàn.\n기상 상황이 좋지 않아 비행기가 흔들리니 좌석벨트를 매주시기 바랍니다.\nDue to bad weather, we may experience turbulence. Please fasten your seat belts.","sourceUid":"merged-mq7fqat3-49","sourceNo":10},{"id":10,"readerNo":11,"displayNo":11,"n":11,"type":"narration","text":"Yoon Joo No sẽ đến sao, đúng vậy\n그 윤준호가 온다고?\nThat Yoon Jun-ho is coming?","sourceUid":"merged-mq6rculh-47","sourceNo":11},{"id":11,"readerNo":12,"displayNo":12,"n":12,"type":"narration","text":"Đúng vậy, Yoon Jun-ho huyền thoại của giới M&A\n그래 M&A 전설 그 윤준호\nYeah, the M&A legend, that Yoon Jun-ho.","sourceUid":"merged-0012","sourceNo":12},{"id":12,"readerNo":13,"displayNo":13,"n":13,"type":"narration","text":"Thế mấy công ty con của chúng ta sắp khốn đốn rồi.\n계열사 몇 개 날아가는 거 아니야?\nSome of our subsidiaries might be in trouble.","sourceUid":"merged-mq7isg3c-90","sourceNo":13},{"id":13,"readerNo":14,"displayNo":14,"n":14,"type":"narration","text":"Thế này thì chết mất.\n아 우리 안 되는데\nPlease, don't let it be us.","sourceUid":"merged-mq7iwasj-95","sourceNo":14},{"id":14,"readerNo":15,"displayNo":15,"n":15,"type":"narration","text":"Tôi vẫn còn nợ rất nhiều tiền nhà.\n나 아파트 융자 한참 남았는데\nI still have years left on my apartment loan.","sourceUid":"merged-mq7iu4gq-91","sourceNo":15},{"id":15,"readerNo":16,"displayNo":16,"n":16,"type":"narration","text":"Giờ tôi mà mất việc thì\n저는 지금 잘리면요\nIf I get fired now,","sourceUid":"merged-mq7iubu0-92","sourceNo":16},{"id":16,"readerNo":17,"displayNo":17,"n":17,"type":"narration","text":"tôi còn không thể trả thẻ tín dụng tháng tới nữa.\n다음 달 카드값도 못 내요\nI can't even pay my credit card bills next month.","sourceUid":"merged-mq7iujvl-93","sourceNo":17},{"id":17,"readerNo":18,"displayNo":18,"n":18,"type":"narration","text":"Vì thế nên mới họp hội đồng quản trị gấp.\n아, 그래서 오늘 갑자기 임원회의 한다는 거구나.\nThat's why there is a sudden board meeting today.","sourceUid":"merged-mq7iwhua-96","sourceNo":18},{"id":18,"readerNo":19,"displayNo":19,"n":19,"type":"narration","text":"Đúng vậy. Lần đầu tiên thấy người thấy các lãnh đạo cuống cuồng như vậy.\n그러게. 높으신 분인데 저렇게 허둥대는 거 처음 본다.\nYou're right.\nI've never seen the higher-ups so flustered before.","sourceUid":"merged-mq7iv116-94","sourceNo":19},{"id":19,"readerNo":20,"displayNo":21,"n":21,"type":"narration","text":"Chào anh ạ, ừ, anh nghe gì chưa?\n형, 얘기 들리셨어요?\nBro, did you hear that?","sourceUid":"merged-0021","sourceNo":21},{"id":20,"readerNo":21,"displayNo":22,"n":22,"type":"narration","text":"Ai mà biết, nhưng mà M&A đâu có nghĩa là cứ phải bán công ty đâu\n근데, M&A 갖고 파는 건 아니잖아.\nI didn't.\nBut M&A doesn't always mean selling, right?","sourceUid":"merged-mq7ixui3-97","sourceNo":22},{"id":21,"readerNo":22,"displayNo":23,"n":23,"type":"narration","text":"Cũng có thể Yoon Joo No về đây để mua công ty khác.\n아니, 윤준호가 다른 회사 사러 오는 걸 수도 있잖아요.\nYun Ju No could be coming to buy another company.","sourceUid":"merged-mq7s4jmg-41","sourceNo":23},{"id":22,"readerNo":23,"displayNo":24,"n":24,"type":"narration","text":"Nè, cô không đọc báo sao?\n야, 뉴스 안 보냐?\nHey, haven't you been watching the news?","sourceUid":"merged-mq7iylsz-99","sourceNo":24},{"id":23,"readerNo":24,"displayNo":25,"n":25,"type":"narration","text":"Tòan là tin công ty mình sắp phá sản mua cái gì chứ?\n지금 우리 회사 망한다는 소문이 파다한데 사긴 뭘 사?\nThere are rumors everywhere saying that we're going under.\nHe's not buying anything.","sourceUid":"merged-mq7izjpp-100","sourceNo":25},{"id":24,"readerNo":25,"displayNo":26,"n":26,"type":"narration","text":"Anh ấy về đây là để tống cổ chúng ta đi\n윤준호는 지금 우리 모가지 자르러 오는 거야.\nHe's coming to take us down.","sourceUid":"merged-mq7s51zv-42","sourceNo":26},{"id":25,"readerNo":26,"displayNo":27,"n":27,"type":"narration","text":"Vậy nên mới loạn hết cả lên\n뭐야 그니까 이 난리가 난거고\nThat's why everyone is panicking.","sourceUid":"merged-mq7j02s3-102","sourceNo":27},{"id":26,"readerNo":27,"displayNo":28,"n":28,"type":"narration","text":"Trời ơi...\n에휴...\nUgh...","sourceUid":"merged-0028","sourceNo":28},{"id":27,"readerNo":28,"displayNo":29,"n":29,"type":"narration","text":"Ai đến mà làm ầm ĩ vậy?\n누가 오길래 이 난리래요?\nWho's coming that there's such an uproar?","sourceUid":"merged-mq7jr30k-123","sourceNo":29},{"id":28,"readerNo":29,"displayNo":30,"n":30,"type":"narration","text":"Một gã tên Yoon Jun-ho, là chuyên gia M&A.\n윤준호라고 M&A 하는 양반인데\nThere's this guy named Yun Ju No.\nHe handles M&A.","sourceUid":"merged-mq7jrhz7-124","sourceNo":30},{"id":29,"readerNo":30,"displayNo":31,"n":31,"type":"narration","text":"Mà cậu biết M&A là gì không?\n근데 M&A가 뭔지는 아냐\nBut do you even know what M&A is?","sourceUid":"merged-0031","sourceNo":31},{"id":30,"readerNo":31,"displayNo":32,"n":32,"type":"narration","text":"Thì là mua bán các doanh nghiệp rồi sáp nhập chúng lại, không phải sao?\n뭐 기업 사고 팔고 합치고 하는 거 아니에요?\nIsn't it about buying, selling, and merging companies?","sourceUid":"merged-mq7sejan-63","sourceNo":32},{"id":31,"readerNo":32,"displayNo":33,"n":33,"type":"narration","text":"Thực tập sinh như cậu thì biết cái gì chứ!\n인턴 나부랭이가 뭘 알겠냐?\nWhat would an intern like you know?","sourceUid":"merged-mq7jse70-125","sourceNo":33},{"id":32,"readerNo":33,"displayNo":34,"n":34,"type":"narration","text":"Mà cũng phải\n그래\nRight.","sourceUid":"merged-0034","sourceNo":34},{"id":33,"readerNo":34,"displayNo":35,"n":35,"type":"narration","text":"Những người không biết rõ\n모르는 사람들은\nPeople who don't know may think like you.","sourceUid":"merged-mq7jt21h-126","sourceNo":35},{"id":34,"readerNo":35,"displayNo":36,"n":36,"type":"narration","text":"cũng nghĩ như cậu.\n너처럼 생각할 수도 있겠다\nmight think the same way you do.","sourceUid":"merged-mq7sf8q4-64","sourceNo":36},{"id":35,"readerNo":36,"displayNo":37,"n":37,"type":"narration","text":"Nè\n자\nAlright,","sourceUid":"merged-0037","sourceNo":37},{"id":36,"readerNo":37,"displayNo":38,"n":38,"type":"narration","text":"để tôi giảng cho mà nghe\n형이 알려줄게\nI'll tell you.","sourceUid":"merged-0038","sourceNo":38},{"id":37,"readerNo":38,"displayNo":39,"n":39,"type":"narration","text":"M&A\nM&A라는 건 말이야\nM&A, you see,","sourceUid":"merged-0039","sourceNo":39},{"id":38,"readerNo":39,"displayNo":40,"n":40,"type":"narration","text":"không phải là chuyện mua bán đâu.\n사고 파는 게 아니야\nM&A is... not about buying and selling.","sourceUid":"merged-mq7jtnv8-127","sourceNo":40},{"id":39,"readerNo":40,"displayNo":41,"n":41,"type":"narration","text":"M&A là\nM&A는\nM&A is","sourceUid":"merged-0041","sourceNo":41},{"id":40,"readerNo":41,"displayNo":42,"n":42,"type":"narration","text":"giết chết rồi cứu sống\n죽이고 살리는 거야\nIt's about killing off and saving.","sourceUid":"merged-mq7sgbcn-65","sourceNo":42},{"id":41,"readerNo":42,"displayNo":43,"n":43,"type":"narration","text":"Xem cậu kìa, này, doanh nghiệp là gì?\n야, 법인은 뭐야?\nHey, what is a corporation?","sourceUid":"merged-0043","sourceNo":43},{"id":42,"readerNo":43,"displayNo":44,"n":44,"type":"narration","text":"Là một thực thể được tạo pháp luật tạo ra.\n법으로 만든 인격이지.\nIt's an entity created by law.","sourceUid":"merged-mq7w5b52-267","sourceNo":44},{"id":43,"readerNo":44,"displayNo":45,"n":45,"type":"narration","text":"Còn M&A\nM&A는?\nAnd M&A?","sourceUid":"merged-0045","sourceNo":45},{"id":44,"readerNo":45,"displayNo":46,"n":46,"type":"narration","text":"Là sáp nhập hai doanh nghiệp hoặc xóa bỏ chúng.\n둘을 하나로 합치거나 없애거나 하는 거지.\nM&A is... either merging two together or eliminating them.","sourceUid":"merged-mq7w5u5v-268","sourceNo":46},{"id":45,"readerNo":46,"displayNo":47,"n":47,"type":"narration","text":"có đúng không\n인격을 없앴어.\nRight?","sourceUid":"merged-mq7w6ajn-269","sourceNo":47},{"id":46,"readerNo":47,"displayNo":48,"n":48,"type":"narration","text":"Xem nha, xóa bỏ một thực thể thì không phải là giết người sao?\n그럼 이거 살인하냐?\nisn't that basically murder?","sourceUid":"merged-mq7th9i4-90","sourceNo":48},{"id":47,"readerNo":48,"displayNo":49,"n":49,"type":"narration","text":"Sao gọi là giết người được?\n그게 무슨 살인이에요.\nCome on, how is that murder?","sourceUid":"merged-mq7w7fuq-270","sourceNo":49},{"id":48,"readerNo":49,"displayNo":50,"n":50,"type":"narration","text":"Trời ạ.\n아이씨.\nGeez.","sourceUid":"merged-0050","sourceNo":50},{"id":49,"readerNo":50,"displayNo":51,"n":51,"type":"narration","text":"Cậu nghĩ một công ty khi bị bán đi sẽ như thế nào?\n야, 회사 팔리면 어떻게 돼?\nWhat happens when a company is sold?","sourceUid":"merged-mq7w82se-271","sourceNo":51},{"id":50,"readerNo":51,"displayNo":52,"n":52,"type":"narration","text":"Tất cả nhân viên sẽ bị sa thải\n그 회사 직원들은 다 잘리겠지?\nIts employees are all laid off.","sourceUid":"merged-mq7w8tap-272","sourceNo":52},{"id":51,"readerNo":52,"displayNo":53,"n":53,"type":"narration","text":"Bị sa thải thì sẽ\n잘리면?\nIf they get laid off?","sourceUid":"merged-0053","sourceNo":53},{"id":52,"readerNo":53,"displayNo":54,"n":54,"type":"narration","text":"Không có lương có đúng không?\n월급 못 받지?\nThey won't get paid, right?","sourceUid":"merged-0054","sourceNo":54},{"id":53,"readerNo":54,"displayNo":55,"n":55,"type":"narration","text":"Vậy gia đình họ sẽ ra sao?\n그런 그 가족들을\nThen what about their families?","sourceUid":"merged-mq7whb0s-273","sourceNo":55},{"id":54,"readerNo":55,"displayNo":56,"n":56,"type":"narration","text":"Sẽ chết đói thôi.\n굶겠지\nThey would starve. You know?","sourceUid":"merged-mq7whpsq-274","sourceNo":56},{"id":55,"readerNo":56,"displayNo":57,"n":57,"type":"narration","text":"Phải thôi, vì thế nên mới gọi là giết người.\n그러다가 사람 죽고 그러는 거라고\nAnd that can lead to some ending their lives.","sourceUid":"merged-mq7whzl2-275","sourceNo":57},{"id":56,"readerNo":57,"displayNo":58,"n":58,"type":"narration","text":"Cậu đã nghe câu đuổi người là giết người chưa?\n해고는 살인이다\nEver heard the phrase, \"Layoffs are murder\"?","sourceUid":"merged-mq7wi6z2-276","sourceNo":58},{"id":57,"readerNo":58,"displayNo":60,"n":60,"type":"narration","text":"Cũng có thể là vậy\n그렇긴 한데\nThat's true, but...","sourceUid":"merged-0060","sourceNo":60},{"id":58,"readerNo":59,"displayNo":62,"n":62,"type":"narration","text":"Tên Yun Jun-ho này\n윤준호 그 양반이\nThat guy, Yoon Jun-ho...","sourceUid":"merged-0062","sourceNo":62},{"id":59,"readerNo":60,"displayNo":63,"n":63,"type":"narration","text":"Này.\n야\nHey.","sourceUid":"merged-0063","sourceNo":63},{"id":60,"readerNo":61,"displayNo":64,"n":64,"type":"narration","text":"Cậu biết biệt danh của tên đó là gì không?\n너 그 양반 별명이 뭔 줄 아냐?\nDo you know what that guy's nickname is?","sourceUid":"merged-0064","sourceNo":64},{"id":61,"readerNo":62,"displayNo":65,"n":65,"type":"narration","text":"Là gì ạ?\nBạch Xà.\nBạch Xà à?\nỪ, Bạch Xà.\nRắn trắng.\nDi chuyển không tiếng động\nnuốt gọn con mồi không để lại dấu vết.\nNhưng sao lại gọi là Bạch xà?\n근데 왜 백사예요?\nWhite Snake?\nYes, White Snake.\nYes, a white snake.\nHe moves silently\nand eliminates prey without a trace.\nBut why is he called White Snake?","sourceUid":"merged-mq7wkkd5-297","sourceNo":65},{"id":62,"readerNo":63,"displayNo":66,"n":66,"type":"narration","text":"Còn có rắng hổ mang và các loại rắn độc khác mà.\n살무서도 있고 독서도\nYou could call him a viper or a cobra.","sourceUid":"merged-mq7wn344-299","sourceNo":66},{"id":63,"readerNo":64,"displayNo":67,"n":67,"type":"narration","text":"Vì anh ta là một kẻ máu lạnh kinh khủng.\n아휴, 핏기 하나 없는 냉혈안이라는 거지.\nIt means he's so cold-blooded that he's pale.","sourceUid":"merged-mq7wnzq8-300","sourceNo":67},{"id":64,"readerNo":65,"displayNo":68,"n":68,"type":"narration","text":"Này, sao lại phải làm M&A?\n야, M&A로 왜 해야겠냐?\nHey.\nWhy do people do M&A?","sourceUid":"merged-mq7wom65-301","sourceNo":68},{"id":65,"readerNo":66,"displayNo":69,"n":69,"type":"narration","text":"Là vì tiền đấy. Tất cả là vì tiền.\n응? 돈이거든. 돈 때문에 하는 거라고.\nMoney.\nIt's all about money.","sourceUid":"merged-mq7woy2c-302","sourceNo":69},{"id":66,"readerNo":67,"displayNo":70,"n":70,"type":"narration","text":"M&A nghĩa là bán thứ trị giá 10 tỷ với giá 100 tỷ, và mua cái trị giá 10 tỷ với giá 100 triệu\nM&A가 100억짜리 천억에 팔아먹고 100억짜리 1억에 사업을 하는 거거든.\nM&A is about selling something worth 10 billion for 100 billion, and buying something worth 10 billion for 1 hundred million.","sourceUid":"merged-0070","sourceNo":70},{"id":67,"readerNo":68,"displayNo":72,"n":72,"type":"narration","text":"Những người như anh ta\nsẽ chẳng bao giờ quan tâm\nđến sự sống chết của kẻ làm công ăn lương như chúng ta đâu.\n우리 같은 월급쟁이들 목에 뭐 수백 개가 날아가든 수천 개가 날아가든\nWhether hundreds or thousands of heads fly off the necks of salaried workers like us...","sourceUid":"merged-mq7um7yc-117","sourceNo":72},{"id":68,"readerNo":69,"displayNo":73,"n":73,"type":"narration","text":"Không bao giờ\n눈 하나 깜짝하겠냐?\nWould you even bat an eye?","sourceUid":"merged-0073","sourceNo":73},{"id":69,"readerNo":70,"displayNo":76,"n":76,"type":"narration","text":"Nếu một người được gọi là chuyên gia M&A\n그러니까 M&A 전문가다라는 거\nthe whole \"I'm an M&A expert\" thing","sourceUid":"merged-mq7uncjw-119","sourceNo":76},{"id":70,"readerNo":71,"displayNo":77,"n":77,"type":"narration","text":"thì nghĩa là người đó bị tâm thần.\n사이코패스는 소리\nsounds like a psychopath.","sourceUid":"merged-mq7umxfh-118","sourceNo":77},{"id":71,"readerNo":72,"displayNo":78,"n":78,"type":"narration","text":"Vậy cho nên được gọi là Bạch Xà?\n그래서 백서\nIs that why he's called White Snake?","sourceUid":"merged-mq7ws8n6-343","sourceNo":78},{"id":72,"readerNo":73,"displayNo":80,"n":80,"type":"narration","text":"Vì vậy nếu Yoon Joo No đến trụ sở chính,\n그러니까 윤준호가 본사로 온다는 건\nSo, if Yun Ju No is coming to the headquarters,","sourceUid":"merged-mq7wsgfm-344","sourceNo":80},{"id":73,"readerNo":74,"displayNo":81,"n":81,"type":"narration","text":"nghĩa là mọi chuyện đã bắt đầu rồi.\n이미 시작됐다는 뜻이고\nit means it has already begun.","sourceUid":"merged-mq7wskka-345","sourceNo":81},{"id":74,"readerNo":75,"displayNo":82,"n":82,"type":"narration","text":"Chuyện gì vậy?\n뭐가요?\nWhat happens?","sourceUid":"merged-0082","sourceNo":82},{"id":75,"readerNo":76,"displayNo":83,"n":83,"type":"narration","text":"Giám đốc điều hành, Yoon Joo No mà đến\ncậu ta sẽ làm quyết liệt lắm.\n주무님, 윤준호가 오면 칼춤을 줄 텐데.\nManaging Director, when Yun Ju No arrives, he'll cut us up into pieces.","sourceUid":"merged-mq7wtal7-346","sourceNo":83},{"id":76,"readerNo":77,"displayNo":84,"n":84,"type":"narration","text":"Đúng vậy. Tôi nghĩ chúng ta cần phải có đối sách.\n그러게 말입니다. 대책을 세워야 될 것 같은데요.\nExactly.\nWe need to come up with a plan.","sourceUid":"merged-mq7wtjs5-347","sourceNo":84},{"id":77,"readerNo":78,"displayNo":85,"n":85,"type":"narration","text":"Đối sách gì chứ.\n대책은 무슨.\nWhat plan?","sourceUid":"merged-mq7wvaud-349","sourceNo":85},{"id":78,"readerNo":79,"displayNo":86,"n":86,"type":"narration","text":"Cậu ta đã làm việc dưới trướng tôi mười năm.\nTôi phải sợ tới mức phải lập đối sách chỉ vì cậu ta đến à?\n걔가 내 밑에서 10년을 일한 놈인데 내가 걔 온다고 대책까지 세워야 되나?\nHe worked under me for ten years.\nDo I need a plan just because he's coming?","sourceUid":"merged-mq7wvx1v-350","sourceNo":86},{"id":79,"readerNo":80,"displayNo":87,"n":87,"type":"narration","text":"Nhưng việc Yoon Joo No đến\ncó lẽ là do ông Lee làm.\n윤준호가 오는 게 이상무님 액션이 아닌가 해서요.\nI was wondering if Yun Ju No's coming was Mr. Lee's doing. Mr.","sourceUid":"merged-mq7wwisa-351","sourceNo":87},{"id":80,"readerNo":81,"displayNo":88,"n":88,"type":"narration","text":"Ông Lee luôn nói muốn nghỉ hưu\nnhưng ai mà biết ông ấy thực sự nghĩ gì.\n이상무님 말로는 매번 은퇴하고 싶다고 그러시지만 그 속은 모르는 거지 않습니까?\nLee always says he wants to retire, but who knows how he truly feels.","sourceUid":"merged-mq7wygn0-352","sourceNo":88},{"id":81,"readerNo":82,"displayNo":89,"n":89,"type":"narration","text":"Nếu ông Lee gọi Yoon Joo No đến\nđể làm vũ khí đối đầu với chúng ta...\n혹시라도 이 장모님이 윤준호를 칼로 쓰려고 불러들이는 거면\nIf Mr. Lee is calling in Yun Ju No\nto use him as his sword...","sourceUid":"merged-mq7wyqo8-353","sourceNo":89},{"id":82,"readerNo":83,"displayNo":90,"n":90,"type":"narration","text":"Cho tôi đến trụ sở chính Sanin.\n선임 본사 부탁드리겠습니다.\nPlease take me to Sanin Headquarters.","sourceUid":"merged-mq7xwdq6-354","sourceNo":90},{"id":83,"readerNo":84,"displayNo":91,"n":91,"type":"narration","text":"Giám đốc, tôi tới sân bay rồi.\n성무님 공원 도착했습니다.\nExecutive Director, I arrived at the airport.","sourceUid":"merged-mq7y0n1p-395","sourceNo":91},{"id":84,"readerNo":85,"displayNo":92,"n":92,"type":"narration","text":"Vâng.\n예\nYes.","sourceUid":"merged-0092","sourceNo":92},{"id":85,"readerNo":86,"displayNo":94,"n":94,"type":"narration","text":"Giám đốc, chào anh, sao lại đến đây cả vậy?\n뭐 하러 여기까지 와?\nWhy come all the way here?","sourceUid":"merged-mq7y1ivl-396","sourceNo":94},{"id":86,"readerNo":87,"displayNo":95,"n":95,"type":"narration","text":"Đi trước đi chứ. Chúng tôi đang đi\n언제든 가지\nYou could've gone ahead.","sourceUid":"merged-mq7y1sqa-397","sourceNo":95},{"id":87,"readerNo":88,"displayNo":96,"n":96,"type":"narration","text":"nên ghé đến đưa anh đi luôn.\n다른 길인데 보셔 가야지\nWe should take you since we're on the way.","sourceUid":"merged-mq7y205s-398","sourceNo":96},{"id":88,"readerNo":89,"displayNo":97,"n":97,"type":"narration","text":"Giờ cậu đã hiểu\nviệc Yoon Joo No đến nghĩa là sao rồi chứ?\n자 알겠냐? 윤준호가 온다는 게 무슨 의미지?\nGoodness.\nDo you understand now\nwhat it means for Yun Ju No to come?","sourceUid":"merged-mq7y2eyq-399","sourceNo":97},{"id":89,"readerNo":90,"displayNo":99,"n":99,"type":"narration","text":"Do sự gia tăng biến động trong thị trường tài chính toàn cầu,\nsự ổn định của ngành tài chính càng ngày càng kém ổn định.\n글로벌 금융시장 변동성이 확대됨에 따라 금융산업 안정성이 낮아지고 있습니다.\nWith increased volatility in global financial markets,\nthe stability of financial companies is decreasing.","sourceUid":"merged-mq7y3i0w-400","sourceNo":99},{"id":90,"readerNo":91,"displayNo":100,"n":100,"type":"narration","text":"Vì vậy, các cơ quan tài chính đánh giá rằng\nđây là lúc cần quản lý rủi ro\n이에 금융당국의 리스크 관리가 필요한 시점이라 판단하고\nThus, the financial authorities decided that risk management is necessary","sourceUid":"merged-mq7y7jg7-401","sourceNo":100},{"id":91,"readerNo":92,"displayNo":101,"n":101,"type":"narration","text":"và khuyến cáo các ngân hàng\nduy trì tỷ lệ BIS trên 13%.\n은행사들의 BIS를 13% 이상 유지할 것을 권고했습니다.\nand have recommended that banks maintain a BIS* ratio of over 13%. (*Capital Adequacy Ratio)","sourceUid":"merged-mq7y7oyn-402","sourceNo":101},{"id":92,"readerNo":93,"displayNo":102,"n":102,"type":"narration","text":"Với ngân hàng Hanbit, ngân hàng chính của Sanin\nthì tỷ lệ hiện giờ là 12%.\n상인의 주 거래은행인 한빛은행은 현재 12%입니다.\nSanin's main bank, Hanbit Bank, currently has a 12% ratio.","sourceUid":"merged-mq7y81dp-403","sourceNo":102},{"id":93,"readerNo":94,"displayNo":103,"n":103,"type":"narration","text":"Vậy nên\nhọ đã thông báo rạch ròi muốn từ chối gia hạn kỳ tiếp theo.\n때문에 사실상 다음 만기 연장을 거부하겠다는 의사를 전달해 왔습니다.\nAs a result, they have effectively conveyed\ntheir refusal to postpone the due date.","sourceUid":"merged-mq7y8hpy-404","sourceNo":103},{"id":94,"readerNo":95,"displayNo":104,"n":104,"type":"narration","text":"Mấy tên khốn ngân hàng này lúc vay tiền thì cứ như tiền của họ\ncòn giờ thì yêu cầu thanh toán.\nHơn nữa, tỷ lệ nợ của tập đoàn Sanin chúng ta\nlà 428%, cao hơn so với tỷ lệ trung bình\n250% của mười tập đoàn hàng đầu.\n더구나 우리 산인그룹의 부채 비율은 10대 대기업의 평균 부채율인 250%에 비해 다소 높은 428%입니다\nThose bank jerks begged us to borrow money,\nand now they're demanding payment.\nMoreover, the debt ratio of our Sanin Group\nis 428%, which is somewhat high compared to\nthe average debt ratio of the top 10 corporations,\nwhich is 250%.","sourceUid":"merged-mq7yaclp-425","sourceNo":104},{"id":95,"readerNo":96,"displayNo":146,"n":146,"type":"narration","text":"Chúng ta biết chuyện đó khi xem tài liệu rồi\nnên vào phần chính đi.\n아, 그런 거는 서류를 다 보고 받았으니까 본론부터 합시다\nAh, I've already seen all that in the documents, so let's get to the main point.","sourceUid":"merged-mq7yb68v-426","sourceNo":146},{"id":96,"readerNo":97,"displayNo":106,"n":106,"type":"narration","text":"Quỹ đầu tư riêng lẻ\nđã công khai yêu cầu giảm tỷ lệ nợ.\n3월 펀드에서 공개적으로 부채율을 줄일 것을 요구했습니다\nThe Private Placement Fund has publicly demanded\nthat we reduce our debt ratio.","sourceUid":"merged-mq7ybizj-427","sourceNo":106},{"id":97,"readerNo":98,"displayNo":107,"n":107,"type":"narration","text":"Vì vậy, trên đa số các tờ báo kinh tế, đã còn nhiều bài báo nói\ncông ty đang rơi vào khủng hoảng, thậm chí có bài còn nói đến phá sản.\n때문에 다수의 경제지에서 위기서를 다룬 기사까지 나오고 있고 일부에서는 구도까지 거론되고 있는 상황입니다\nSo the financial papers are covering this crisis.\nSome even mention the possibility of bankruptcy.","sourceUid":"merged-mq7yc17c-428","sourceNo":107},{"id":98,"readerNo":99,"displayNo":108,"n":108,"type":"narration","text":"Chúng tôi bảo cậu nói trọng tâm mà.\nCậu không hiểu à? Họ đang muốn đòi tiền.\nSố nợ là bao nhiêu?\nVâng.\nMười một nghìn tỷ won ạ.\n본론이 뭐냐고 물었는데 마이키를 돈 갚으라 이거 아니야 얼마냐고\nWe asked you to get to the point. You don't get it.\nThey're demanding payment. How much is the debt?\nOkay.\nIt's 11 trillion won.","sourceUid":"merged-mq7ycc8m-429","sourceNo":108},{"id":99,"readerNo":100,"displayNo":109,"n":109,"type":"narration","text":"Hạn cuối là khi nào?\n언제까지?\nBy when?","sourceUid":"merged-mq7ych9a-430","sourceNo":109},{"id":100,"readerNo":101,"displayNo":110,"n":110,"type":"narration","text":"Hạn cuối là cuối quý một năm sau. Nhưng thực tế thì cần xong xuôi trong năm nay.\n만기는 내년 1분기까지입니다만 사실상 올해 안에 마무리해야 합니다\nIt's due by the first quarter of next year,\nbut we should take care of it this year.","sourceUid":"merged-mq80pjuv-598","sourceNo":110},{"id":101,"readerNo":102,"displayNo":111,"n":111,"type":"narration","text":"Cậu đùa đấy à?\nTưởng 11 nghin tỷ là lá cây hay gì?\n장난하나? 10일째가 누구의 이름도 아니고\nAre you joking?\nEleven trillion won isn't chump change.","sourceUid":"merged-mq80py0r-599","sourceNo":111},{"id":102,"readerNo":103,"displayNo":112,"n":112,"type":"narration","text":"Ngân hàng đòi là chúng ta phải làm theo ngay à?\nCó công ty nào kinh doanh bằng tiền của mình không?\n아니 은행에 하란다고 뭐 다 해야 되나? 자기 돈으로 사업하는 데가 어디 있다고?\nNo, just because the bank says to do something, do we have to do everything? Where is there a business that runs on its own money?","sourceUid":"merged-mq80qj8o-600","sourceNo":112},{"id":103,"readerNo":104,"displayNo":113,"n":113,"type":"narration","text":"Cuối quý trước, chủ tịch đã hứa\nsẽ giảm tỷ lệ nợ\ncủa tập đoàn Sanin trên thị trường xuống còn 200%.\n회장님께서는 지난 분기 말 시장에서 산인 그룹의 부채를 200%로 낮출 것을 약속하셨고\nWe don't have to do everything the bank says.\nWhat business operates with its own money?\nAt the end of the last quarter, the Chairman promised to reduce\nSanin Group's debt ratio on the market to 200%.","sourceUid":"merged-mq80qv2q-601","sourceNo":113},{"id":104,"readerNo":105,"displayNo":114,"n":114,"type":"narration","text":"Giá cổ phiếu của chúng ta vốn đã đang giảm rất nhiều\nnhưng lại tăng 11% vào hôm đó.\n큰 폭으로 조정되는 주가가 당일 11% 상승했습니다\nOur stock price, which was declining sharply,\nrose by 11% that day.","sourceUid":"merged-mq80r5bl-602","sourceNo":114},{"id":105,"readerNo":106,"displayNo":115,"n":115,"type":"narration","text":"Giá vẫn tiếp tục tăng đều sau đó\nvà hiện đã tăng 40% so với mức chạm đáy trước đó.\n그 이후 상승세를 유지해서 현재 저점 대비 40% 상승 중입니다\nSince then, it has retained its upward trend\nand is currently 40% from its previous low.","sourceUid":"merged-mq80rggp-603","sourceNo":115},{"id":106,"readerNo":107,"displayNo":116,"n":116,"type":"narration","text":"Nhưng nếu giờ không thực hiện được lời hứa,\ngiá cổ phiếu sẽ lại lao dốc sao?\n근데 그 약속을 못 지킨다 그러면 주가는 박살난다\nBut will our stock prices crash if that promise can't be kept?","sourceUid":"merged-mq80rrvr-604","sourceNo":116},{"id":107,"readerNo":108,"displayNo":117,"n":117,"type":"narration","text":"Vâng.\nVì thế, chúng ta nhất định phải huy động vốn để trả nợ.\n네 그래서 자금을 조달해서 갚아야 합니다\nWe must come up with the funds to pay it back.","sourceUid":"merged-mq85u621-861","sourceNo":117},{"id":108,"readerNo":109,"displayNo":118,"n":118,"type":"narration","text":"Cậu là nhân viên của Sanin à?\n산인치고 그러시죠?\nYou're a Sanin employee, right?","sourceUid":"merged-mq80sj4g-606","sourceNo":118},{"id":109,"readerNo":110,"displayNo":119,"n":119,"type":"narration","text":"Cậu làm ở công ty tốt lắm đấy.\n처음 회사 다니시네.\nYou work at a good company.","sourceUid":"merged-mq80ss6n-607","sourceNo":119},{"id":110,"readerNo":111,"displayNo":120,"n":120,"type":"narration","text":"Sanin có chung cư tốt nhất ở Hàn mà.\n대한민국에서 아파트 하면 산인 아닙니까?\nSanin has the best apartments in Korea.","sourceUid":"merged-mq80sx39-608","sourceNo":120},{"id":111,"readerNo":112,"displayNo":121,"n":121,"type":"narration","text":"Phía bên kia\n여기 보세요\nLook over there.","sourceUid":"merged-mq80tn69-629","sourceNo":121},{"id":112,"readerNo":113,"displayNo":122,"n":122,"type":"narration","text":"đều do Sanin xây cả đấy.\n저보다 산인이셨잖아요\nSanin built all those.","sourceUid":"merged-mq80trmn-630","sourceNo":122},{"id":113,"readerNo":114,"displayNo":123,"n":123,"type":"narration","text":"Ngoài nợ ngân hàng,\nchúng ta còn cả trái phiếu chuyển đổi của quỹ đầu tư riêng lẻ.\n사모엘의 전화사채 쓴 것도 있잖아요\nBesides the bank loans, we also have private placement convertible bonds.","sourceUid":"merged-mq80ud5t-631","sourceNo":123},{"id":114,"readerNo":115,"displayNo":124,"n":124,"type":"narration","text":"Vâng.\n네\nYes.","sourceUid":"merged-0124","sourceNo":124},{"id":115,"readerNo":116,"displayNo":125,"n":125,"type":"narration","text":"Số tiền ta thu được khi phát hành trái phiếu là 3000 tỷ won.\n사모엘 펀드에서 전화사채로 차입한 금액은 3조원입니다\nThe amount we borrowed with CB from the funds is three trillion won.","sourceUid":"merged-mq80ux8c-632","sourceNo":125},{"id":116,"readerNo":117,"displayNo":127,"n":127,"type":"narration","text":"Vậy khi nào đáo hạn?\n사모엘 거기 만기는 언제야?\nWhen is the private placement due?","sourceUid":"merged-mq80ve7c-634","sourceNo":127},{"id":117,"readerNo":118,"displayNo":128,"n":128,"type":"narration","text":"Trong nửa đầu năm sau ạ.\n만기는 2년 상반기로\nIt's due in the first half of next year.","sourceUid":"merged-mq810sh0-635","sourceNo":128},{"id":118,"readerNo":119,"displayNo":129,"n":129,"type":"narration","text":"Trùng nhau rồi\n겹치네\nThat overlaps.","sourceUid":"merged-0129","sourceNo":129},{"id":119,"readerNo":120,"displayNo":130,"n":130,"type":"narration","text":"- Nhưng gia hạn cái đó cũng được mà. - Vâng.\n그건 연장하면 되잖아\n- But we can extend that one. - Yes.","sourceUid":"merged-mq8112zw-636","sourceNo":130},{"id":120,"readerNo":121,"displayNo":131,"n":131,"type":"narration","text":"Vâng.\n네\nYes.","sourceUid":"merged-0131","sourceNo":131},{"id":121,"readerNo":122,"displayNo":132,"n":132,"type":"narration","text":"Quyền chọn bán là gì?\n그 푸드옵션 그 내용은 어떻게 되지?\nWhat is the put option again?","sourceUid":"merged-mq80krec-491","sourceNo":132},{"id":122,"readerNo":123,"displayNo":135,"n":135,"type":"narration","text":"Quỹ sẽ có quyền điều chỉnh lại giá chuyển đổi hoặc yêu cầu trả gốc và lãi\n사모엘은 주가가 전환가액이 10만원 이하로 하락하면 전환가액을 리피칭하거나 원리금을 상환 요청할 수 있습니다\nIf our stocks drop below the conversion price of 100,000 won,\nthe private placement can re-fix it or demand principal and interest repayment.","sourceUid":"merged-mqdcwy8s-1","sourceNo":135},{"id":123,"readerNo":124,"displayNo":136,"n":136,"type":"narration","text":"nếu giá cổ phiếu giảm xuống dưới 100 nghìn won. Vậy nghĩa là nếu giá cổ phiếu giảm xuống dưới 100 nghìn won, họ sẽ lấy hết cổ phần sao?\n그러니까 그 얘기는 우리 주가가 10만 원 이하로 떨어지면 주식을 다 가져간다?\nSo that means if our stock prices fall below 100,000 won,\nthey'll take all our shares?","sourceUid":"merged-mq81503z-664","sourceNo":136},{"id":124,"readerNo":125,"displayNo":137,"n":137,"type":"narration","text":"Vâng, nếu trả toàn bộ bằng cổ phiếu,\nquỹ sẽ thành\ncổ đông lớn nhất của công ty.\n네. 3월이 전액 주가로 전환할 경우 일대주주는 3월이 됩니다.\nYes. If the entire loan is recouped as shares,\nthe private placement fund will","sourceUid":"merged-mq816fix-666","sourceNo":137},{"id":125,"readerNo":126,"displayNo":138,"n":138,"type":"narration","text":"Chủ tịch sẽ sụp đổ mất.\n회장님 쓰러지시겠다\nThe chairman will collapse.","sourceUid":"merged-mq816siv-667","sourceNo":138},{"id":126,"readerNo":127,"displayNo":139,"n":139,"type":"narration","text":"Loạn hết rồi, loạn hết rồi.\n난리다 난리\nWhat a mess. What a mess.","sourceUid":"merged-mq85zxdb-887","sourceNo":139},{"id":127,"readerNo":128,"displayNo":140,"n":140,"type":"narration","text":"Nhưng hiện tại, giá cổ phiếu đang được hỗ trợ ở mức 150 nghìn won.\n하지만 현재 주가가 15만원 선으로 지지선이 형성되어 있습니다\nBut the current stock price is supported\nat 150,000 won.","sourceUid":"merged-mq860szv-888","sourceNo":140},{"id":128,"readerNo":129,"displayNo":141,"n":141,"type":"narration","text":"Vậy nên nếu không có tác động xấu nào,\nthì sẽ không bị ảnh hưởng.\n그래서 큰 악재가 아니면 영향이 없을 걸로 보입니다\nSo unless there's a major negative factor,\nit won't be affected.","sourceUid":"merged-mq8616gn-889","sourceNo":141},{"id":129,"readerNo":130,"displayNo":142,"n":142,"type":"narration","text":"- May thật. - May?\n그것도 다행이네\n- A relief! - A relief?","sourceUid":"merged-mq862czb-891","sourceNo":142},{"id":130,"readerNo":131,"displayNo":143,"n":143,"type":"narration","text":"Ôi trời. Vậy giờ phải làm sao? Phải trả 11 nghìn tỷ và vẫn giữ giá cổ phiếu? Vâng. - Nhất định phải thế? - Vâng.\n그래서 어쩌라는 거야 11조도 갚고 주가도 방어하라는 거네 왜 무조건 왜.\nGoodness.\nSo what are we supposed to do?\nYou are saying to pay off the 11 trillion\nand maintain the stock price.\nYes.\n- At all costs. - Yes.","sourceUid":"merged-mq862u90-892","sourceNo":143},{"id":131,"readerNo":132,"displayNo":144,"n":144,"type":"narration","text":"Đã đẩy công ty đến nước này\nnhưng vẫn nói như chuyện của người khác.\n시가 다 이 지경으로만 하네 남 얘기한다.\nPushing us into this mess,\nbut he still talks like it's not his problem.","sourceUid":"merged-mq8633tv-893","sourceNo":144},{"id":132,"readerNo":133,"displayNo":145,"n":145,"type":"narration","text":"Năng khiếu của anh ta mà.\nSao lại thành ra như này chứ? Thật tình.\nGiờ không phải là lúc bới móc nhau đâu.\n주의 주특기 아닙니까 못 자다가 이 지경이 됐는데 지금 그것 따질 때가 아닐 거 같은데요.\nIsn't that his specialty?\nHow did things end up like this?\nI don't think it's time to be arguing that.","sourceUid":"merged-mq863mfq-894","sourceNo":145},{"id":133,"readerNo":134,"displayNo":146,"n":146,"type":"narration","text":"Đúng vậy đấy.\nTôi nghĩ chúng ta sẽ được dư luận chú ý lắm.\n그러게 말입니다 언론에 주목도 꽤 받을 거 같은데.\nThat's what I'm saying.\nI feel we'll receive a lot of media attention.","sourceUid":"merged-mq8654vm-895","sourceNo":146},{"id":134,"readerNo":135,"displayNo":147,"n":147,"type":"narration","text":"Dĩ nhiên rồi.\nChính quyền hiện tại đang ở nửa cuối nhiệm kỳ\nvà sẽ cần lý do biện minh cho các thất bại kinh tế.\n그렇겠죠 정권도 하반기 들어서면서 경제 실택에 대한 핑계가 필요할텐데\nProbably.\nThe current regime is in the second half of the term\nand will need an excuse for the economic failures.","sourceUid":"merged-mq867qi4-922","sourceNo":147},{"id":135,"readerNo":136,"displayNo":148,"n":148,"type":"narration","text":"Lúc đó muốn dựa vào chính sách kích thích kinh tế nào cũng khó.\n그때 눈에 들면 부양책도 기대하기 힘들어요\nIf we catch their attention, then,\nwe can't even expect any stimulus measures.","sourceUid":"merged-mq8684v0-923","sourceNo":148},{"id":136,"readerNo":137,"displayNo":149,"n":149,"type":"narration","text":"Khi thẩm định và áp dụng chúng,\nBỏ chính sách kinh tế qua một bên đi.\nchúng ta sẽ bị chỉ trích công khai.\n부양책은 고소하고 시범조로 올리면 보란듯이 후드려 맞을텐데\nForget stimulus measures.\nIf they make an example of us,\nwe'll be criticized on display.","sourceUid":"merged-mq868cz0-924","sourceNo":149},{"id":137,"readerNo":138,"displayNo":150,"n":150,"type":"narration","text":"Vậy tập đoàn Sanin của chúng ta có thể bị xóa sổ.\n그럼 우리 산인은 그룹 자체가 없어질 수도 있겠네\nThen our Sanin Group could cease to exist.","sourceUid":"merged-mq868hjr-925","sourceNo":150},{"id":138,"readerNo":139,"displayNo":151,"n":151,"type":"narration","text":"Vậy nên chủ tịch đã đặc biệt đưa chỉ thị\nphải đánh cược số mệnh của tập đoàn và dốc toàn lực giải quyết ạ.\n그래서 회장님께서 특별히 그룹의 명운을 걸고 총력을 달아 하셨습니다\nThus, the chairman told us to give it our all","sourceUid":"merged-mq8690vy-926","sourceNo":151},{"id":139,"readerNo":140,"displayNo":153,"n":153,"type":"narration","text":"Ông Lee không có ý kiến gì sao?\n이상문님 뭐 하실 말씀 없습니까?\nMr. Lee, don't you have anything to say?","sourceUid":"merged-mq869kja-927","sourceNo":153},{"id":140,"readerNo":141,"displayNo":154,"n":154,"type":"narration","text":"Vâng.\nĐó là lý do\ntổ trưởng Yoon Joo No sẽ đến đây.\n아 네 그래서 윤준호 팀장에 올 겁니다\nAll right.\nThat is why\nTeam Leader Yun Ju No is coming.","sourceUid":"merged-mq869rz4-928","sourceNo":154},{"id":141,"readerNo":142,"displayNo":155,"n":155,"type":"narration","text":"Cậu làm công việc gì vậy?\n무슨 일 하세요?\nWhat line of work do you do?","sourceUid":"merged-mq869z9v-929","sourceNo":155},{"id":142,"readerNo":143,"displayNo":156,"n":156,"type":"narration","text":"Tôi tò mò không biết cậu làm gì ở Sanin.\nTại cậu cứ đọc tài liệu mãi.\n산인에서 하시는 일은 뭔가 해서 계속 사령 보시길래\nI was wondering what you did in Sanin.\nYou kept looking over the files.","sourceUid":"merged-mq86a9jm-930","sourceNo":156},{"id":143,"readerNo":144,"displayNo":157,"n":157,"type":"narration","text":"Tôi mua rồi bán.\n아 사고 팔고 합니다\nI buy and sell.","sourceUid":"merged-mq86adiq-931","sourceNo":157},{"id":144,"readerNo":145,"displayNo":158,"n":158,"type":"narration","text":"À, là người làm mảng kinh doanh. Tôi hiểu rồi.\n영업고시구나\nYou're in the sales department, I see.","sourceUid":"merged-mq86ai7g-932","sourceNo":158},{"id":145,"readerNo":146,"displayNo":159,"n":159,"type":"narration","text":"Tôi hiểu rồi\n예?\nI see","sourceUid":"merged-0159","sourceNo":159},{"id":146,"readerNo":147,"displayNo":160,"n":160,"type":"narration","text":"Sao cơ?\n아니\nNo.","sourceUid":"merged-mq84x105-766","sourceNo":160},{"id":147,"readerNo":148,"displayNo":161,"n":161,"type":"narration","text":"Nghe nói cậu ấy đang có vấn đề gì đó.\n뭔가 문제가 있는 걸로 아는데\nI heard there's a problem with him.","sourceUid":"merged-mq86aw5n-933","sourceNo":161},{"id":148,"readerNo":149,"displayNo":162,"n":162,"type":"narration","text":"Nếu người như cậu ấy về lại trụ sở chính,\n그런 애를 다시 본사로 돌리면\nIf you bring someone like him back to HQ,","sourceUid":"merged-mq86b2fr-934","sourceNo":162},{"id":149,"readerNo":150,"displayNo":163,"n":163,"type":"narration","text":"các nhân viên sẽ bàn tán này nọ đấy.\n사원들이 뭐라고 그러겠습니까?\nwhat will the employees say?","sourceUid":"merged-mq86b7dx-935","sourceNo":163},{"id":150,"readerNo":151,"displayNo":164,"n":164,"type":"narration","text":"Đúng vậy.\n그러니까요\nExactly.","sourceUid":"merged-mq86bbzp-936","sourceNo":164},{"id":151,"readerNo":152,"displayNo":165,"n":165,"type":"narration","text":"Kẻ gây chuyện lớn rồi chạy trốn\n사고치고 도망친 놈이\nHow can a troublemaker who ran off","sourceUid":"merged-mq86clen-962","sourceNo":165},{"id":152,"readerNo":153,"displayNo":166,"n":166,"type":"narration","text":"mà còn mặt mũi về lại trụ sở chính sao?\n무슨 낯으로 본사를 들어옵니까?\nhave the nerve to return to HQ?","sourceUid":"merged-mq86crgz-963","sourceNo":166},{"id":153,"readerNo":154,"displayNo":167,"n":167,"type":"narration","text":"Giám đốc điều hành,\n전무님\nManaging Director,","sourceUid":"merged-mq86cvvr-964","sourceNo":167},{"id":154,"readerNo":155,"displayNo":168,"n":168,"type":"narration","text":"tôi nghĩ có hiểu lầm rồi\n오해가 있으신 것 같은데요\nI think there's a misunderstanding.","sourceUid":"merged-mq86dkns-965","sourceNo":168},{"id":155,"readerNo":156,"displayNo":169,"n":169,"type":"narration","text":"Hiểu lầm gì?\n무슨 오해요?\nWhat misunderstanding?","sourceUid":"merged-mq86dpeb-966","sourceNo":169},{"id":156,"readerNo":157,"displayNo":170,"n":170,"type":"narration","text":"Nếu tôi có hiểu lầm điều gì,\n제가 오해하는 게 있으면\nIf there's something I'm misunderstanding,","sourceUid":"merged-0170","sourceNo":170},{"id":157,"readerNo":158,"displayNo":171,"n":171,"type":"narration","text":"mong anh nói rõ ra đi.\n말씀을 해주세요\nplease tell me.","sourceUid":"merged-mq8528hg-800","sourceNo":171},{"id":158,"readerNo":159,"displayNo":173,"n":173,"type":"narration","text":"Dù gì cậu ấy cũng đã đến rồi,\nít nhất mọi người hãy nghe cậu ấy nói gì...\n그래도 이왕 오기로 한 거니까 무슨 얘기를 하는지 들어보시고\nWell, since he's already coming,\nyou should at least hear him out.","sourceUid":"merged-mq86t0he-970","sourceNo":173},{"id":159,"readerNo":160,"displayNo":174,"n":174,"type":"narration","text":"Anh đã gọi cậu ấy à?\n상무님이 불렀어요?\nDid you call for him, Mr. Lee?","sourceUid":"merged-mq86t9hi-971","sourceNo":174},{"id":160,"readerNo":161,"displayNo":175,"n":175,"type":"narration","text":"Không.\n아니요.\nNo.","sourceUid":"merged-mq853d6p-803","sourceNo":175},{"id":161,"readerNo":162,"displayNo":176,"n":176,"type":"narration","text":"Là chủ tịch gọi.\n회장님이 부르셨습니다.\nThe chairman did.","sourceUid":"merged-mq86tjvd-972","sourceNo":176},{"id":162,"readerNo":163,"displayNo":177,"n":177,"type":"narration","text":"Mọi người trong ban giám đốc\nchắc sẽ có ý kiến riêng của mình.\n각 임원진 분들마다 의견이 있으실 텐데\nYou all must have your opinion\non this as executives.","sourceUid":"merged-mq86tuh2-973","sourceNo":177},{"id":163,"readerNo":164,"displayNo":178,"n":178,"type":"narration","text":"Chúng ta ra ngoài uống cà phê đi.\n커피나 한 잔씩 하면서 하시죠\nLet's have some coffee while we talk.","sourceUid":"merged-mq86ty4s-974","sourceNo":178},{"id":164,"readerNo":165,"displayNo":179,"n":179,"type":"narration","text":"Chắc mọi người đau đầu hết rồi.\n머리들도 아픈데\nWe've already got a headache.","sourceUid":"merged-mq86u2kn-975","sourceNo":179},{"id":165,"readerNo":166,"displayNo":180,"n":180,"type":"narration","text":"Nhưng\ncó vẻ mọi người trong ban giám đốc đều không thích Yoon Joo No.\n근데요, 임원들은 다 윤준호 팀장을 싫어하네요\nAll the executives\nseem to hate Mr. Yun Ju No.","sourceUid":"merged-mq86uluy-976","sourceNo":180},{"id":166,"readerNo":167,"displayNo":181,"n":181,"type":"narration","text":"Này, nếu là cậu thì cậu thích nổi không?\n야, 너 같으면 좋겠냐?\nHey, would you like him if you were in their shoes?","sourceUid":"merged-mq86v0nz-977","sourceNo":181},{"id":167,"readerNo":168,"displayNo":182,"n":182,"type":"narration","text":"Đặc biệt là anh Ha,\nghét cay ghét đắng Yoon Joo No\n특히 하전무님은 차원이 다르지\nEspecially Mr. Ha...\nhates him on another level.","sourceUid":"merged-mq86vbku-978","sourceNo":182},{"id":168,"readerNo":169,"displayNo":183,"n":183,"type":"narration","text":"Tại sao vậy?\n왜요?\nWhy?","sourceUid":"merged-mq875g8s-1091","sourceNo":183},{"id":169,"readerNo":170,"displayNo":184,"n":184,"type":"narration","text":"Với những người khác\nthì lo sợ bị mất chức\n하여튼 임원들이야 뭐 자기 자리 날아갈까 봐 그런 거라지만\nOther executives are\nworried they'll lose their positions,","sourceUid":"merged-mq875xbn-1092","sourceNo":184},{"id":170,"readerNo":171,"displayNo":185,"n":185,"type":"narration","text":"nhưng với anh Ha,\nYoon Joo No từng ở dưới trướng anh ấy.\n하전무는 자기 새끼였어, 윤준호가\nbut for Mr. Ha,\nYun Ju No was his underling.","sourceUid":"merged-mq8769yi-1094","sourceNo":185},{"id":171,"readerNo":172,"displayNo":186,"n":186,"type":"narration","text":"- Thật sao? - Ừ.\n진짜요?\n- Really? - Yes.","sourceUid":"merged-mq876ft2-1095","sourceNo":186},{"id":172,"readerNo":173,"displayNo":187,"n":187,"type":"narration","text":"Trước khi thành CFO,\nanh Ha từng làm ở đội M&A.\n응, 하전무 그룹 CF 되기 전에 M&A 팀이었거든\nBefore Mr. Ha became the CFO, he led the M&A team.","sourceUid":"merged-mq876n92-1096","sourceNo":187},{"id":173,"readerNo":174,"displayNo":188,"n":188,"type":"narration","text":"Giờ anh ấy hết chỗ đi rồi.\n하정문은 이제 갈 데가 없어\nMr. Ha has nowhere to go now.","sourceUid":"merged-mq8776ra-1097","sourceNo":188},{"id":174,"readerNo":175,"displayNo":189,"n":189,"type":"narration","text":"Hoặc là lên làm CEO, hoặc là ra đi thôi.\n그룹 CEO 되거나 나가거나\nIt's either he becomes the CEO, or he's out.","sourceUid":"merged-mq877ets-1098","sourceNo":189},{"id":175,"readerNo":176,"displayNo":190,"n":190,"type":"narration","text":"Nhưng chủ tịch lại gọi cho tên từng dưới trướng mình trở về\n근데 회장이 자기 밑에 있던 놈을 불러서\nBut the chairman is bringing back the guy","sourceUid":"merged-mq877j40-1099","sourceNo":190},{"id":176,"readerNo":177,"displayNo":191,"n":191,"type":"narration","text":"với dự định giao việc của mình cho người đó.\n자기 일을 넘기려고 한다\nwho worked under him to hand over his task.","sourceUid":"merged-mq877nal-1100","sourceNo":191},{"id":177,"readerNo":178,"displayNo":193,"n":193,"type":"narration","text":"Này đợi đã\n야, 잠깐만\nHey, wait a minute.","sourceUid":"merged-0193","sourceNo":193},{"id":178,"readerNo":179,"displayNo":194,"n":194,"type":"narration","text":"Ừ, đi thôi\n응, 가자\nYeah, let's go.","sourceUid":"merged-0194","sourceNo":194},{"id":179,"readerNo":180,"displayNo":196,"n":196,"type":"narration","text":"Còn vì sao nữa\n왜 그러긴\nWhy else?","sourceUid":"merged-mq870jxv-1014","sourceNo":196},{"id":180,"readerNo":181,"displayNo":197,"n":197,"type":"narration","text":"Ông ấy muốn họ chiến hết mình.\n하정문이 여기 복수 걸어야 돼\nMr. Ha has to put it all out there.","sourceUid":"merged-mq8v130w-175","sourceNo":197},{"id":181,"readerNo":182,"displayNo":198,"n":198,"type":"narration","text":"Ông ấy cho họ đấu với nhau, kẻ thắng thì ở lại, kẻ thua thì ra đi\n너무나\nSo much so that...","sourceUid":"merged-0198","sourceNo":198},{"id":182,"readerNo":183,"displayNo":199,"n":199,"type":"narration","text":"Rồi chuyện gì sẽ xảy ra?\n그럼 어떻게 돼?\nThen what happens?","sourceUid":"merged-0199","sourceNo":199},{"id":183,"readerNo":184,"displayNo":201,"n":201,"type":"narration","text":"Họ chắc chắn sẽ chiến hết mình\n완전 갈아넣는다고\nThey'll absolutely give it their all.","sourceUid":"merged-mq8v5mzk-208","sourceNo":201},{"id":184,"readerNo":185,"displayNo":202,"n":202,"type":"narration","text":"Chẳng ai muốn chết cả\n죽기 싫으니까\nNo one wants to die,","sourceUid":"merged-mq8v5yuw-209","sourceNo":202},{"id":185,"readerNo":186,"displayNo":204,"n":204,"type":"narration","text":"Nên họ phải làm bất chấp thôi\n집까지 짜내야지\n뭐\nWe have to squeeze out everything, even the house.\nso they'll do whatever it takes.","sourceUid":"merged-mqddsknu-2","sourceNo":204},{"id":186,"readerNo":187,"displayNo":205,"n":205,"type":"narration","text":"Đồ uống của quý khách đây ạ.\n주문하신 음료 나왔습니다\nYour ordered drink is ready.","sourceUid":"merged-mq87y7uo-1131","sourceNo":205},{"id":187,"readerNo":188,"displayNo":206,"n":206,"type":"narration","text":"Vâng.\n네\nYes.","sourceUid":"merged-0206","sourceNo":206},{"id":188,"readerNo":189,"displayNo":207,"n":207,"type":"narration","text":"Cảm ơn anh.\n감사합니다\nThank you.","sourceUid":"merged-0207","sourceNo":207},{"id":189,"readerNo":190,"displayNo":208,"n":208,"type":"narration","text":"Dù sao thì đẳng cấp của anh Ha và tổ trưởng Yoon Jun No\n아무리 그래도\n하전문님이랑 윤준호 팀장님\nEven so,\nDirector Ha Jeong-mu and Team Leader Yoon Jun-ho...","sourceUid":"merged-mqddu8ax-5","sourceNo":208},{"id":190,"readerNo":191,"displayNo":210,"n":210,"type":"narration","text":"Chẳng phải lệch nhau một trời một vực sao?\n체급이 너무 안 맞는 거 아니에요\nisn't the gap between Mr. Ha\nand Mr. Yun Ju No too big?","sourceUid":"merged-mq8v7qxh-211","sourceNo":210},{"id":191,"readerNo":192,"displayNo":211,"n":211,"type":"narration","text":"Quyền lực của anh Ha đứng thứ 2 ở Sanin mà\n하정무님 살인한 것 같은데\nMr. Ha is ranked second in power.","sourceUid":"merged-mq8v85x1-213","sourceNo":211},{"id":192,"readerNo":193,"displayNo":212,"n":212,"type":"narration","text":"Tôi cũng tò mò về chuyện đó đấy.\n나도 그게 궁금하긴 하거든\nI am curious about that as well.","sourceUid":"merged-mq8v8017-212","sourceNo":212},{"id":193,"readerNo":194,"displayNo":213,"n":213,"type":"narration","text":"Chủ tịch xem Yoon Joo No là CEO tiếp theo.\n회장님은 윤준호를 뭐 넥스트로 생각하는 건지\n이 상무가 구슬렀겠지?\nDoes the chairman think of Yun Ju No as the next CEO?","sourceUid":"merged-mq8v8blt-214","sourceNo":213},{"id":194,"readerNo":195,"displayNo":214,"n":214,"type":"narration","text":"hay đang tạo cơ hội cho anh Ha\ntrốn tránh và đùn đẩy trách nhiệm cho Yoon Joo No?\n아니면 하정무가 윤준호한테 책임을 떠 넘기고 면필 기회를 주는 건지\nOr is he giving Mr. Ha a chance to avoid blame\nby using Yun Ju No as a scapegoat?","sourceUid":"merged-mq8v8hui-215","sourceNo":214},{"id":195,"readerNo":196,"displayNo":215,"n":215,"type":"narration","text":"Ai mà biết ông ấy nghĩ gì?\n우리가 또 부심을 속으로 어쩌겠냐\nHow could we know what he's really thinking?","sourceUid":"merged-mq8v8qfx-216","sourceNo":215},{"id":196,"readerNo":197,"displayNo":216,"n":216,"type":"narration","text":"Giám đốc Lee đến rồi.\n이상문이 오셨습니다\nExecutive Director Lee is here.","sourceUid":"merged-mq8v8ueq-217","sourceNo":216},{"id":197,"readerNo":198,"displayNo":217,"n":217,"type":"narration","text":"Thực sự là chủ tịch gọi cậu ta về sao\n진짜 회장님이 부심을 봤을까요?\nDo you think the chairman really called him in?","sourceUid":"merged-mq8v8ztf-218","sourceNo":217},{"id":198,"readerNo":199,"displayNo":218,"n":218,"type":"narration","text":"Không biết nữa.\n글쎄요\nI'm not sure.","sourceUid":"merged-mq8v93sq-219","sourceNo":218},{"id":199,"readerNo":200,"displayNo":220,"n":220,"type":"narration","text":"Đúng, tôi cũng nghĩ vậy.\n네 하긴\nWell, I suppose so.","sourceUid":"merged-mq889ts7-1164","sourceNo":220},{"id":200,"readerNo":201,"displayNo":221,"n":221,"type":"narration","text":"Ông ấy làm việc trực tiếp với chủ tịch mà.\n이 상무님은 회장님이랑 다이렉트니까\nMr. Lee has direct access to the chairman.\nhas a direct line to the Chairman,","sourceUid":"merged-mqduuce4-2","sourceNo":221},{"id":201,"readerNo":202,"displayNo":223,"n":223,"type":"narration","text":"Có lẽ không có lý do đặc biệt gì đâu.\n그냥 부르신 거 아닐까요?\nMaybe he just called him in for no special reason.","sourceUid":"merged-mq8vy1qz-222","sourceNo":223},{"id":202,"readerNo":203,"displayNo":224,"n":224,"type":"narration","text":"Anh Ha sắp làm CEO rồi mà.\n그럼 하자모님이 이제\n시유하셔야 되니까\nWell, then, since Chairman Hajamo\nwill need to give his instructions,","sourceUid":"merged-mqduvyah-3","sourceNo":224},{"id":203,"readerNo":204,"displayNo":226,"n":226,"type":"narration","text":"Có thể ông ấy gọi Yoon Joo No đến để giao cậu ta mấy việc vặt thôi.\n윤 전원 불러서\n잡렬시키고 하시려고\n뭐 그러실 수 있잖아요\nhe'll call in all of Yoon's people\nto chew them out and get things done.\nWell, you could do that, right?","sourceUid":"merged-mqduzooh-5","sourceNo":226},{"id":204,"readerNo":205,"displayNo":229,"n":229,"type":"narration","text":"Anh Joo còn trẻ nhỉ?\n주 대표가 젊네\nThe CEO is young.","sourceUid":"merged-mq88hcyr-1168","sourceNo":229},{"id":205,"readerNo":206,"displayNo":230,"n":230,"type":"narration","text":"Hả?\n네?\nYes?","sourceUid":"merged-0230","sourceNo":230},{"id":206,"readerNo":207,"displayNo":231,"n":231,"type":"narration","text":"Anh không biết tham vọng của ông ấy\nđáng sợ thế nào\n노역이 얼마나 무서운지\n모르는 거 보니까\nYou don't know\nhow terrifying hard labor is,","sourceUid":"merged-mqdv1w7l-6","sourceNo":231},{"id":207,"readerNo":208,"displayNo":233,"n":233,"type":"narration","text":"trẻ thật\n젊다\nso you're young.","sourceUid":"merged-0233","sourceNo":233},{"id":208,"readerNo":209,"displayNo":234,"n":234,"type":"narration","text":"Dù sao thì cuộc chiến cũng đã bắt đầu rồi.\n아무튼 이제 전쟁이야\nAnyway, the fight has just begun.","sourceUid":"merged-0234","sourceNo":234},{"id":209,"readerNo":210,"displayNo":235,"n":235,"type":"narration","text":"Nếu anh Ha thắng, anh ấy sẽ lấy được ghế CEO\n하전무가 이기면 대표 자리 물려받는 거고\nIf Executive Ha wins, he takes over the CEO position.","sourceUid":"merged-0235","sourceNo":235},{"id":210,"readerNo":211,"displayNo":236,"n":236,"type":"narration","text":"Nếu thua thì sẽ bị đuổi việc.\n지멘 잘리는 거고\nIf he doesn't, he will be fired.","sourceUid":"merged-mq8w033u-253","sourceNo":236},{"id":211,"readerNo":212,"displayNo":237,"n":237,"type":"narration","text":"Nếu Yoon Joo No thắng,\ncó lẽ sẽ được vào ban giám đốc.\n윤준호가 이기면 뭐 임원하려나?\nIf Yun Ju No wins, well,\nmaybe he'll become an executive.","sourceUid":"merged-mq8w0am7-254","sourceNo":237},{"id":212,"readerNo":213,"displayNo":238,"n":238,"type":"narration","text":"Chẳng phải Yoon Joo No là tên điên hám tiền sao?\n윤준호 팀장은 동반 밝히는 사이코패스라면서요\nYou said Mr. Yun Ju No is\na money-obsessed psychopath.","sourceUid":"merged-mq8w0inu-255","sourceNo":238},{"id":213,"readerNo":214,"displayNo":239,"n":239,"type":"narration","text":"Họ cho anh ấy vào ban giám đốc sao?\n근데 임원 시켜줘요?\nWhy would they make him an executive?","sourceUid":"merged-mq8w13b1-256","sourceNo":239},{"id":214,"readerNo":215,"displayNo":240,"n":240,"type":"narration","text":"Này cậu đó chính là lý do đó.\n그러니까 시켜주는 거지\nHey.\n- That is why they'd make him. - What?","sourceUid":"merged-mq8w1onh-257","sourceNo":240},{"id":215,"readerNo":216,"displayNo":241,"n":241,"type":"narration","text":"Các ông chủ thích người như anh ta.\n너는 그런 놈들 좋아해\nYou like those kinds of people.","sourceUid":"merged-0241","sourceNo":241},{"id":216,"readerNo":217,"displayNo":242,"n":242,"type":"narration","text":"Họ sẽ đảm bảo tiền của ông ta được an toàn.\n쟤 돈 지켜주려고 그러잖아\nOwners like guys like him.\nHe will make sure their money's safe.","sourceUid":"merged-mq8w2jpz-259","sourceNo":242},{"id":217,"readerNo":218,"displayNo":243,"n":243,"type":"narration","text":"Cậu đợi trong phòng hợp đi\n여기 왜 이렇게 기다리고 있어?\nHey, wait inside the conference room.","sourceUid":"merged-mq8w2nv9-260","sourceNo":243},{"id":218,"readerNo":219,"displayNo":244,"n":244,"type":"narration","text":"Dù có thế nào thì nó cũng không giải quyết được chuyện này đâu.\n그러거나 말거나 걔는 이거 해결 못해\nWhatever happens, he can't fix this.","sourceUid":"merged-mq8unobm-125","sourceNo":244},{"id":219,"readerNo":220,"displayNo":245,"n":245,"type":"narration","text":"Tôi chưa bao giờ nghe thấy khoản nợ nào đến tận 11 nghìn tỷ won.\n하긴 액수가 저도 11조는 처음 들어보는 금액이라\nI suppose.\nI mean, I've never heard of\nan 11 trillion won debt before.","sourceUid":"merged-mq8un8xg-124","sourceNo":245},{"id":220,"readerNo":221,"displayNo":246,"n":246,"type":"narration","text":"Anh ta cũng cần duy trì giá cổ phiếu nữa.\n그 와중에 주가도 방어해야 되지 않습니까?\nHe also needs to maintain the stock prices as well.","sourceUid":"merged-mq8wy6dk-472","sourceNo":246},{"id":221,"readerNo":222,"displayNo":247,"n":247,"type":"narration","text":"Nhưng nếu cậu ta thất bại thì sao?\n근데 이게 실패하면 어떻게 되는 거죠?\nBut what happens if he fails?","sourceUid":"merged-mq8wym7t-473","sourceNo":247},{"id":222,"readerNo":223,"displayNo":248,"n":248,"type":"narration","text":"Anh nghĩ sao?\n어떻게 되겠는가?\nWhat do you think will happen?","sourceUid":"merged-0248","sourceNo":248},{"id":223,"readerNo":224,"displayNo":249,"n":249,"type":"narration","text":"Yoon Joo No sẽ chịu trách nhiệm cho mớ hỗn độn này\nvà rời khỏi công ty.\n윤준호가 회사 이 꼴 낸 거 책임지고 떠나야지\nYun Ju No will take responsibility for the mess\nand leave the company.","sourceUid":"merged-mq8wyxai-474","sourceNo":249},{"id":224,"readerNo":225,"displayNo":250,"n":250,"type":"narration","text":"Vậy thì lẽ dĩ nhiên anh sẽ trở thành CEO tiếp theo nhỉ?\n어? 그럼 자연스럽게 정관님이 대표가 되시는 거에요?\nThen you will naturally become the next CEO, right?","sourceUid":"merged-mq8wzdgk-475","sourceNo":250},{"id":225,"readerNo":226,"displayNo":251,"n":251,"type":"narration","text":"Tôi có thể chấp nhận việc Yoon Joo No quay lại vì đó là quyết định của chủ tịch.\n윤준호가 오는 건 오케이.\n회장님이 결정하신 거라니까.\nI can accept Yun Ju No's return, because it is chairman's decision.","sourceUid":"merged-mqdvbo3i-7","sourceNo":251},{"id":226,"readerNo":227,"displayNo":253,"n":253,"type":"narration","text":"Nhưng cậu ta sẽ làm việc dưới quyền ai?\n근데 그 친구 누구 밑에서 일합니까?\nBut who will he work under?","sourceUid":"merged-mq8urj1m-130","sourceNo":253},{"id":227,"readerNo":228,"displayNo":254,"n":254,"type":"narration","text":"Trước đây cậu ấy từng làm việc dưới quyền anh,\n전무님이 데리고 계시기도 했고\nHe had worked under you before,","sourceUid":"merged-mq8x1q3y-478","sourceNo":254},{"id":228,"readerNo":229,"displayNo":255,"n":255,"type":"narration","text":"- khi anh là CFO mà. - Tôi ư?\n또 그룹 CFO이시고 하니까.\nand you are the CFO, so–","sourceUid":"merged-mq8x21mm-479","sourceNo":255},{"id":229,"readerNo":230,"displayNo":256,"n":256,"type":"narration","text":"Sao cơ?\n서요?\nMe?","sourceUid":"merged-mq8usibf-133","sourceNo":256},{"id":230,"readerNo":231,"displayNo":257,"n":257,"type":"narration","text":"Tổ trưởng Yoon có chính kiến riêng của mình.\n윤 팀장도 자기 주장이 있는 놈인데\nMr. Yun has his own opinions.","sourceUid":"merged-mq8x2egk-480","sourceNo":257},{"id":231,"readerNo":232,"displayNo":258,"n":258,"type":"narration","text":"Hãy để cậu ta tự lập nhóm.\n자기 팀 꿀이라고 하세요.\nHave him create his own team.","sourceUid":"merged-mq8x2jzq-481","sourceNo":258},{"id":232,"readerNo":233,"displayNo":259,"n":259,"type":"narration","text":"Và nếu cậu ta cần gì, anh có thể giúp cậu ta.\n부족한 거 있으면 이 상무님이 도와주시면 되겠네.\nAnd if he needs anything, you can help him.","sourceUid":"merged-mq8x2p9c-482","sourceNo":259},{"id":233,"readerNo":234,"displayNo":260,"n":260,"type":"narration","text":"Anh ấy muốn vạch ra ranh giới\ngiữa bạn và thù.\n피하식별 확실하자는 거네.\nHey.\nHe wants to draw a line\nbetween friend and foe.","sourceUid":"merged-mq8x43f4-484","sourceNo":260},{"id":234,"readerNo":235,"displayNo":261,"n":261,"type":"narration","text":"- Thật vậy sao? - Ừ.\n그런 거예요?\n- Is that it? - Yes.","sourceUid":"merged-mq8x4h73-485","sourceNo":261},{"id":235,"readerNo":236,"displayNo":262,"n":262,"type":"narration","text":"Có vẻ như Giám đốc Ha rất tự tin.\n아줌마는 자신 있나 보다\nI guess Mr. Ha is confident.","sourceUid":"merged-mq8ww8al-471","sourceNo":262},{"id":236,"readerNo":237,"displayNo":263,"n":263,"type":"narration","text":"Vậy, cậu ấy sẽ lập nhóm như thế nào?\n그럼 팀원은 어떻게 해?\nThen how will he form his team?","sourceUid":"merged-mq8xdbge-517","sourceNo":263},{"id":237,"readerNo":238,"displayNo":264,"n":264,"type":"narration","text":"Chúng ta có thể để mọi người nộp đơn tham gia.\n지원 받으면 되죠\nWe can have people apply to join.","sourceUid":"merged-mq8xcylp-516","sourceNo":264},{"id":238,"readerNo":239,"displayNo":265,"n":265,"type":"narration","text":"M&A khá hot mà.\nM&A 인기 좋잖아요\nM&A is quite popular.","sourceUid":"merged-mq8xefbz-519","sourceNo":265},{"id":239,"readerNo":240,"displayNo":266,"n":266,"type":"narration","text":"Tôi có nên tham gia không?\n지원할까?\nShould I apply?","sourceUid":"merged-mq8xeoxr-520","sourceNo":266},{"id":240,"readerNo":241,"displayNo":267,"n":267,"type":"narration","text":"Cậu muốn lên một con tàu sắp chìm à?\n죽는 바에 들어가겠다고?\nDo you want to board a sinking ship?","sourceUid":"merged-mq8xe7sw-518","sourceNo":267},{"id":241,"readerNo":242,"displayNo":268,"n":268,"type":"narration","text":"Mà không biết tổ trưởng Yoon định sẽ bán gì đầu tiên?\n서머 어쨌든\n저 윤 팀장 오면 뭐부터 팔 거랍니까?\nSummer, anyway. When Team Leader Yoon gets here, what does he say he'll sell first?","sourceUid":"merged-mqdx14ye-8","sourceNo":268},{"id":242,"readerNo":243,"displayNo":271,"n":271,"type":"narration","text":"Cứ đợi Trưởng nhóm Yoon đến đây rồi nghe xem cậu ấy có kế hoạch gì\nAnh ta có kế hoạch gì thì\n윤 팀장이 오면 들어보시죠 어떤 계획을 갖고 있는지는\nWe'll hear about it when Team Leader Yoon arrives.\nAs for what kind of plan he has,","sourceUid":"merged-mqdx3e81-9","sourceNo":271},{"id":243,"readerNo":244,"displayNo":272,"n":272,"type":"narration","text":"Có cần nghe cậu ấy thuyết trình trực tiếp không?\n그 윤 팀장한테 들어야 됩니까?\nDo I have to hear this from Team Leader Yoon?","sourceUid":"merged-mq8xhrwg-524","sourceNo":272},{"id":244,"readerNo":245,"displayNo":273,"n":273,"type":"narration","text":"Tôi là CFO của Tập đoàn Sanin.\n제가 산윤그룹 CFO입니다","sourceUid":"merged-mq8xi6gp-525","sourceNo":273},{"id":245,"readerNo":246,"displayNo":274,"n":274,"type":"narration","text":"Vâng.\n네\nYes.","sourceUid":"merged-0274","sourceNo":274},{"id":246,"readerNo":247,"displayNo":275,"n":275,"type":"narration","text":"Vậy thì hãy nghe ý kiến từ CFO trước.\n그럼 CFO님 말씀 먼저 들어보시죠\nThen let's hear what the CFO has to say first.","sourceUid":"merged-mq8xiv9t-526","sourceNo":275},{"id":247,"readerNo":248,"displayNo":276,"n":276,"type":"narration","text":"\"Lục tẩm cốt đoạn.\"\n\"Lục\" là thịt, \"tẩm\" là cắt,\n\"Cốt\" là xương, \"đoạn\" là chặt đứt.\nTập đoàn đang trong khủng hoảng,\nchúng ta không thể chỉ ngồi nhìn.\nChúng ta có vấn đề, vậy nên cần loại bỏ nó.\n육참 골단 고기 육 벨참 뼈 골 끈을 탄 내 살을 베어주고 상대 뼈를 끊는다 그룹이 이 지경인데 그냥 넘어갈 수는 없는 거 아니겠습니까 문제가 있는 데는 도려내야죠\n\"Cutting flesh to sever bone\" — the group is in this state, so we can't just let it slide, can we? Where there's a problem, we have to cut it out.","sourceUid":"merged-mq8xk2gs-527","sourceNo":276},{"id":248,"readerNo":249,"displayNo":277,"n":277,"type":"narration","text":"Hãy xem xét kỹ\nđể biết đâu là thịt, đâu là xương.\nĐây là báo cáo tài chính của các công ty con thuộc tập đoàn.\n자 어디 한번 보시죠 어디가 살이고 어디가 뼈인지 산인그룹 계열사 재무재표입니다\nAlright, let's take a look. Here is the financial statement of Sanin Group's affiliates — where is the flesh and where is the bone?","sourceUid":"merged-mq8xuqzb-93","sourceNo":277},{"id":249,"readerNo":250,"displayNo":278,"n":278,"type":"narration","text":"Đầu tiên bộ phận Xây dựng. Đang tăng trưởng ổn định thì bỗng nhiên doanh thu tăng gấp đôi. Đó là khi tôi mua lại Yonghai & C.\n자 먼저 건설사업본부입니다. 계속해서 성장하다가 매출이 2배로 뛰었죠. 저때가 제가 용하이앤씨 인수하고 나섭니다.\nFirst, the Construction Business Division. It was growing steadily, then revenue doubled. That was right after I acquired Yonghai E&C.","sourceUid":"merged-0278","sourceNo":278},{"id":250,"readerNo":251,"displayNo":279,"n":279,"type":"narration","text":"Nhờ đó bộ phận Xây dựng đang thu về lợi nhuận cao.\nVậy tại sao tập đoàn lại rơi vào tình trạng này?\n자 덕분에 건설이 저렇게 잘 버는데 그룹은 왜 이 지경이 됐느냐.\nSo, due to that, Construction is earning good revenue. So why is our group in this mess?","sourceUid":"merged-mqdxx3wx-41","sourceNo":279},{"id":251,"readerNo":252,"displayNo":280,"n":280,"type":"narration","text":"Đây là tình hình của các công ty con khác, phần lớn đều có doanh thu âm.\nKhách sạn, giải trí,\ncông ty du lịch, thực phẩm tất cả đều đang thua lỗ.\n다른 계열사들 대부분이 다 마이너스죠 호텔 엔터 여행사 식품 다 마이너스\nOkay, these are other subsidiaries.\nMost of them have negative revenues. They're all in the red.\ntravel agency, food products.\nHotel, entertainment,","sourceUid":"merged-mqdxziz7-44","sourceNo":280},{"id":252,"readerNo":253,"displayNo":281,"n":281,"type":"narration","text":"Trời ạ, thê thảm quá. Quay lại trang trước.\nCái gì đây? Wind, à…\nCông ty xe đạp thậm chí còn chưa được niêm yết.\n전화면 봐봐 저 뭐야 저 윈드 그래 자전거죠 상장도 못한 거죠\nGosh, it's a bloodbath.\nThe bicycle company that didn't even get listed!\nWhat is that? Wind, yes...\nGo to the previous slide.","sourceUid":"merged-mqdy3ik4-48","sourceNo":281},{"id":253,"readerNo":254,"displayNo":282,"n":282,"type":"narration","text":"Vậy, điều này có nghĩa là gì?\nBộ phận Xây dựng đang gánh cả tập đoàn.\n자 이게 무슨 소리냐 건설이 나머지를 다 먹여 살리는 중이다\nSo what does this mean?\nConstruction is carrying the entire company.","sourceUid":"merged-mqdy4cwb-50","sourceNo":282},{"id":254,"readerNo":255,"displayNo":283,"n":283,"type":"narration","text":"Nhưng giờ thì nó không thể duy trì phần còn lại của tập đoàn nữa.\n근데 이제는 한계가 와서 더 이상 감당이 안 된다라는 뜻입니다\nBut now, it has reached its limit\nand cannot sustain the rest of the group anymore.","sourceUid":"merged-mqdy57ct-52","sourceNo":283},{"id":255,"readerNo":256,"displayNo":284,"n":284,"type":"narration","text":"Vậy anh định xử lý chuyện này như thế nào?\n아니 그래서 어떻게 하겠다는 건데요","sourceUid":"merged-mq8xxoy1-99","sourceNo":284},{"id":256,"readerNo":257,"displayNo":285,"n":285,"type":"narration","text":"Giờ anh đã thấy rõ rồi đúng không?\nAnh có thể phân biệt được đâu là thịt, đâu là xương.\n보니까 아시겠죠 어디가 뼈고 어디가 살인지\nSo what will you do about it?\nYou can see what's flesh and what's bone.\nYou can see it now, right?","sourceUid":"merged-mqdy6fcp-54","sourceNo":285},{"id":257,"readerNo":258,"displayNo":286,"n":286,"type":"narration","text":"Chúng ta phải cắt bỏ phần dư thừa.\nChúng ta sẽ tính toán doanh thu và lợi nhuận hoạt động\nvà bắt đầu bán đi những bộ phận hoạt động kém nhất.\n그럼 도려내야죠 매출과 영업이 계산해서 꼴지부터 매각하겠습니다\nWe have to cut off the dead weight.\nand start selling from the worst performers.\nWe will calculate the revenue and operating profits","sourceUid":"merged-mqdy6wyr-56","sourceNo":286},{"id":258,"readerNo":259,"displayNo":287,"n":287,"type":"narration","text":"Anh đang đùa à?\n아니, 상야라는 것도 아니고\nAre you kidding me?","sourceUid":"merged-mqdy73f0-57","sourceNo":287},{"id":259,"readerNo":260,"displayNo":288,"n":288,"type":"narration","text":"Anh nghĩ công ty là một cuộc thi tuyển chọn thần tượng sao?\n회사가 무슨 아이돌 오디션입니까?\nDo you think a company is an idol audition?","sourceUid":"merged-mqdy7cd6-58","sourceNo":288},{"id":260,"readerNo":261,"displayNo":289,"n":289,"type":"narration","text":"Sao? Tại sao chúng ta không thể làm vậy?\n왜? 그럼 안 됩니까?\nWhy? Why can't we do that?","sourceUid":"merged-mqdy7grv-59","sourceNo":289},{"id":261,"readerNo":262,"displayNo":290,"n":290,"type":"narration","text":"Ngay cả bọn trẻ cũng đang cạnh tranh khốc liệt,\n애들도 그렇게 살벌하게 경쟁을 하는데\nEven the kids are competing so fiercely.","sourceUid":"merged-mqdy7nis-60","sourceNo":290},{"id":262,"readerNo":263,"displayNo":291,"n":291,"type":"narration","text":"chẳng lẽ chúng ta không nên còn quyết liệt hơn để tồn tại sao?\n우리는 더 치열하게 살아야지\nShouldn't we be even more fierce to survive?","sourceUid":"merged-mqdy7sg2-61","sourceNo":291},{"id":263,"readerNo":264,"displayNo":292,"n":292,"type":"narration","text":"Giám đốc Ha,\nanh định bán bao nhiêu?\n전문의, 그럼 얼마나 팝니까?\nManaging Director,\nhow much do you plan to sell?","sourceUid":"merged-mqdy8r9g-93","sourceNo":292},{"id":264,"readerNo":265,"displayNo":293,"n":293,"type":"narration","text":"Cho đến khi chúng ta thu về 11 nghìn tỷ won.\n11조는 조달할 때까지죠\nUntil we secure 11 trillion won.","sourceUid":"merged-mqdy94g4-94","sourceNo":293},{"id":265,"readerNo":266,"displayNo":294,"n":294,"type":"narration","text":"Khoan đã,\nnếu là 11 nghìn tỷ,\nanh sẽ bán hết mọi thứ trừ bộ phận Xây dựng sao?\n아니, 11조면 건설만 남기고 다 팔겠다는 거예요?\nWait,\nwill you sell everything except Construction?\nif it's 11 trillion,","sourceUid":"merged-mqdya6jf-96","sourceNo":294},{"id":266,"readerNo":267,"displayNo":295,"n":295,"type":"narration","text":"Và tại sao anh lại có quyền quyết định điều đó?\n아니, 그걸 왜 당신이 결정하는 거예요?\nAnd why do you get to decide that?","sourceUid":"merged-mqdyafq2-97","sourceNo":295},{"id":267,"readerNo":268,"displayNo":296,"n":296,"type":"narration","text":"Bởi vì đây là công việc của một CFO.\n이게 CFO가 하는 일입니다\nBecause this is what a CFO does.","sourceUid":"merged-mqdyalmt-98","sourceNo":296},{"id":268,"readerNo":269,"displayNo":297,"n":297,"type":"narration","text":"Anh không nhận ra sao?\n안 보이세요?\nCan't you see this?","sourceUid":"merged-mqdyarrv-99","sourceNo":297},{"id":269,"readerNo":270,"displayNo":298,"n":298,"type":"narration","text":"Bộ phận Xây dựng có kiếm được bao nhiêu,\nchúng ta vẫn đang nợ 11 nghìn tỷ won!\n건설이 아무리 벌어다 줘도 빚이 11주나 된다지 않습니까?\nNo matter how much Construction earns for us, we're still 11 trillion won in debt!","sourceUid":"merged-mqdyb7ia-100","sourceNo":298},{"id":270,"readerNo":271,"displayNo":299,"n":299,"type":"narration","text":"Nếu không cắt bỏ những phần thua lỗ thì sẽ mất cả tập đoàn, nhờ các vị cả đấy.\n지금 산인 팔다리 안 자르면 산인 목이 날아가게 생겼다고요 덕분에\nIf we don't cut off Sanin's limbs, we're about to lose its head, thanks to you!","sourceUid":"merged-mqdybezo-101","sourceNo":299},{"id":271,"readerNo":272,"displayNo":300,"n":300,"type":"narration","text":"Nhưng đó không phải là bộ phận duy nhất có lãi.\nChúng tôi cũng...\ncó lợi nhuận.\n거기만 버는 거 아니잖아요 우리도 이익 내고 있는데\nBut they're not the only division making a profit.\nWe are also...\nmaking a profit.","sourceUid":"merged-mqdyc655-104","sourceNo":300},{"id":272,"readerNo":273,"displayNo":301,"n":301,"type":"narration","text":"Ý cô là Thời trang Sanin?\n네 산인 패션\nYou mean Sanin Fashion.","sourceUid":"merged-mqdycbcz-105","sourceNo":301},{"id":273,"readerNo":274,"displayNo":302,"n":302,"type":"narration","text":"Đây, Thời trang Sanin.\nDoanh thu là 4,2 nghìn tỷ won\nvà lợi nhuận hoạt động là 29,8 tỷ won.\n자, 산인 패션. 매출 4조 2천억에 영업이익 298억이네요.\nAll right, Sanin Fashion.\nand its operating profit was 29.8 billion won.\nIts revenue was 4.2 trillion won,","sourceUid":"merged-mqdycy7v-107","sourceNo":302},{"id":274,"readerNo":275,"displayNo":303,"n":303,"type":"narration","text":"gửi vào ngân hàng lấy lãi, đúng không?\nVới những con số này, tốt hơn hết là\n뭐 이 정도면 뭐 사업을 할 게 아니라 그냥 은행에 갖다 맡기고 이자 받는 게 낫겠다, 그죠?\nWith these numbers, it'd be better to\nput that in the bank and collect interest, right?","sourceUid":"merged-mqdyeek3-109","sourceNo":303},{"id":275,"readerNo":276,"displayNo":304,"n":304,"type":"narration","text":"Đâu phải lỗi của chúng tôi khi mùa đông năm ngoái không lạnh.\nNgành thời trang phụ thuộc nhiều vào thời tiết.\n지난 겨울이 안 추운 걸 어떻게 합니까? 원래 패션이 날씨 영향을...\nIt's not our fault last winter wasn't cold.\nThe fashion industry is heavily dependent on weather–","sourceUid":"merged-mqdyf1gk-111","sourceNo":304},{"id":276,"readerNo":277,"displayNo":305,"n":305,"type":"narration","text":"Cô đáng lẽ phải biết và chuẩn bị trước điều đó.\nCô không xem tin tức à?\n그런 것도 다 미리 알고 대응을 해야죠. 뉴스 안 보세요.\nYou should know and prepare for that in advance.\nDon't you watch the news?","sourceUid":"merged-mqdyfn37-114","sourceNo":305},{"id":277,"readerNo":278,"displayNo":306,"n":306,"type":"narration","text":"Họ nói về biến đổi khí hậu suốt đấy.\nThế mà cô lại sản xuất cả đống áo khoác dày\n뭐 온난화다 뭐다 그러는 판에 그 패딩 잔뜩 만들어가지고\nThey talk about global warming and all.\nYet, you made a ton of padded jackets","sourceUid":"merged-mqdyg4tn-116","sourceNo":306},{"id":278,"readerNo":279,"displayNo":307,"n":307,"type":"narration","text":"để rồi tồn kho,\nbán giảm giá một nửa mà vẫn không ai mua.\n그 반값에도 다 못 팔아서 지금 다 재고로 잡혀있죠.\nand are sitting on inventory, unable to sell them even at half price.","sourceUid":"merged-mqdyghbf-117","sourceNo":307},{"id":279,"readerNo":280,"displayNo":308,"n":308,"type":"narration","text":"CEO Min,\nquản lý cung cầu cũng là một kỹ năng đấy.\n수요일 즉도 다 능력인 겁니다\nCEO Min,\nmanaging supply and demand is a skill too.","sourceUid":"merged-mqdygx63-119","sourceNo":308},{"id":280,"readerNo":281,"displayNo":309,"n":309,"type":"narration","text":"Được rồi, tiếp theo.\nKhách sạn Sanin.\n사민 호텔\nAll right, next.\nSanin Hotel.","sourceUid":"merged-mqdyhx4z-151","sourceNo":309},{"id":281,"readerNo":282,"displayNo":310,"n":310,"type":"narration","text":"Họ nói ngành này sẽ bùng nổ sau COVID-19.\nAnh có thấy bùng nổ tý nào không?\n코로나 끝나면 대박난다더니 이게 대박입니까?\nThey said this would boom after COVID-19.\nDoes this look like a boom to you?","sourceUid":"merged-mqdyib9w-153","sourceNo":310},{"id":282,"readerNo":283,"displayNo":311,"n":311,"type":"narration","text":"Thôi nào. Thật lòng mà nói,\nchúng ta đã đặt cược vào Trung Quốc.\n아니 그건 솔직히 중국 쪽에서 좀 해줘야 되는데\nCome on. Honestly,\nwe were counting on China.","sourceUid":"merged-mqdyimty-155","sourceNo":311},{"id":283,"readerNo":284,"displayNo":312,"n":312,"type":"narration","text":"Chúng ta có thể làm gì với tình hình chính trị hiện tại chứ?\n요즘 정세가 이런 걸 어떡합니까?\nWhat can we do about the current political climate?","sourceUid":"merged-mqdyitcq-156","sourceNo":312},{"id":284,"readerNo":285,"displayNo":313,"n":313,"type":"narration","text":"Bởi vậy mới nói.\nNếu anh không thể làm nó phát triển,\nthì nên đóng cửa đi.\n그러니까요. 어쩔 수가 없으면 그만하셔야지.\nThat's what I'm saying.\nyou should shut it down.\nIf you can't make it work,","sourceUid":"merged-mqdyja99-158","sourceNo":313},{"id":285,"readerNo":286,"displayNo":314,"n":314,"type":"narration","text":"Nghe này.\nTổ trưởng Yoon cũng có thể có ý kiến về chuyện này.\n저기 윤 팀장도 의견이 있을 수 있으니까\nLook.\nMr. Yun may have something to say about this, too—","sourceUid":"merged-mqdyjpgt-160","sourceNo":314},{"id":286,"readerNo":287,"displayNo":315,"n":315,"type":"narration","text":"Cái cậu Yoon đó...\nTôi phải đợi cậu ta sao?\n그 윤 팀... 내가 윤 팀장을 기다려야 됩니까?\nThat Mr. Yun—\nMust I wait for Mr. Yun?","sourceUid":"merged-mqdyk0n1-162","sourceNo":315},{"id":287,"readerNo":288,"displayNo":316,"n":316,"type":"narration","text":"Xin lỗi vì đã để mọi người chờ lâu.\n기다리게 해서 죄송합니다.\nSorry to keep you waiting.","sourceUid":"merged-mq8ygwq0-194","sourceNo":316},{"id":288,"readerNo":289,"displayNo":317,"n":317,"type":"narration","text":"Xin chào, tôi là Yoon Joo No.\n안녕하십니까? 윤준호입니다.\nHello? This is Junho Yoon.\nI'm sorry for making you all wait.","sourceUid":"merged-mqdykc7g-163","sourceNo":317},{"id":289,"readerNo":290,"displayNo":318,"n":318,"type":"narration","text":"Cậu đến rồi à.\nCậu có biết tình hình của chúng tôi không?\n고생하셨네. 상황은 알고 있나?\nYou've been through a lot. Do you know the situation?","sourceUid":"merged-mq8yila6-196","sourceNo":318},{"id":290,"readerNo":291,"displayNo":319,"n":319,"type":"narration","text":"Tôi đã xem qua tất cả tài liệu ngài gửi.\n보내주신 자료 다 확인하셨습니다.\nI've checked all the materials you sent.","sourceUid":"merged-mq8yirqk-197","sourceNo":319},{"id":291,"readerNo":292,"displayNo":320,"n":320,"type":"narration","text":"Rồi sao?\n그래서?\nSo?","sourceUid":"merged-mq8yj1zv-198","sourceNo":320},{"id":292,"readerNo":293,"displayNo":321,"n":321,"type":"narration","text":"Cậu nghĩ như thế nào?\n어떻게 생각하냐고?\nWhat do you think?","sourceUid":"merged-mq8yjcxk-199","sourceNo":321},{"id":293,"readerNo":294,"displayNo":322,"n":322,"type":"narration","text":"Tôi sẽ nộp báo cáo sau khi phân tích chi tiết.\n검토 후에 정리해서 보고서 올리겠습니다.\nI will review it and submit a report.\nI'll submit a report after analyzing the details.","sourceUid":"merged-mqdylfrq-164","sourceNo":322},{"id":294,"readerNo":295,"displayNo":323,"n":323,"type":"narration","text":"Phân tích?\n검토?\nAnalyze?","sourceUid":"merged-mqdyloij-165","sourceNo":323},{"id":295,"readerNo":296,"displayNo":324,"n":324,"type":"narration","text":"Tôi hiểu rằng một sự hy sinh lớn là cần thiết.\n아, 큰 희생이 필요하다는 건 저도 잘 알고 있습니다.\nI understand that a major sacrifice is needed.","sourceUid":"merged-mqdym324-166","sourceNo":324},{"id":296,"readerNo":297,"displayNo":325,"n":325,"type":"narration","text":"Tuy nhiên...\n다만...\nHowever...","sourceUid":"merged-mq8ykn7z-203","sourceNo":325},{"id":297,"readerNo":298,"displayNo":326,"n":326,"type":"narration","text":"Ôi trời không khí gì thế này?\nCậu đến rồi à?\nNgồi đi.\nCậu có tự tin không?\nCó điều gì cần tôi giúp không?\nVâng.\n니 도와줄거라도\nYes.\nAre you confident?\nSit down.\nYou made it.\nHey, what's with this atmosphere?","sourceUid":"merged-mqdyn73l-168","sourceNo":326},{"id":298,"readerNo":299,"displayNo":327,"n":327,"type":"narration","text":"Tôi cần chọn thành viên cho đội của mình.\n제가 원하는 팀원이 필요합니다\nI need the team members I want.","sourceUid":"merged-mq8z7olc-123","sourceNo":327},{"id":299,"readerNo":300,"displayNo":328,"n":328,"type":"narration","text":"Được. Hãy tự lập đội của mình.\n꼬리골하고 뭉친거 만들어가\nMake a tail stew and a mung bean pancake.","sourceUid":"merged-mq8z8ij5-124","sourceNo":328},{"id":300,"readerNo":301,"displayNo":329,"n":329,"type":"narration","text":"Cứ làm đi.\n한번 해봐\nGive it a try.","sourceUid":"merged-mq8z8r43-125","sourceNo":329},{"id":301,"readerNo":302,"displayNo":330,"n":330,"type":"narration","text":"Có ai...\ntình nguyện không?\n그리고 이 안에서도 지원자 없나?\nAnd are there any volunteers from within this group?","sourceUid":"merged-mq8z94qr-126","sourceNo":330},{"id":302,"readerNo":303,"displayNo":331,"n":331,"type":"narration","text":"Sao?\nBây giờ nghĩ lại,\nmọi người thấy mọi chuyện sẽ không suôn sẻ sao?\n와, 너희들 생각해보니까네. 다들 잘 안되는 것 같더라. 어이?\nWow, now that I think about it, you guys... none of you seem to be doing well, do you? Hey?","sourceUid":"merged-mq8z9kr0-127","sourceNo":331},{"id":303,"readerNo":304,"displayNo":332,"n":332,"type":"narration","text":"- Tôi đi đây. - Vâng.\nVậy tôi sẽ đi tuyển đội của mình.\n그럼 저도 팀원복으로 가보겠습니다\nThen I'll also go with the team uniform.","sourceUid":"merged-mq8za7qc-128","sourceNo":332},{"id":304,"readerNo":305,"displayNo":333,"n":333,"type":"narration","text":"- Cậu thực tập sinh. - Vâng?\n지원하신 분?\nThe person who applied?","sourceUid":"merged-mq8zama0-129","sourceNo":333},{"id":305,"readerNo":306,"displayNo":334,"n":334,"type":"narration","text":"Vâng.\n네\nYes.","sourceUid":"merged-0334","sourceNo":334},{"id":306,"readerNo":307,"displayNo":335,"n":335,"type":"narration","text":"Gặp tôi tại văn phòng lúc 5 giờ chiều để phỏng vấn.\n5시에 부서 사무실에서 면접하시죠\nLet's have the interview at 5 PM in the department office.","sourceUid":"merged-mq8zawkg-130","sourceNo":335},{"id":307,"readerNo":308,"displayNo":336,"n":336,"type":"narration","text":"Cậu điên à?\nCậu tiêu đời rồi.\n내 집 끝난 거야 인마?","sourceUid":"merged-mq8zbn8s-131","sourceNo":336},{"id":308,"readerNo":309,"displayNo":337,"n":337,"type":"narration","text":"Ý tôi là, anh ấy có vẻ khá ổn, và...\n아니 생각보다 인상도 괜찮은 것 같고","sourceUid":"merged-mq8zcqzc-162","sourceNo":337},{"id":309,"readerNo":310,"displayNo":338,"n":338,"type":"narration","text":"- Anh nói anh ấy có năng lực mà. - Trời ạ, thằng này!\n아니 유능하다면서요","sourceUid":"merged-mq8zd0q8-163","sourceNo":338},{"id":310,"readerNo":311,"displayNo":339,"n":339,"type":"narration","text":"Dạ, hả?\n아 예?","sourceUid":"merged-0339","sourceNo":339},{"id":311,"readerNo":312,"displayNo":340,"n":340,"type":"narration","text":"Cậu không biết những điều cơ bản khi làm việc trong công ty sao?\n아니 넌 회사 안에 기본이 안 돼있냐 어?\nHey, don't you have the basics of working in a company down?","sourceUid":"merged-mq909z5k-164","sourceNo":340},{"id":312,"readerNo":313,"displayNo":341,"n":341,"type":"narration","text":"Với những nhân viên như chúng ta,\ntốt nhất là đừng để bị chú ý.\n야 우리 같은 회사는 눈에 안 띄는 게 그게 최고야\nLook, for a company like ours, staying under the radar is the best thing.","sourceUid":"merged-mq90agj7-165","sourceNo":341},{"id":313,"readerNo":314,"displayNo":342,"n":342,"type":"narration","text":"Nếu chuyện này suôn sẻ, tôi có thể được lên nhân viên chính thức.\n이거 잘하면 저 정직원 될 수도 있지\nIf this works out, I could be a full-timer—","sourceUid":"merged-mq997wxk-762","sourceNo":342},{"id":314,"readerNo":315,"displayNo":343,"n":343,"type":"narration","text":"Cậu nói cái gì vậy?\nĐây không phải là cách cậu nên hiểu vấn đề này.\nCậu chẳng biết gì về chính trị cả!\n그렇게 하면 안 되지 이 사람 완전 정치를 모르네 정치를\nWhat are you saying?\nT-That's not how you should understand this!\nYou know nothing about politics!","sourceUid":"merged-mq9986in-763","sourceNo":343},{"id":315,"readerNo":316,"displayNo":344,"n":344,"type":"narration","text":"Một trưởng nhóm có thể đấu lại giám đốc điều hành sao?\n야 팀장이 전무 이기냐 어?\nCan a team leader beat a managing director?","sourceUid":"merged-mq99779j-761","sourceNo":344},{"id":316,"readerNo":317,"displayNo":345,"n":345,"type":"narration","text":"Yoon Joo No tiêu đời rồi.\nAnh ta sẽ gánh hết trách nhiệm. Hết đường rồi!\n윤준호 무조건 막 쟤 방금 독박 친 거 이거 완전 끝난 거라고\nYun Ju No is doomed—\nHe'll take all the blame for this. He's done for!","sourceUid":"merged-mq9933av-760","sourceNo":345},{"id":317,"readerNo":318,"displayNo":346,"n":346,"type":"narration","text":"Điên đầu với cậu thật.\n아 꼴등 새끼지\nYou're such a headache!","sourceUid":"merged-mq992sh4-759","sourceNo":346},{"id":318,"readerNo":319,"displayNo":347,"n":347,"type":"narration","text":"Nhỡ Tổ trưởng Yoon xử lý được thì sao?\n은팀장이 이거 해결하면요?\nWhat if Mr. Yun fixes this?","sourceUid":"merged-mq998p3b-764","sourceNo":347},{"id":319,"readerNo":320,"displayNo":348,"n":348,"type":"narration","text":"Anh nói anh ấy có năng lực mà.\n선배가 그랬잖아요 능력은 좋다고\nYou said that he's competent.","sourceUid":"merged-mq998xqv-765","sourceNo":348},{"id":320,"readerNo":321,"displayNo":349,"n":349,"type":"narration","text":"Có năng lực?\n능력이?\nCompetent?","sourceUid":"merged-mq99920n-766","sourceNo":349},{"id":321,"readerNo":322,"displayNo":350,"n":350,"type":"narration","text":"Này, cậu nghĩ 11 nghìn tỷ won là chuyện đùa à?\n11조가 장난이야?\nHey, do you think 11 trillion won is a joke?","sourceUid":"merged-mq9996a1-767","sourceNo":350},{"id":322,"readerNo":323,"displayNo":351,"n":351,"type":"narration","text":"Một người kiếm 100 triệu một năm\nphải mất 100.000 năm mới trả hết.\n연봉 1억짜리가 10만 년이라도 안 돼\nSomeone earning 100 million a year\ncouldn't pay it off in 100,000 years.","sourceUid":"merged-mq999cof-768","sourceNo":351},{"id":323,"readerNo":324,"displayNo":352,"n":352,"type":"narration","text":"Ngay cả khi một con khỉ tiết kiệm\n100 triệu một năm khi tiến hóa thành người,\nnó cũng không thể trả hết 11 nghìn tỷ won.\n원숭이가 1억씩 모으다가 인간으로 진화를 해도 11조가 안 된다고\nEven if a monkey saved\n100 million a year, while evolving into a human,\ncouldn't pay off 11 trillion won.","sourceUid":"merged-mq999lkf-769","sourceNo":352},{"id":324,"readerNo":325,"displayNo":353,"n":353,"type":"narration","text":"Tiền bối.\nGì?\nAnh tính nhẩm nhanh thật đấy.\n침대 에 개선 직접 바르다\nSeonbae.\nWhat?\nYou're so quick with numbers.","sourceUid":"merged-mq999urb-770","sourceNo":353},{"id":325,"readerNo":326,"displayNo":354,"n":354,"type":"narration","text":"Trời ạ, cái thằng này.\nHồi đi học cậu ngốc lắm mà.\nChẳng thay đổi gì cả.\n어이 cd 그 학교 다닐 때 눈치는 그렇게 없던 이거 완전 똑같네 이거\nGosh, this guy.\nYou were so dense back in school.\nYou haven't changed one bit.","sourceUid":"merged-mq99a3pk-771","sourceNo":354},{"id":326,"readerNo":327,"displayNo":355,"n":355,"type":"narration","text":"Anh hồi đó cũng khôn lắm mà.\nBây giờ vẫn vậy.\n선배도 학교 다닐 때 잔머리 하나는 진짜 알아 줬는데 그대로 내요\nYou were really clever back in school, too.\nYou're still the same.","sourceUid":"merged-mq99abjl-772","sourceNo":355},{"id":327,"readerNo":328,"displayNo":356,"n":356,"type":"narration","text":"Thằng này...\n어이 씩\nThis jerk.","sourceUid":"merged-mq99ahf3-773","sourceNo":356},{"id":328,"readerNo":329,"displayNo":357,"n":357,"type":"narration","text":"Này, cậu...\nBây giờ thì cười được đấy,\nnhưng cậu sắp gặp rắc rối to rồi.\n야 또 너는 죽이니까 실수버린거야 너 진짜 큰일 났어 인마\nHey, you...\nYou're smiling now, but you're in big trouble now.","sourceUid":"merged-mq99bft3-775","sourceNo":357},{"id":329,"readerNo":330,"displayNo":358,"n":358,"type":"narration","text":"Mời đi lối này.\nChà cậu mặc đồng phục trông đẹp lắm đấy Min Jeong.\n이야, 민정 씨는 역시 유니폼이 잘 어울려.\nPlease come this way.\nWow, you look great in uniform, Min Jeong.","sourceUid":"merged-mq99bsy1-776","sourceNo":358},{"id":330,"readerNo":331,"displayNo":359,"n":359,"type":
